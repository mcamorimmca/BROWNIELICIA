}
#hd,#main,#tb{position:relative;z-index:1;}

/* ── HEADER ── */
#hd{
  background:var(--header-bg);
  border-bottom:1px solid var(--brd);
  padding:12px 16px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.hd-logo{display:flex;align-items:center;gap:10px;}
.hd-logo-mark{
  width:46px;height:46px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.hd-logo-mark img{width:100%;height:100%;object-fit:contain;}
.hd-title{font-family:"Baloo 2",sans-serif;font-size:17px;font-weight:700;color:var(--header-text);line-height:1;letter-spacing:-.2px;}
.hd-sub{font-size:9px;font-weight:600;color:var(--header-text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.hd-right{text-align:right;}
.hd-label{font-size:9px;font-weight:600;color:var(--header-text-muted);letter-spacing:1px;text-transform:uppercase;}
.hd-val{font-family:"Baloo 2",sans-serif;font-size:18px;font-weight:700;color:var(--gold2);line-height:1;}
.hd-pend{font-size:10px;font-weight:600;color:var(--amb);margin-top:1px;}

/* ── SCROLL AREA ── */
#main{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 0 calc(64px + env(safe-area-inset-bottom,0px));
}
.pg{display:none;padding:14px 14px 0;}
.pg.on{display:block;animation:fi .18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── TAB BAR ── */
#tb{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--header-bg);
  border-top:1px solid var(--brd);
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0px);
  flex-shrink:0;
}
.ti{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;cursor:pointer;position:relative;
}
.ti-ico{width:22px;height:22px;display:flex;align-items:center;justify-content:center;opacity:.4;transition:.15s;color:var(--header-text);}
.ti-ico svg{width:100%;height:100%;}
.ti.on .ti-ico{opacity:1;color:var(--gold2);}
.ti-lbl{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-top:3px;color:var(--header-text-muted);}
.ti.on .ti-lbl{color:var(--gold2);}
.ti-bar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--gold);border-radius:0 0 2px 2px;opacity:0;}
.ti.on .ti-bar{opacity:1;}

/* ── CARDS ── */
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;color:var(--td);}
.card-dark{background:var(--s2);border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid var(--brd);}
.sect{font-family:"Baloo 2",sans-serif;font-size:21px;font-weight:700;color:var(--cream);margin-bottom:14px;letter-spacing:-.2px;}
.divider{height:1px;background:rgba(90,58,26,.12);margin:10px 0;}
.divider-dark{height:1px;background:rgba(200,151,42,.08);margin:10px 0;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.badge-pago{background:var(--grn-bg);color:var(--grn);}
.badge-pend{background:var(--amb-bg);color:var(--amb);}
.badge-red{background:var(--red-bg);color:var(--red);}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:13px 16px;border:none;border-radius:10px;font-family:"DM Sans",sans-serif;font-weight:600;font-size:14px;cursor:pointer;text-align:center;transition:.12s;}
.btn:active{opacity:.8;transform:scale(.98);}
.btn-primary{background:var(--br);color:#F4ECD8;}
.btn-secondary{background:var(--modal-overlay);color:var(--modal-text);border:1px solid var(--modal-border);}
.btn-secondary-page{background:var(--input-bg);color:var(--tl);border:1px solid var(--brd);}
.btn-secondary-light{background:var(--btn-light-bg);color:var(--td);border:1px solid var(--btn-light-border);font-weight:700;}
.btn-green{background:var(--grn-bg);color:var(--grn);}
.btn-wa{background:#25D366;color:#fff;}
.btn-danger{background:var(--red-bg);color:var(--red);}
.btn-sm{padding:6px 12px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.btn-sm-pay{background:var(--grn-bg);color:var(--grn);}
.badge-pago-btn{background:var(--grn-bg);color:var(--grn);}
.btn-sm-del{background:var(--red-bg);color:var(--red);}

/* ── INPUTS ── */
.inp{width:100%;padding:11px 13px;border:1px solid var(--input-border);border-radius:9px;font-size:14px;color:var(--input-text);background:var(--input-bg);outline:none;font-family:"DM Sans",sans-serif;-webkit-appearance:none;transition:.12s;}
.inp:focus{border-color:var(--gold);}
.inp::placeholder{color:var(--input-placeholder);}
.lbl{display:block;font-size:10px;font-weight:600;color:var(--modal-text-muted);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase;}
.fg{margin-bottom:14px;}
/* dropdown nativo do navegador renderiza as <option> com fundo branco do
   sistema operacional, independente do tema da pagina; forcamos texto escuro
   em todas elas para garantir contraste nesse contexto especifico. */
select.inp option{color:#2A1606;background:#FFFFFF;}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:7px 13px;border-radius:99px;border:1px solid var(--brd);background:var(--chip-bg);color:var(--tll);font-size:13px;font-weight:500;cursor:pointer;transition:.12s;}
.chip-modal{padding:7px 13px;border-radius:99px;border:1px solid var(--modal-border);background:var(--modal-overlay-soft);color:var(--modal-text-muted);font-size:13px;font-weight:500;cursor:pointer;transition:.12s;}
.chip-modal.on{background:var(--gold);color:#241704;border-color:var(--gold);font-weight:700;}
.chip.on{background:var(--br);color:#F4ECD8;border-color:var(--br);font-weight:600;}

/* ── TYPE SELECTOR ── */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.type-card{border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;border:1px solid var(--brd);background:var(--input-bg);transition:.12s;}
.type-card.on{background:var(--br);border-color:var(--br);}
.type-card-name{font-size:13px;font-weight:600;color:var(--tl);margin-bottom:2px;}
.type-card.on .type-card-name{color:#F4ECD8;}
.type-card-price{font-size:11px;color:var(--tll);}
.type-card.on .type-card-price{color:rgba(244,236,216,.7);}

/* ── MODAL ── */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-end;justify-content:center;}
#ov.on{display:flex;}
#modal{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:18px 16px calc(32px + env(safe-area-inset-bottom,0px));width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border-top:1px solid var(--brd);}
[data-theme="light"] #modal{background:#FBF7EE !important;--modal-text:#1A0C04 !important;--modal-text-muted:#7A5030 !important;--modal-overlay:rgba(61,31,10,.07) !important;--modal-overlay-soft:rgba(61,31,10,.05) !important;--modal-border:rgba(61,31,10,.18) !important;}
[data-theme="dark"] #modal{background:#241A0F !important;}
.modal-handle{width:40px;height:3px;border-radius:2px;background:rgba(200,151,42,.3);margin:0 auto 18px;}
.modal-title{font-family:"Baloo 2",sans-serif;font-size:20px;font-weight:700;color:var(--modal-text);margin-bottom:18px;}

/* ── DAY CARDS ── */
.day-card{background:var(--card);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.day-card-hd{padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.day-card-hd.active{background:var(--br);}
.day-card-body{background:#EAE0C8;border-top:1px solid rgba(90,58,26,.1);}
.day-row{padding:10px 14px;border-bottom:1px solid rgba(90,58,26,.08);}
.day-row:last-child{border-bottom:none;}
.client-row{padding:10px 14px;border-bottom:1px solid rgba(90,58,26,.1);}
.client-row:last-child{border-bottom:none;}
.item-row{display:flex;flex-direction:column;gap:6px;padding:8px 0;}
.item-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.item-row-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-card{background:var(--card);border-radius:12px;padding:14px;}
.stat-card-lbl{font-size:10px;font-weight:600;color:var(--ts);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.stat-card-val{font-family:"Baloo 2",sans-serif;font-size:20px;font-weight:700;color:var(--td);}
.stat-card-sub{font-size:11px;color:var(--tm);margin-top:2px;}
.stat-card.grn .stat-card-val{color:var(--grn);}
.stat-card.amb .stat-card-val{color:var(--amb);}

/* ── PROGRESS BAR ── */
.pbar{height:6px;background:var(--track-bg);border-radius:3px;overflow:hidden;margin-top:6px;}
.pbar-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .4s;}

/* ── AVATAR ── */
.av{display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;font-family:"DM Sans",sans-serif;flex-shrink:0;color:#F4ECD8;}

/* ── SEPARATOR ── */
.sep{height:1px;background:var(--brd);margin:12px 0;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 24px;}
.empty-title{font-size:16px;font-weight:600;color:var(--tl);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--tll);margin-bottom:20px;}

/* ── BATCH ITEM ── */
.batch-item{background:var(--input-bg);border:1px solid var(--brd);border-radius:10px;padding:12px 13px;margin-bottom:8px;}
.batch-item-title{font-size:13px;font-weight:600;color:var(--tl);margin-bottom:4px;}
.batch-item-sub{font-size:12px;color:var(--tll);}

/* ── CHART ── */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;padding:0 4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:3px 3px 0 0;background:var(--gold);min-height:3px;transition:height .3s;}
.bar-lbl{font-size:9px;font-weight:600;color:var(--tm);letter-spacing:.3px;}

/* ── SCROLL LIST ── */
.scroll-x{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.scroll-x::-webkit-scrollbar{display:none;}

/* ── PRECIFICACAO: SUBTABS ── */
.subtabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;margin-bottom:4px;}
.subtabs::-webkit-scrollbar{display:none;}
.subtab{flex-shrink:0;padding:8px 14px;border-radius:99px;background:var(--chip-bg);border:1px solid var(--brd);color:var(--tll);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.12s;}
.subtab.on{background:var(--br);color:#F4ECD8;border-color:var(--br);}
.ing-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.ing-row-info{flex:1;min-width:0;}
.ing-row-name{font-size:14px;font-weight:600;color:var(--td);}
.ing-row-sub{font-size:11px;color:var(--tm);margin-top:2px;}
.resumo-line{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid rgba(90,58,26,.1);}
.resumo-line:last-child{border-bottom:none;}
.resumo-line .lbl2{font-size:12px;color:var(--tm);}
.resumo-line .val2{font-size:15px;font-weight:700;color:var(--td);}
.resumo-line.total .val2{font-size:20px;color:var(--gold2);}
.lucro-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.lucro-card{background:var(--grn-bg);border-radius:10px;padding:10px 12px;}
.lucro-card .lbl{color:var(--grn);opacity:.8;margin-bottom:3px;}
.lucro-card .val{font-family:"Baloo 2",sans-serif;font-size:16px;font-weight:700;color:var(--grn);}
.lucro-card.neg{background:var(--red-bg);}
.lucro-card.neg .lbl,.lucro-card.neg .val{color:var(--red);}

/* ── MENU "MAIS" (SIDE DRAWER) ── */
#sd-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;}
#sd-ov.on{display:block;}
#sd{
  position:fixed;top:0;left:0;height:100%;width:78%;max-width:300px;
  background:var(--modal-bg);
  transform:translateX(-100%);transition:transform .22s ease;
  z-index:301;display:flex;flex-direction:column;
  box-shadow:2px 0 24px rgba(0,0,0,.25);
}
#sd.on{transform:translateX(0);}
#sd-hd{
  padding:calc(18px + env(safe-area-inset-top,0px)) 18px 16px;
  border-bottom:1px solid var(--modal-border);
  flex-shrink:0;
}
#sd-hd .sd-title{font-family:"Baloo 2",sans-serif;font-size:18px;font-weight:700;color:var(--modal-text);}
#sd-hd .sd-sub{font-size:10px;color:var(--modal-text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
#sd-list{flex:1;overflow-y:auto;padding:10px;}
.sd-item{
  display:flex;align-items:center;gap:14px;
  padding:13px 12px;border-radius:12px;cursor:pointer;
  color:var(--modal-text);transition:.12s;
}
.sd-item.on{background:var(--modal-overlay);}
.sd-item-ico{width:22px;height:22px;flex-shrink:0;color:var(--modal-text-muted);display:flex;align-items:center;justify-content:center;}
.sd-item.on .sd-item-ico{color:var(--gold2);}
.sd-item-ico svg{width:100%;height:100%;}
.sd-item-lbl{font-size:14px;font-weight:600;}
.sd-item.on .sd-item-lbl{color:var(--gold2);}
</style>

function relRange(tipo){

  if(f==="mes") return {de:inicioMes(),ate:hj,lbl:"Este Mês"};

    return {de:c.de||hj,ate:c.ate||hj,lbl:fD(c.de||hj)+" a "+fD(c.ate||hj)};
  }
  return {de:"0000-00-00",ate:"9999-99-99",lbl:"Tudo"};
}

function aplicarRelFiltroCustom(tipo){
  var de=(document.getElementById("rf-de")||{}).value||hoje();

function relTitulo(tipo){

function relConteudoVendas(rng){
  var vs=VND.filter(function(v){return v.data>=rng.de&&v.data<=rng.ate;}).sort(function(a,b){return a.data<b.data?-1:1;});
  var linhas=[];
  var total=0, qtd=vs.length;
  var porDia={};
  for(var i=0;i<vs.length;i++){
    if(!porDia[vs[i].data]) porDia[vs[i].data]=[];
    porDia[vs[i].data].push(vs[i]);
    total+=vs[i].preco;
  }
  var dias=Object.keys(porDia).sort();
  for(var d=0;d<dias.length;d++){
    linhas.push({tipo:"dia",txt:fD(dias[d])});
    var itens=porDia[dias[d]];
    var totDia=0;
    for(var i=0;i<itens.length;i++){
      var v=itens[i];
      var cli=cB(v.cid);
      var lb=(v.tipo==="Tradicional"?"Tradicional":v.tipo+" - "+v.sabor)+(cli?" — "+cli.nome:"");
      linhas.push({tipo:"item",txt:lb,val:v.preco});
      totDia+=v.preco;
    }
    linhas.push({tipo:"subtotal",txt:"Total do dia",val:totDia});
  }
  // mix por tipo
  var mix={};
  for(var i=0;i<vs.length;i++){ mix[vs[i].tipo]=(mix[vs[i].tipo]||0)+1; }
  return {linhas:linhas,total:total,qtd:qtd,mix:mix,rng:rng};
}

function relConteudoFinanceiro(rng){
  var vs=VND.filter(function(v){return v.data>=rng.de&&v.data<=rng.ate;});
  var pags=PAG.filter(function(p){return p.data>=rng.de&&p.data<=rng.ate;});
  var totVendido=0, recebido=0, pendente=0;
  for(var i=0;i<vs.length;i++){ totVendido+=vs[i].preco; if(vs[i].pago) recebido+=vs[i].preco; else pendente+=vs[i].preco; }
  for(var i=0;i<pags.length;i++) recebido+=pags[i].valor;

  // pendencias por cliente (considerando o total em aberto de cada cliente, nao so do periodo)
  var porCliente={};
  for(var i=0;i<vs.length;i++){
    if(vs[i].pago) continue;
    var k=vs[i].cid;
    porCliente[k]=(porCliente[k]||0)+vs[i].preco;
  }
  var clientesArr=Object.keys(porCliente).map(function(k){
    var c=cB(+k);
    return {nome:c?c.nome:"Cliente",val:porCliente[k]};
  }).sort(function(a,b){return b.val-a.val;});

  return {totVendido:totVendido,recebido:recebido,pendente:pendente,clientesArr:clientesArr,rng:rng};
}

function relConteudoEstoque(){
  var lista=listaTodosSabores();
  var porTipo={"Tradicional":[],"Clássico":[],"Premium":[]};
  var total=0;
  for(var i=0;i<lista.length;i++){
    var qtd=estoqueGet(lista[i].tipo,lista[i].sabor);
    total+=qtd;
    porTipo[lista[i].tipo].push({sabor:lista[i].sabor,qtd:qtd});
  }
  var baixos=[];
  for(var t in porTipo){
    for(var i=0;i<porTipo[t].length;i++){
      if(porTipo[t][i].qtd>0 && porTipo[t][i].qtd<=2) baixos.push({tipo:t,sabor:porTipo[t][i].sabor,qtd:porTipo[t][i].qtd});
    }
  }
  return {porTipo:porTipo,total:total,baixos:baixos};
}

function relConteudoDespesas(rng){
  var lista=DESPESAS.filter(function(d){return d.data>=rng.de&&d.data<=rng.ate;}).sort(function(a,b){return a.data<b.data?-1:1;});
  var total=0, porCat={};
  for(var i=0;i<lista.length;i++){
    total+=(+lista[i].valor||0);
    var c=lista[i].categoria||"Outros";
    porCat[c]=(porCat[c]||0)+(+lista[i].valor||0);
  }
  var catArr=Object.keys(porCat).map(function(k){return{k:k,v:porCat[k]};}).sort(function(a,b){return b.v-a.v;});
  return {lista:lista,total:total,catArr:catArr,rng:rng};
}

// ── Texto p/ WhatsApp ──
function relTextoWhatsApp(tipo){
  var rng=relRange(tipo);
  var msg="*BROWNIELÍCIA*\n*Relatório de "+relTitulo(tipo)+"*\n";
  if(tipo!=="estoque") msg+=rng.lbl+"\n";
  msg+="━━━━━━━━━━━━━━━━━━━━\n\n";

  if(tipo==="vendas"){
    var d=relConteudoVendas(rng);
    if(d.qtd===0){ msg+="Nenhuma venda no período.\n"; }
    for(var i=0;i<d.linhas.length;i++){
      var l=d.linhas[i];
      if(l.tipo==="dia") msg+="📅 *"+l.txt+"*\n";
      else if(l.tipo==="item") msg+="   • "+l.txt+" — "+BRL(l.val)+"\n";
      else msg+="   _Subtotal: "+BRL(l.val)+"_\n\n";
    }
    msg+="━━━━━━━━━━━━━━━━━━━━\n";
    msg+="*Total vendido: "+BRL(d.total)+"*\n";
    msg+="*Brownies: "+d.qtd+"*\n";
    var mk=Object.keys(d.mix);
    if(mk.length>0){
      msg+="\n";
      for(var i=0;i<mk.length;i++) msg+=mk[i]+": "+d.mix[mk[i]]+"\n";
    }
  }
  else if(tipo==="financeiro"){
    var d=relConteudoFinanceiro(rng);
    msg+="Total vendido: "+BRL(d.totVendido)+"\n";
    msg+="✅ Recebido: "+BRL(d.recebido)+"\n";
    msg+="⏳ Pendente: "+BRL(d.pendente)+"\n";
    if(d.clientesArr.length>0){
      msg+="\n*Pendências por cliente:*\n";
      for(var i=0;i<d.clientesArr.length;i++) msg+="   • "+d.clientesArr[i].nome+" — "+BRL(d.clientesArr[i].val)+"\n";
    }
  }
  else if(tipo==="estoque"){
    var d=relConteudoEstoque();
    var ordem=["Tradicional","Clássico","Premium"];
    for(var t=0;t<ordem.length;t++){
      var itens=d.porTipo[ordem[t]];
      if(itens.length===0) continue;
      msg+="*"+ordem[t]+"*\n";
      for(var i=0;i<itens.length;i++){
        var lb=itens[i].sabor?itens[i].sabor:ordem[t];
        msg+="   • "+lb+": "+itens[i].qtd+"\n";
      }
      msg+="\n";
    }
    msg+="━━━━━━━━━━━━━━━━━━━━\n";
    msg+="*Total em estoque: "+d.total+" brownies*\n";
    if(d.baixos.length>0){
      msg+="\n⚠️ *Estoque baixo:*\n";
      for(var i=0;i<d.baixos.length;i++){
        var lb=d.baixos[i].sabor?d.baixos[i].sabor:d.baixos[i].tipo;
        msg+="   • "+lb+" — "+d.baixos[i].qtd+" restante(s)\n";
      }
    }
  }
  else if(tipo==="despesas"){
    var d=relConteudoDespesas(rng);
    if(d.lista.length===0){ msg+="Nenhuma despesa no período.\n"; }
    for(var i=0;i<d.lista.length;i++){
      var x=d.lista[i];
      msg+=fD(x.data)+" — "+x.descricao+" ("+(x.categoria||"Outros")+") — "+BRL(x.valor)+"\n";
    }
    if(d.catArr.length>0){
      msg+="\n*Por categoria:*\n";
      for(var i=0;i<d.catArr.length;i++) msg+="   • "+d.catArr[i].k+" — "+BRL(d.catArr[i].v)+"\n";
    }
    msg+="\n━━━━━━━━━━━━━━━━━━━━\n";
    msg+="*Total em despesas: "+BRL(d.total)+"*\n";
  }

  msg+="\n@brownieliciadoces";
  return msg;
}

function relPDF(tipo){
  if(typeof window.jspdf==="undefined"){
    alert("Não foi possível carregar o gerador de PDF. Verifique sua conexão com a internet e tente novamente.");
    return;
  }
  var rng=relRange(tipo);
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({unit:"mm",format:"a4"});
  var margemX=15, y=20, pageW=210, pageH=297;
  var corMarrom=[62,28,7];

  function checarPagina(alturaNecessaria){
    if(y+alturaNecessaria>pageH-15){ doc.addPage(); y=20; }
  }
  function titulo(txt,tam){
    checarPagina(10);
    doc.setFont("helvetica","bold");
    doc.setFontSize(tam||13);
    doc.setTextColor(corMarrom[0],corMarrom[1],corMarrom[2]);
    doc.text(txt,margemX,y);
    y+=tam?tam*0.5+2:8;
  }
  function texto(txt,opts){
    opts=opts||{};
    checarPagina(7);
    doc.setFont("helvetica",opts.bold?"bold":"normal");
    doc.setFontSize(opts.size||10.5);
    doc.setTextColor(opts.color?opts.color[0]:40,opts.color?opts.color[1]:40,opts.color?opts.color[2]:40);
    var x=margemX+(opts.indent||0);
    if(opts.right!==undefined){
      doc.text(String(opts.right),pageW-margemX,y,{align:"right"});
    }
    doc.text(txt,x,y);
    y+=opts.lh||6;
  }
  function linha(){
    checarPagina(4);
    doc.setDrawColor(220,210,195);
    doc.line(margemX,y,pageW-margemX,y);
    y+=5;
  }

  doc.setFont("helvetica","bold");
  doc.setFontSize(18);
  doc.setTextColor(corMarrom[0],corMarrom[1],corMarrom[2]);
  doc.text("Brownielícia",margemX,y);
  y+=8;
  doc.setFontSize(13);
  doc.text("Relatório de "+relTitulo(tipo),margemX,y);
  y+=6;
  doc.setFont("helvetica","normal");
  doc.setFontSize(10);
  doc.setTextColor(120,110,100);
  var subtit=tipo==="estoque"?("Posição em "+fD(hoje())):rng.lbl;
  doc.text(subtit,margemX,y);
  y+=3;
  linha();
  y+=2;

  if(tipo==="vendas"){
    var d=relConteudoVendas(rng);
    if(d.qtd===0){ texto("Nenhuma venda no período."); }
    for(var i=0;i<d.linhas.length;i++){
      var l=d.linhas[i];
      if(l.tipo==="dia"){ checarPagina(10); y+=1; texto(l.txt,{bold:true,size:11}); }
      else if(l.tipo==="item") texto(l.txt,{indent:4,right:BRL(l.val)});
      else { texto(l.txt,{indent:4,size:9.5,color:[140,130,120],right:BRL(l.val)}); y+=2; }
    }
    linha();
    texto("Total vendido",{bold:true,size:12,right:BRL(d.total)});
    texto("Quantidade de brownies",{right:String(d.qtd)});
    var mk=Object.keys(d.mix);
    if(mk.length>0){
      y+=2;
      texto("Mix de produtos",{bold:true});
      for(var i=0;i<mk.length;i++) texto(mk[i],{indent:4,right:String(d.mix[mk[i]])});
    }
  }
  else if(tipo==="financeiro"){
    var d=relConteudoFinanceiro(rng);
    texto("Total vendido",{right:BRL(d.totVendido)});
    texto("Recebido",{bold:true,color:[30,110,70],right:BRL(d.recebido)});
    texto("Pendente",{bold:true,color:[160,110,20],right:BRL(d.pendente)});
    if(d.clientesArr.length>0){
      y+=3; linha();
      texto("Pendências por cliente",{bold:true});
      for(var i=0;i<d.clientesArr.length;i++) texto(d.clientesArr[i].nome,{indent:4,right:BRL(d.clientesArr[i].val)});
    }
  }
  else if(tipo==="estoque"){
    var d=relConteudoEstoque();
    var ordem=["Tradicional","Clássico","Premium"];
    for(var t=0;t<ordem.length;t++){
      var itens=d.porTipo[ordem[t]];
      if(itens.length===0) continue;
      y+=1;
      texto(ordem[t],{bold:true,size:11});
      for(var i=0;i<itens.length;i++){
        var lb=itens[i].sabor?itens[i].sabor:ordem[t];
        texto(lb,{indent:4,right:String(itens[i].qtd)});
      }
    }
    linha();
    texto("Total em estoque",{bold:true,size:12,right:d.total+" brownies"});
    if(d.baixos.length>0){
      y+=3;
      texto("Estoque baixo",{bold:true,color:[180,120,20]});
      for(var i=0;i<d.baixos.length;i++){
        var lbBaixo=d.baixos[i].sabor?d.baixos[i].sabor:d.baixos[i].tipo;
        texto(lbBaixo,{indent:4,color:[180,120,20],right:d.baixos[i].qtd+" restante(s)"});
      }
    }
  }
  else if(tipo==="despesas"){
    var d=relConteudoDespesas(rng);
    if(d.lista.length===0){ texto("Nenhuma despesa no período."); }
    for(var i=0;i<d.lista.length;i++){
      var x=d.lista[i];
      texto(fD(x.data)+" — "+x.descricao,{size:9.5,right:BRL(x.valor)});
      texto(x.categoria||"Outros",{indent:4,size:8.5,color:[140,130,120],lh:6});
    }
    if(d.catArr.length>0){
      y+=2; linha();
      texto("Por categoria",{bold:true});
      for(var i=0;i<d.catArr.length;i++) texto(d.catArr[i].k,{indent:4,right:BRL(d.catArr[i].v)});
    }
    linha();
    texto("Total em despesas",{bold:true,size:12,right:BRL(d.total)});
  }

  y+=6;
  doc.setFont("helvetica","italic");
  doc.setFontSize(9);
  doc.setTextColor(150,140,130);
  checarPagina(8);
  doc.text("@brownieliciadoces  ·  Gerado em "+fD(hoje()),margemX,y);

  var nomeArquivo="brownielicia_"+tipo+"_"+hoje()+".pdf";

  // No Safari em modo PWA "standalone" (instalado na tela de início),
  // doc.save() tenta simular um clique num link de download, e isso
  // costuma falhar silenciosamente (não existe "onde" o arquivo cair).
  // Por isso, sempre que o navegador permitir, usamos o compartilhamento
  // nativo (Share Sheet do iOS/Android) com o PDF como arquivo — o mesmo
  // mecanismo já usado para enviar o extrato com logo. Isso deixa a
  // própria pessoa escolher "Salvar em Arquivos", enviar por WhatsApp, etc.
  var blob=doc.output("blob");
  if(navigator.share && navigator.canShare){
    try{
      var file=new File([blob],nomeArquivo,{type:"application/pdf"});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:"Brownielícia — "+relTitulo(tipo)}).catch(function(err){
          if(err && err.name!=="AbortError") doc.save(nomeArquivo);
        });
        return;
      }
    }catch(e){ /* cai no fallback abaixo */ }
  }
  doc.save(nomeArquivo);
}

function mDespesa(el){
  var editId=el?el.getAttribute("data-id"):null;
  var d=editId?DESPESAS.find(function(x){return x.id==editId;}):null;
  var h='<div class="modal-title">'+(d?"Editar":"Nova")+' Despesa</div>';
  h+='<div class="fg"><div class="lbl">Descrição</div><input class="inp" id="gd-desc" placeholder="Ex: Forno novo, cartão de visita..." value="'+(d?d.descricao:"")+'"></div>';
  h+='<div class="fg"><div class="lbl">Categoria</div><select class="inp" id="gd-cat">';
  for(var i=0;i<DESP_CATEGORIAS.length;i++){
    h+='<option value="'+DESP_CATEGORIAS[i]+'"'+(d&&d.categoria===DESP_CATEGORIAS[i]?" selected":"")+'>'+DESP_CATEGORIAS[i]+'</option>';
  }
  h+='</select></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
  h+='<div class="fg"><div class="lbl">Valor (R$)</div><input class="inp" type="number" id="gd-valor" min="0" step="0.01" value="'+(d?d.valor:"")+'"></div>';
  h+='<div class="fg"><div class="lbl">Data</div><input class="inp" type="date" id="gd-data" value="'+(d?d.data:hoje())+'"></div>';
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;">';
  h+='<button class="btn btn-secondary" onclick="fM()">Cancelar</button>';
  h+='<button class="btn btn-primary" onclick="sDespesa(\''+(editId||"")+'\')">Salvar</button>';
  h+='</div>';
  if(d){
    h+='<button class="btn btn-secondary" style="margin-top:8px;color:var(--red);" onclick="delDespesa(\''+editId+'\')">Excluir Despesa</button>';
  }
  aM(h);
}

function sDespesa(editId){
  var descricao=document.getElementById("gd-desc").value.trim();
  var categoria=document.getElementById("gd-cat").value;
  var valor=parseFloat(document.getElementById("gd-valor").value);
  var data=document.getElementById("gd-data").value;

  if(!descricao||isNaN(valor)||valor<=0||!data){
    alert("Preencha descrição, valor e data corretamente.");
    return;
  }

  if(editId){
    var d=DESPESAS.find(function(x){return x.id==editId;});
    if(d){ d.descricao=descricao; d.categoria=categoria; d.valor=valor; d.data=data; }
  } else {
    DESPESAS.push({id:Date.now(), descricao:descricao, categoria:categoria, valor:valor, data:data});
  }
  salvarDespesas();
  fM();
  pgG();
}

function delDespesa(id){
  confirmar("Excluir esta despesa?", function(){
    DESPESAS=DESPESAS.filter(function(d){return d.id!=id;});
    salvarDespesas();
    fM();
    pgG();
  });
}

//  ESTOQUE
// ══════════════════════════════════════════════
// Cada item: {key:"Tipo|Sabor", qtd:numero}
var ESTOQUE = [];
function estoqueKey(tipo,sabor){ return tipo+"|"+(sabor||""); }
function estoqueLabel(key){
  var p=key.split("|");
  return p[1] ? p[0]+" — "+p[1] : p[0];
}
function estoqueGet(tipo,sabor){
  var key=estoqueKey(tipo,sabor);
  var item=ESTOQUE.find(function(e){return e.key===key;});
  return item?item.qtd:0;
}
function estoqueSet(tipo,sabor,qtd){
  var key=estoqueKey(tipo,sabor);
  var item=ESTOQUE.find(function(e){return e.key===key;});
  if(item) item.qtd=qtd;
  else ESTOQUE.push({key:key,qtd:qtd});
}
function estoqueAdd(tipo,sabor,delta){
  var key=estoqueKey(tipo,sabor);
  var item=ESTOQUE.find(function(e){return e.key===key;});
  if(item) item.qtd+=delta;
  else ESTOQUE.push({key:key,qtd:delta});
}

//  UTILITARIOS
// ══════════════════════════════════════════════
function BRL(v){ return "R$ "+v.toFixed(2).replace(".",","); }
function hoje(){
  var d=new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function pad(n){ return n<10?"0"+n:n; }
function fD(s){
  var p=s.split("-");
  var d=new Date(+p[0],+p[1]-1,+p[2]);
  return DIAS[d.getDay()]+", "+pad(+p[2])+"/"+pad(+p[1]);
}
function cN(id){ var c=CLI.find(function(x){return x.id===id;}); return c?c.nome:"?"; }
function cB(id){ return CLI.find(function(x){return x.id===id;})||null; }

// ══════════════════════════════════════════════
//  FINANCEIRO
// ══════════════════════════════════════════════
function totalComprasCli(cid){
  return VND.filter(function(v){return v.cid===cid;}).reduce(function(s,v){return s+v.preco;},0);
}
function totalPagoCli(cid){
  var pags = PAG.filter(function(p){return p.cid===cid;}).reduce(function(s,p){return s+p.valor;},0);
  var hora = VND.filter(function(v){return v.cid===cid&&v.pago;}).reduce(function(s,v){return s+v.preco;},0);
  return pags + hora;
}
function devidoCli(cid){
  var d = totalComprasCli(cid) - totalPagoCli(cid);
  return d > 0 ? d : 0;
}
function creditoCli(cid){
  var d = totalPagoCli(cid) - totalComprasCli(cid);
  return d > 0 ? d : 0;
}

function excluirCli(el){
  var id=+el.getAttribute("data-cid");
  var c=cB(id);
  if(!c)return;
  confirmar("Excluir "+c.nome+"? Isso também remove o histórico de vendas dele.", function(){
    CLI=CLI.filter(function(x){return x.id!==id;});
    VND=VND.filter(function(v){return v.cid!==id;});
    PAG=PAG.filter(function(p){return p.cid!==id;});
    cliA=null;
    salvar();render();
  });
}
function ir(p){
  pgAtual=p;
  var pgs=document.querySelectorAll(".pg");
  for(var i=0;i<pgs.length;i++) pgs[i].classList.remove("on");
  var tis=document.querySelectorAll(".ti");
  for(var i=0;i<tis.length;i++) tis[i].classList.remove("on");
  var pg=document.getElementById("pg"+p);
  if(pg) pg.classList.add("on");
  var tabBtn=document.getElementById("tb-"+p);
  if(tabBtn) tabBtn.classList.add("on");
  // se a pagina ativa veio do menu "Mais" (estoque/precos), deixa o botao "Mais" marcado tambem
  var maisItem=document.getElementById("sd-"+p);
  var tbMais=document.getElementById("tb-mais");
  if(maisItem && tbMais) tbMais.classList.add("on");
  // marca item correspondente dentro do menu lateral, se existir
  var sdItens=document.querySelectorAll(".sd-item");
  for(var i=0;i<sdItens.length;i++) sdItens[i].classList.remove("on");
  if(maisItem) maisItem.classList.add("on");
  var m=document.getElementById("main");
  if(m) m.scrollTop=0;
  render();
}

// ══════════════════════════════════════════════
//  CONFIRMACAO CUSTOMIZADA (substitui confirm() nativo,
//  que pode falhar silenciosamente em PWA standalone no iOS)
// ══════════════════════════════════════════════
var _confirmCallback=null;
function confirmar(mensagem, callback){
  _confirmCallback=callback;
  var h='<div class="modal-title">Confirmar</div>';
  h+='<div style="font-size:14px;color:var(--modal-text);margin-bottom:20px;line-height:1.5;">'+mensagem+'</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  h+='<button class="btn btn-secondary" onclick="_confirmCallback=null;fM();">Cancelar</button>';
  h+='<button class="btn btn-danger" onclick="_execConfirm()">Confirmar</button>';
  h+='</div>';
  aM(h);
}
function _execConfirm(){
  var cb=_confirmCallback;
  _confirmCallback=null;
  fM();
  if(cb) cb();
}

//  RENDER HEADER
// ══════════════════════════════════════════════
var hdFiltro="mes";
var hdMesEsc="", hdAnoEsc="";
function hdRange(){
  var hj=hoje();
  if(hdFiltro==="hoje") return {de:hj,ate:hj,lbl:"Hoje"};
  if(hdFiltro==="mes"){
    var d=new Date();
    var de=d.getFullYear()+"-"+pad(d.getMonth()+1)+"-01";
    return {de:de,ate:hj,lbl:MESES[d.getMonth()]};
  }
  if(hdFiltro==="mesesc"){
    var y=hdAnoEsc||new Date().getFullYear();
    var m=hdMesEsc||(new Date().getMonth()+1);
    var de=y+"-"+pad(m)+"-01";
    var ultimoDia=new Date(y,m,0).getDate();
    var ate=y+"-"+pad(m)+"-"+pad(ultimoDia);
    return {de:de,ate:ate,lbl:MESES[m-1]+" "+y};
  }
  return {de:"0000-00-00",ate:"9999-99-99",lbl:"Total"};
}
function renderHD(){
  var rng=hdRange();
  var vndF=VND.filter(function(v){return v.data>=rng.de&&v.data<=rng.ate;});
  var pagF=PAG.filter(function(p){return p.data>=rng.de&&p.data<=rng.ate;});
  var rec=0, pen=0;
  for(var i=0;i<vndF.length;i++){
    if(vndF[i].pago) rec+=vndF[i].preco;
    else pen+=vndF[i].preco;
  }
  for(var i=0;i<pagF.length;i++) rec+=pagF[i].valor;
  var hl=document.getElementById("h-lbl");
  if(hl) hl.textContent=rng.lbl;
  var hr=document.getElementById("h-r");
  if(hr) hr.textContent=BRL(rec);
  var hp=document.getElementById("h-p");
  if(hp){
    if(pen>0){ hp.style.display="block"; hp.textContent=BRL(pen)+" pendente"; }
    else hp.style.display="none";
  }
}
function mHD(){
  var h='<div class="modal-title">O Que Mostrar</div>';
  h+='<div class="fg"><div class="chips">';
  var opts=[{k:"hoje",l:"Hoje"},{k:"mes",l:"Mês Atual"},{k:"mesesc",l:"Escolher Mês"},{k:"tudo",l:"Total Geral"}];
  for(var i=0;i<opts.length;i++){
    h+='<div class="chip-modal'+(hdFiltro===opts[i].k?" on":"")+'" data-f="'+opts[i].k+'" onclick="selHdFiltro(this)">'+opts[i].l+'</div>';
  }
  h+='</div></div>';
  if(hdFiltro==="mesesc"){
    var anoAtual=new Date().getFullYear();
    h+='<div class="fg"><div class="lbl">Mes</div><div class="chips" id="hd-meses">';
    for(var m=1;m<=12;m++){
      h+='<div class="chip-modal'+((+hdMesEsc===m)?" on":"")+'" data-m="'+m+'" onclick="selHdMes(this)">'+MESES[m-1].slice(0,3)+'</div>';
    }
    h+='</div></div>';
    h+='<div class="fg"><div class="lbl">Ano</div><input class="inp" type="number" id="hd-ano" value="'+(hdAnoEsc||anoAtual)+'"></div>';
  }
  h+='<button class="btn btn-primary" onclick="fecharHD()">Aplicar</button>';
  aM(h);
}
function selHdFiltro(el){
  hdFiltro=el.getAttribute("data-f");
  mHD();
}
function selHdMes(el){
  hdMesEsc=+el.getAttribute("data-m");
  mHD();
}
function fecharHD(){
  var anoEl=document.getElementById("hd-ano");
  if(anoEl&&anoEl.value) hdAnoEsc=+anoEl.value;
  fM();
  renderHD();
}

// ══════════════════════════════════════════════
//  PG DIARIO
// ══════════════════════════════════════════════
function pgD(){
  var map={};
  for(var i=0;i<VND.length;i++){
    if(!map[VND[i].data])map[VND[i].data]=[];
    map[VND[i].data].push(VND[i]);
  }
  var dias=Object.keys(map).sort().reverse();
  if(diaA===null && dias.length>0) diaA=dias[0];
  var h="";

  if(dias.length===0){
    h+='<div class="empty"><div class="empty-title">Nenhuma venda registrada</div>';

    h+='</div>';
    h+='<div style="text-align:right;">';
    h+='<div style="font-size:16px;font-weight:800;color:'+(isA?"#F4ECD8":"var(--td)")+';">'+BRL(tot)+'</div>';
    if(pen>0) h+='<span class="badge badge-pend" style="margin-top:3px;">'+BRL(pen)+'</span>';
    else h+='<span class="badge badge-pago" style="margin-top:3px;">Pago</span>';
    h+='</div></div>';

    if(isA){
      // Group by client
      var byC={};
      for(var i=0;i<itens.length;i++){
        if(!byC[itens[i].cid]) byC[itens[i].cid]=[];
        byC[itens[i].cid].push(itens[i]);
      }
      h+='<div class="day-card-body">';
      for(var cid in byC){
        var ls=byC[cid], cli=cB(+cid);
        h+='<div class="client-row">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
        h+='<div style="display:flex;align-items:center;gap:8px;">';
        h+='<div class="av" style="width:30px;height:30px;font-size:13px;background:'+(cli?cli.cor:"#6B3A1F")+';font-weight:700;">'+cN(+cid)[0]+'</div>';
        h+='<span style="font-size:14px;font-weight:700;color:#1A0C04;">'+cN(+cid)+'</span>';
        h+='</div>';
        h+='<button class="btn-sm btn-sm-pay" data-cid="'+cid+'" data-d="'+data+'" onclick="event.stopPropagation();pagarTodosEl(this)">Pagar todos</button>';
        h+='</div>';
        for(var i=0;i<ls.length;i++){

          if(v.obs) h+='<div style="font-size:11px;color:#7A5030;font-style:italic;margin-top:2px;">'+v.obs+'</div>';
          h+='</div>';
          h+='<span style="font-size:14px;font-weight:700;color:#1A0C04;flex-shrink:0;">'+BRL(v.preco)+'</span>';
          h+='</div>';
          h+='<div class="item-row-actions">';
          if(v.pago) h+='<button class="btn-sm badge-pago-btn" onclick="event.stopPropagation();confirmarDespagar('+v.id+')">✓ Pago</button>';
          else h+='<button class="btn-sm btn-sm-pay" onclick="event.stopPropagation();pagar('+v.id+')">Pagar</button>';
          h+='<button class="btn-sm" style="background:rgba(90,58,26,.1);color:#5A3A1A;" data-vid="'+v.id+'" onclick="event.stopPropagation();mEV(this)">Editar</button>';

          h+='</div></div>';
        }
        h+='</div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }
  document.getElementById("pgd").innerHTML='<div class="sect">Vendas por Dia</div>'+h;
}

function diasAtras(n){
  var d=new Date();
  d.setDate(d.getDate()-n);
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function inicioSemana(){
  var d=new Date();
  var diff=d.getDate()-d.getDay();
  d.setDate(diff);
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function inicioMes(){
  var d=new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-01";
}
var filtroR="mes";
var filtroDe="", filtroAte="";
function setFiltroR(f){
  filtroR=f;
  if(f==="custom"){
    abrirFiltroCustom();
    return;
  }
  pgR();
}
function abrirFiltroCustom(){
  var h='<div class="modal-title">Período Personalizado</div>';
  h+='<div class="fg"><div class="lbl">De</div><input class="inp" type="date" id="fr-de" value="'+(filtroDe||hoje())+'"></div>';
  h+='<div class="fg"><div class="lbl">Até</div><input class="inp" type="date" id="fr-ate" value="'+(filtroAte||hoje())+'"></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  h+='<button class="btn btn-secondary" onclick="fM()">Cancelar</button>';
  h+='<button class="btn btn-primary" onclick="aplicarFiltroCustom()">Aplicar</button>';
  h+='</div>';
  aM(h);
}
function aplicarFiltroCustom(){
  filtroDe=(document.getElementById("fr-de")||{}).value||hoje();
  filtroAte=(document.getElementById("fr-ate")||{}).value||hoje();
  if(filtroDe>filtroAte){var t=filtroDe;filtroDe=filtroAte;filtroAte=t;}
  filtroR="custom";
  fM();
  pgR();
}
// retorna {de,ate} do mes anterior, limitando ao mesmo dia do mes atual
// (compara "1 a 27 de julho" com "1 a 27 de junho", nao o mes inteiro, para ser justo)
function rangeMesAnterior(){
  var d=new Date();
  var diaAtual=d.getDate();
  var mesAnt=new Date(d.getFullYear(),d.getMonth()-1,1);
  var ultimoDiaMesAnt=new Date(mesAnt.getFullYear(),mesAnt.getMonth()+1,0).getDate();
  var diaFinal=Math.min(diaAtual,ultimoDiaMesAnt);
  var de=mesAnt.getFullYear()+"-"+pad(mesAnt.getMonth()+1)+"-01";
  var ate=mesAnt.getFullYear()+"-"+pad(mesAnt.getMonth()+1)+"-"+pad(diaFinal);
  return {de:de,ate:ate};
}

function resumoComparacaoMes(totAtual,qtdAtual){
  var rngAnt=rangeMesAnterior();
  var vndAnt=VND.filter(function(v){return v.data>=rngAnt.de&&v.data<=rngAnt.ate;});
  var totAnt=0;
  for(var i=0;i<vndAnt.length;i++) totAnt+=vndAnt[i].preco;
  var qtdAnt=vndAnt.length;

  var d=new Date();
  var mesAntNome=MESES[(d.getMonth()-1+12)%12];

  if(totAnt===0 && qtdAnt===0){
    return '';
  }

  var varTot=totAnt>0?((totAtual-totAnt)/totAnt*100):(totAtual>0?100:0);
  var varQtd=qtdAnt>0?((qtdAtual-qtdAnt)/qtdAnt*100):(qtdAtual>0?100:0);
  var subiu=totAtual>=totAnt;
  var corClass=subiu?"":" neg";
  var seta=subiu?"▲":"▼";

  var h='<div class="card" style="margin-bottom:10px;">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--td);margin-bottom:4px;">Comparado a '+mesAntNome+'</div>';
  h+='<div style="font-size:11px;color:var(--tm);margin-bottom:12px;">Mesmo período do mês anterior (dia 1 ao dia '+(+rngAnt.ate.slice(-2))+')</div>';
  h+='<div class="lucro-grid">';
  h+='<div class="lucro-card'+corClass+'"><div class="lbl">Faturamento</div><div class="val">'+seta+' '+Math.abs(varTot).toFixed(0)+'%</div></div>';
  h+='<div class="lucro-card'+corClass+'"><div class="lbl">Brownies Vendidos</div><div class="val">'+seta+' '+Math.abs(varQtd).toFixed(0)+'%</div></div>';
  h+='</div>';
  h+='<div class="resumo-line" style="margin-top:8px;"><span class="lbl2">'+mesAntNome+' (mesmo período)</span><span class="val2">'+BRL(totAnt)+' &middot; '+qtdAnt+' brownies</span></div>';
  h+='</div>';
  return h;
}

function rangeFiltro(){
  var hj=hoje();
  if(filtroR==="hoje") return {de:hj,ate:hj,lbl:"Hoje"};
  if(filtroR==="semana") return {de:inicioSemana(),ate:hj,lbl:"Esta Semana"};
  if(filtroR==="mes") return {de:inicioMes(),ate:hj,lbl:"Este Mes"};
  if(filtroR==="custom") return {de:filtroDe,ate:filtroAte,lbl:fD(filtroDe)+" a "+fD(filtroAte)};
  return {de:"0000-00-00",ate:"9999-99-99",lbl:"Tudo"};
}

function pgR(){
  var rng=rangeFiltro();
  var vndF=VND.filter(function(v){return v.data>=rng.de&&v.data<=rng.ate;});
  var pagF=PAG.filter(function(p){return p.data>=rng.de&&p.data<=rng.ate;});

  var tot=0, rec=0, pen=0;
  for(var i=0;i<vndF.length;i++){ tot+=vndF[i].preco; if(vndF[i].pago)rec+=vndF[i].preco; else pen+=vndF[i].preco; }
  for(var i=0;i<pagF.length;i++) rec+=pagF[i].valor;

  // Filtro de período
  var filtros=[{k:"hoje",l:"Hoje"},{k:"semana",l:"Semana"},{k:"mes",l:"Mes"},{k:"tudo",l:"Tudo"},{k:"custom",l:"Escolher"}];
  var h='<div class="scroll-x" style="margin-bottom:14px;">';
  for(var i=0;i<filtros.length;i++){
    var f=filtros[i];
    var on=filtroR===f.k;
    h+='<div class="chip'+(on?" on":"")+'" style="flex-shrink:0;" data-f="'+f.k+'" onclick="setFiltroR(this.getAttribute(\'data-f\'))">'+f.l+'</div>';
  }
  h+='</div>';
  if(filtroR==="custom"){
    h+='<div style="font-size:12px;font-weight:600;color:var(--tm);margin-bottom:14px;margin-top:-6px;">'+rng.lbl+'</div>';
  }

  h+='<div class="stat-grid">';
  h+='<div class="stat-card"><div class="stat-card-lbl">Total Vendido</div><div class="stat-card-val">'+BRL(tot)+'</div><div class="stat-card-sub">'+vndF.length+' brownie'+(vndF.length===1?'':'s')+'</div></div>';
  h+='<div class="stat-card grn"><div class="stat-card-lbl">Recebido</div><div class="stat-card-val">'+BRL(rec)+'</div></div>';
  h+='<div class="stat-card amb"><div class="stat-card-lbl">Pendente</div><div class="stat-card-val">'+BRL(pen)+'</div></div>';
  var clientesNoPeriodo={};for(var i=0;i<vndF.length;i++)clientesNoPeriodo[vndF[i].cid]=1;
  h+='<div class="stat-card"><div class="stat-card-lbl">Clientes</div><div class="stat-card-val">'+Object.keys(clientesNoPeriodo).length+'</div></div>';
  h+='</div>';

  if(filtroR==="mes"){
    h+=resumoComparacaoMes(tot,vndF.length);
  }

  // Mix de produtos
  var tr=0,cl=0,pr=0;
  for(var i=0;i<vndF.length;i++){
    if(vndF[i].tipo==="Tradicional")tr++;
    else if(vndF[i].tipo==="Clássico")cl++;
    else pr++;
  }
  var tot2=vndF.length||1;
  h+='<div class="card" style="margin-bottom:10px;">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--td);margin-bottom:12px;">Mix de Produtos</div>';
  var mix=[{l:"Tradicional — R$ 6,00",v:tr,c:"var(--prod1)"},{l:"Clássico — R$ 7,00",v:cl,c:"var(--gold)"},{l:"Premium — R$ 8,00",v:pr,c:"var(--prod3)"}];
  for(var i=0;i<mix.length;i++){
    if(mix[i].v===0) continue;
    h+='<div style="margin-bottom:10px;">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
    h+='<span style="font-size:13px;font-weight:500;color:var(--ts);">'+mix[i].l+'</span>';
    h+='<span style="font-size:13px;font-weight:700;color:var(--td);">'+mix[i].v+' ('+Math.round(mix[i].v/tot2*100)+'%)</span>';
    h+='</div>';
    h+='<div class="pbar"><div class="pbar-fill" style="width:'+Math.round(mix[i].v/tot2*100)+'%;background:'+mix[i].c+';"></div></div>';
    h+='</div>';
  }
  h+='</div>';

  // Top sabores
  var sab={};
  for(var i=0;i<vndF.length;i++){
    var k=vndF[i].tipo==="Tradicional"?"Tradicional":vndF[i].sabor;
    if(!sab[k])sab[k]={n:0,r:0};
    sab[k].n++;sab[k].r+=vndF[i].preco;
  }
  var arr=Object.keys(sab).map(function(k){return{k:k,n:sab[k].n,r:sab[k].r};});
  arr.sort(function(a,b){return b.n-a.n;});
  h+='<div class="card" style="margin-bottom:10px;">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--td);margin-bottom:12px;">Ranking de Sabores</div>';
  for(var i=0;i<Math.min(5,arr.length);i++){
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">';
    h+='<div style="width:24px;height:24px;border-radius:50%;background:#3D1F0A;color:#F4ECD8;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+(i+1)+'</div>';
    h+='<div style="flex:1;">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;">';
    h+='<span style="font-size:13px;font-weight:600;color:var(--td);">'+arr[i].k+'</span>';

function sNovoSabor(){
  var nome=(document.getElementById("ns-nome")||{}).value||"";
  nome=nome.trim();
  if(!nome){alert("Digite o nome do sabor.");return;}
  if(!SABORES[nTipo])SABORES[nTipo]=[];
  var jaExiste=SABORES[nTipo].some(function(s){return s.toLowerCase()===nome.toLowerCase();});

  fM();
  pgA();

// ══════════════════════════════════════════════
//  PRECIFICACAO
// ══════════════════════════════════════════════
function precUnidLabel(u){
  var m={un:"un",g:"g",kg:"kg",ml:"ml",l:"L"};
  return m[u]||u;
}

function precCustoUnitarioIng(ing){
  if(!ing||!ing.qtd) return 0;
  return ing.valor/ing.qtd;
}

function precIngById(id){
  return PREC_ING.find(function(i){return i.id==id;});
}

// Custo de um item de receita (ingrediente + quantidade usada)
function precCustoItem(item){
  var ing=precIngById(item.ingId);
  if(!ing) return 0;
  return item.qtdUsada*precCustoUnitarioIng(ing);
}

// Custo total de uma receita (massa ou recheio) pela chave em PREC_RECEITAS
function precCustoReceitaTotal(chave){
  var r=PREC_RECEITAS[chave];
  if(!r) return 0;
  var total=0;
  for(var i=0;i<r.itens.length;i++) total+=precCustoItem(r.itens[i]);
  return total;
}

function precCustoMassaPorBrownie(){
  var total=precCustoReceitaTotal("massa");
  var producao=PREC_RECEITAS.massa.producao||1;
  return total/producao;
}

// recheio eh custo TOTAL do lote dividido pela producao daquele recheio (cada recheio pode ter sua propria producao,
// mas para simplificar usamos a mesma logica: custo total / qtd de brownies que aquele lote de recheio rende)
function precCustoRecheioPorBrownie(sabor){
  if(!sabor||!PREC_RECEITAS[sabor]) return 0;
  var total=precCustoReceitaTotal(sabor);
  var producao=PREC_RECEITAS[sabor].producao||1;
  return total/producao;
}

function precCustoExtrasPorBrownie(){
  var e=PREC_EXTRAS;
  return (+e.embalagem||0)+(+e.adesivo||0)+(+e.etiqueta||0)+(+e.sacola||0)+(+e.entrega||0)+(+e.outros||0);
}

function precCustoFixoTotalMes(){
  var f=PREC_FIXOS;
  return (+f.aluguel||0)+(+f.gas||0)+(+f.luz||0)+(+f.internet||0)+(+f.taxas||0)+(+f.outros||0);
}

// quantidade de brownies efetivamente vendidos no mes corrente (usa o mes do dispositivo)
function precQtdVendidaMesAtual(){
  var hj=hoje();
  var mesAtual=hj.slice(0,7); // "AAAA-MM"
  return VND.filter(function(v){return v.data.slice(0,7)===mesAtual;}).length;
}

// custo fixo mensal dividido pela producao real do mes; se nao houve venda ainda,
// usa a producao cadastrada da massa como estimativa para nao dividir por zero
function precCustoFixoPorBrownie(){
  var qtd=precQtdVendidaMesAtual();
  if(qtd===0) qtd=PREC_RECEITAS.massa.producao||1;
  return precCustoFixoTotalMes()/qtd;
}

// fator multiplicador para compensar perda/desperdicio na producao.
// Ex: 5% de perda -> fator 1.0526 (precisa produzir ~5.3% mais para entregar a quantidade desejada)
function precFatorPerda(){
  var p=(+PREC_PERDA||0)/100;
  if(p<=0) return 1;
  if(p>=0.95) p=0.95; // limite de seguranca para nao dividir por numero perto de zero
  return 1/(1-p);
}

function precCustoMassaPorBrownieComPerda(){
  return precCustoMassaPorBrownie()*precFatorPerda();
}
function precCustoRecheioPorBrownieComPerda(sabor){
  return precCustoRecheioPorBrownie(sabor)*precFatorPerda();
}

function precCustoFinalPorBrownie(sabor){
  return precCustoMassaPorBrownieComPerda()+precCustoRecheioPorBrownieComPerda(sabor)+precCustoExtrasPorBrownie()+precCustoFixoPorBrownie();
}

function precListaSabores(){
  // junta sabores dos dois grupos (Classico + Premium) que ja existem no app de vendas
  var lista=[];
  for(var k in SABORES){
    for(var i=0;i<SABORES[k].length;i++){
      if(lista.indexOf(SABORES[k][i])===-1) lista.push(SABORES[k][i]);
    }
  }
  return lista;
}

// custo real de UM brownie vendido, dado seu tipo e sabor (usa preco de venda real registrado na venda)
function precCustoRealVenda(tipo, sabor){
  var custMassa=precCustoMassaPorBrownieComPerda();
  var custRecheio=tipo==="Tradicional"?0:precCustoRecheioPorBrownieComPerda(sabor);
  var custExtras=precCustoExtrasPorBrownie();
  var custFixo=precCustoFixoPorBrownie();
  return custMassa+custRecheio+custExtras+custFixo;
}

// cruza as vendas reais do mes (VND) com os custos calculados, por tipo/sabor
// retorna: {faturamento, custoTotal, lucroTotal, qtd, porSabor:[{sabor,tipo,qtd,faturamento,custoUnit,custoTotal,lucroUnit,lucroTotal}]}
function precLucroRealMes(){
  var hj=hoje();
  var mesAtual=hj.slice(0,7);
  var vndMes=VND.filter(function(v){return v.data.slice(0,7)===mesAtual;});

  var grupos={}; // chave "Tipo|Sabor" -> {tipo,sabor,qtd,faturamento}
  for(var i=0;i<vndMes.length;i++){
    var v=vndMes[i];
    var key=v.tipo+"|"+(v.sabor||"");
    if(!grupos[key]) grupos[key]={tipo:v.tipo,sabor:v.sabor||"",qtd:0,faturamento:0};
    grupos[key].qtd++;
    grupos[key].faturamento+=v.preco;
  }

  var porSabor=[];
  var faturamentoTotal=0, custoTotal=0;
  for(var key in grupos){
    var g=grupos[key];
    var custoUnit=precCustoRealVenda(g.tipo,g.sabor);
    var custoGrupo=custoUnit*g.qtd;
    var lucroGrupo=g.faturamento-custoGrupo;
    porSabor.push({
      tipo:g.tipo, sabor:g.sabor, qtd:g.qtd, faturamento:g.faturamento,
      custoUnit:custoUnit, custoTotal:custoGrupo, lucroUnit:g.faturamento/g.qtd-custoUnit, lucroTotal:lucroGrupo
    });
    faturamentoTotal+=g.faturamento;
    custoTotal+=custoGrupo;
  }
  porSabor.sort(function(a,b){return b.lucroTotal-a.lucroTotal;});

  return {
    faturamento:faturamentoTotal, custoTotal:custoTotal, lucroTotal:faturamentoTotal-custoTotal,
    qtd:vndMes.length, porSabor:porSabor, custoFixoMes:precCustoFixoTotalMes()
  };
}

function BRLp(v){
  if(isNaN(v)) v=0;
  return "R$ "+v.toFixed(2).replace(".",",");
}

// ══════════════════════════════════════════════
//  EVOLUCAO DE CUSTOS (historico de precos de ingredientes)
// ══════════════════════════════════════════════

// custo unitario de UM ingrediente, na data informada (usa o snapshot mais
// recente cuja data seja <= dataISO; se nao houver nenhum snapshot anterior,
// usa o primeiro snapshot existente; se nao houver nenhum, usa o valor atual)
function precCustoUnitarioIngNaData(ingId,dataISO){
  var snaps=PREC_HIST_ING.filter(function(s){return s.ingId==ingId;}).sort(function(a,b){return a.data<b.data?-1:1;});
  if(snaps.length===0){
    var ing=precIngById(ingId);
    return ing?precCustoUnitarioIng(ing):0;
  }
  var valido=null;
  for(var i=0;i<snaps.length;i++){
    if(snaps[i].data<=dataISO) valido=snaps[i];
    else break;
  }
  if(!valido) valido=snaps[0]; // antes do primeiro snapshot, usa o mais antigo conhecido
  return valido.custoUnit;
}

// custo de uma receita inteira (massa ou recheio de um sabor) na data informada
function precCustoReceitaNaData(chave,dataISO){
  var r=PREC_RECEITAS[chave];
  if(!r) return 0;
  var total=0;
  for(var i=0;i<r.itens.length;i++){
    var item=r.itens[i];
    total+=item.qtdUsada*precCustoUnitarioIngNaData(item.ingId,dataISO);
  }
  return total;
}
function precCustoMassaPorBrownieNaData(dataISO){
  var total=precCustoReceitaNaData("massa",dataISO);
  var producao=PREC_RECEITAS.massa.producao||1;
  return total/producao;
}
function precCustoRecheioPorBrownieNaData(sabor,dataISO){
  if(!sabor||!PREC_RECEITAS[sabor]) return 0;
  var total=precCustoReceitaNaData(sabor,dataISO);
  var producao=PREC_RECEITAS[sabor].producao||1;
  return total/producao;
}
// custo final por brownie (massa + recheio, sem extras/fixos que nao variam por ingrediente)
// na data informada — usado para traçar a evolução de custo de cada sabor
function precCustoSaborNaData(sabor,dataISO){
  var custMassa=precCustoMassaPorBrownieNaData(dataISO);
  var custRecheio=sabor?precCustoRecheioPorBrownieNaData(sabor,dataISO):0;
  return custMassa+custRecheio;
}

// lista de datas (AAAA-MM-DD) em que QUALQUER ingrediente usado pela receita/sabor mudou de preco
function precDatasRelevantes(chave){
  var r=PREC_RECEITAS[chave];
  if(!r) return [];
  var ingIds={};
  for(var i=0;i<r.itens.length;i++) ingIds[r.itens[i].ingId]=1;
  if(chave!=="massa"){
    var rm=PREC_RECEITAS.massa;
    for(var i=0;i<rm.itens.length;i++) ingIds[rm.itens[i].ingId]=1;
  }
  var datas={};
  for(var i=0;i<PREC_HIST_ING.length;i++){
    if(ingIds[PREC_HIST_ING[i].ingId]) datas[PREC_HIST_ING[i].data]=1;
  }
  return Object.keys(datas).sort();
}

// serie {datas:[...], valores:[...]} do custo de um sabor (ou "massa") ao longo do tempo,
// incluindo sempre o ponto de hoje no final
function precSerieEvolucao(chave){
  var datas=precDatasRelevantes(chave);
  var hj=hoje();
  if(datas.indexOf(hj)===-1) datas.push(hj);
  var valores=datas.map(function(d){
    return chave==="massa"?precCustoMassaPorBrownieNaData(d):precCustoSaborNaData(chave,d);
  });
  return {datas:datas,valores:valores};
}

    {k:"lucro",l:"Lucro Real"},
    {k:"evolucao",l:"Evolução de Custos"},
    {k:"historico",l:"Cálculos Salvos"}
  ];
  for(var i=0;i<subs.length;i++){
    h+='<div class="subtab'+(precSub===subs[i].k?" on":"")+'" data-k="'+subs[i].k+'" onclick="precIrSub(this)">'+subs[i].l+'</div>';
  }

  if(precSub==="ing") h+=precPgIngredientes();

  else if(precSub==="evolucao") h+=precPgEvolucao();
  else if(precSub==="historico") h+=precPgHistorico();

  document.getElementById("pgp").innerHTML='<div class="sect">Precificação</div>'+h;
}

function sPrecIngrediente(editId){
  var nome=document.getElementById("pi-nome").value.trim();
  var qtd=parseFloat(document.getElementById("pi-qtd").value);
  var unidade=document.getElementById("pi-unidade").value;
  var valor=parseFloat(document.getElementById("pi-valor").value);

  if(!nome||!qtd||qtd<=0||isNaN(valor)||valor<0){
    alert("Preencha todos os campos corretamente.");
    return;
  }

  if(editId){
    var ing=precIngById(editId);
    if(ing){ ing.nome=nome; ing.qtd=qtd; ing.unidade=unidade; ing.valor=valor; }
  } else {
    PREC_ING.push({id:Date.now(), nome:nome, qtd:qtd, unidade:unidade, valor:valor});
  }
  precRegistrarHistIng(editId?precIngById(editId):PREC_ING[PREC_ING.length-1]);
  salvarPrecificacao();
  fM();
  pgP();
}

// registra um snapshot do ingrediente no historico de precos, na data de hoje.
// se ja existe um snapshot do MESMO ingrediente no MESMO dia, substitui em vez
// de duplicar (evita poluir o historico quando a pessoa corrige um erro de digitacao).
function precRegistrarHistIng(ing){
  if(!ing) return;
  var hj=hoje();
  var custoUnit=precCustoUnitarioIng(ing);
  var idx=PREC_HIST_ING.findIndex(function(h){return h.ingId==ing.id && h.data===hj;});
  var snap={ingId:ing.id, data:hj, nome:ing.nome, qtd:ing.qtd, unidade:ing.unidade, valor:ing.valor, custoUnit:custoUnit};
  if(idx>=0) PREC_HIST_ING[idx]=snap;
  else PREC_HIST_ING.push(snap);
}

function precDelIngrediente(el){
  var id=el.getAttribute("data-id");
  confirmar("Excluir este ingrediente? Ele será removido de qualquer receita ou recheio que o utilize.", function(){

    // remove tambem dos itens de receita que o referenciam
    for(var k in PREC_RECEITAS){
      PREC_RECEITAS[k].itens=PREC_RECEITAS[k].itens.filter(function(it){return it.ingId!=id;});
    }
    salvarPrecificacao();
    pgP();
  });
}

// gera um grafico de linha simples em SVG, sem dependencias externas
function precSvgEvolucao(serie){
  var w=300, h=140, padL=44, padR=12, padT=14, padB=24;
  var innerW=w-padL-padR, innerH=h-padT-padB;
  var max=Math.max.apply(null,serie.valores), min=Math.min.apply(null,serie.valores);
  if(max===min){ max=max+1; min=Math.max(0,min-1); }
  var n=serie.valores.length;
  function px(i){ return padL+(n<=1?0:(i/(n-1))*innerW); }
  function py(v){ return padT+innerH-((v-min)/(max-min))*innerH; }

  var pontos=[];
  for(var i=0;i<n;i++) pontos.push(px(i)+","+py(serie.valores[i]));
  var linha=pontos.join(" ");

  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:140px;" preserveAspectRatio="none">';
  // linhas guia horizontais (min e max)
  svg+='<line x1="'+padL+'" y1="'+py(max)+'" x2="'+(w-padR)+'" y2="'+py(max)+'" stroke="rgba(90,58,26,.12)" stroke-width="1"/>';
  svg+='<line x1="'+padL+'" y1="'+py(min)+'" x2="'+(w-padR)+'" y2="'+py(min)+'" stroke="rgba(90,58,26,.12)" stroke-width="1"/>';
  svg+='<text x="2" y="'+(py(max)+4)+'" font-size="9" fill="#8A6B4E">'+BRLp(max)+'</text>';
  svg+='<text x="2" y="'+(py(min)+4)+'" font-size="9" fill="#8A6B4E">'+BRLp(min)+'</text>';
  // linha do grafico
  svg+='<polyline points="'+linha+'" fill="none" stroke="#B8862B" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  // pontos
  for(var i=0;i<n;i++){

function selChip(el,groupId,hiddenId){
  var group=document.getElementById(groupId);
  if(group){
    var chips=group.querySelectorAll?group.querySelectorAll(".chip"):[];
  }
  // Reset all chips in this group by walking siblings
  var parent=el.parentNode;
  if(parent&&parent.children){
    for(var i=0;i<parent.children.length;i++) parent.children[i].classList.remove("on");
  }
  el.classList.add("on");
  var hid=document.getElementById(hiddenId||(groupId+"-val"));
  if(hid) hid.value=el.getAttribute("data-cid")||el.getAttribute("data-s")||"";
}
function selTipoEdit(el){

  el.classList.add("on");
  var tipo=el.getAttribute("data-t");

  var c=cB(cid); if(!c||!c.tel)return;

function gerarRelatorio(el){
  var cid=+el.getAttribute("data-cid");
  var modo=el.getAttribute("data-modo");
  var c=cB(cid); if(!c||!c.tel)return;
  var DIAS3=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
  var dev=devidoCli(cid);

  var vs = modo==="pendentes"
    ? VND.filter(function(v){return v.cid===cid&&!v.pago;})
    : VND.filter(function(v){return v.cid===cid;});

  var msg="\ud83c\udf6b *BROWNIEL\u00cdCIA*\n";
  msg+="\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n";
  msg+="Ol\u00e1, *"+c.nome+"*!\n\n";

  if(vs.length===0){
    var msgVazio = modo==="pendentes" ? "N\u00e3o h\u00e1 pedidos em aberto no momento.\n" : "Nenhum pedido registrado ainda.\n";
    msg+=msgVazio;
    msg+="\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n";
    msg+="Qualquer d\u00favida, estou \u00e0 disposi\u00e7\u00e3o.\n@brownieliciadoces";
    previewR(cid, msg);
    return;
  }

  msg += modo==="pendentes" ? "*Pedidos em aberto:*\n\n" : "*Histórico de pedidos:*\n\n";

  var mesMap={};
  for(var i=0;i<vs.length;i++){
    var mm=vs[i].data.slice(0,7);
    if(!mesMap[mm])mesMap[mm]=[];
    mesMap[mm].push(vs[i]);
  }
  var meses=Object.keys(mesMap).sort();

  for(var mi=0;mi<meses.length;mi++){
    var ms=meses[mi],ym=ms.split("-");
    msg+="\ud83d\udcc5 *"+MESES[+ym[1]-1].toUpperCase()+" "+ym[0]+"*\n\n";
    var vm=mesMap[ms];
    var tMesPend=0, tMesPago=0;
    var dMap={};
    for(var i=0;i<vm.length;i++){
      if(!dMap[vm[i].data])dMap[vm[i].data]=[];
      dMap[vm[i].data].push(vm[i]);
      if(vm[i].pago) tMesPago+=vm[i].preco; else tMesPend+=vm[i].preco;
    }
    var dias=Object.keys(dMap).sort();
    for(var di=0;di<dias.length;di++){
      var dp=dias[di].split("-");
      var dobj=new Date(+dp[0],+dp[1]-1,+dp[2]);
      msg+=pad(+dp[2])+"/"+pad(+dp[1])+"/"+dp[0]+" - "+DIAS3[dobj.getDay()]+"\n";
      var ditens=dMap[dias[di]];
      for(var i=0;i<ditens.length;i++){
        var v=ditens[i];
        var lb=v.tipo==="Tradicional"?"Tradicional":v.tipo+" - "+v.sabor;
        msg+="  "+(i+1)+". "+lb+" "+BRL(v.preco)+"\n";
      }
      msg+="\n";
    }
    if(modo==="pendentes"){
      msg+="Pendente "+MESES3[+ym[1]-1]+": *"+BRL(tMesPend)+"*\n\n";
    } else {
      msg+="Total "+MESES3[+ym[1]-1]+": *"+BRL(tMesPend+tMesPago)+"*";
      if(tMesPend>0) msg+=" (Pendente: "+BRL(tMesPend)+")";
      msg+="\n\n";
    }
  }

  msg+="\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n";
  if(modo==="tudo"){
    var totGeral=totalComprasCli(cid);
    var totPagoGeral=totalPagoCli(cid);
    msg+="*TOTAL GERAL: "+BRL(totGeral)+"*\n";
    msg+="\u2705 *Pago: "+BRL(totPagoGeral)+"*\n";
    // Lista os pagamentos registrados (PAG) com data
    var pagsCli=PAG.filter(function(p){return p.cid===cid;}).sort(function(a,b){return a.data<b.data?-1:1;});
    if(pagsCli.length>0){
      for(var i=0;i<pagsCli.length;i++){
        var dp2=pagsCli[i].data.split("-");
        msg+="   "+pad(+dp2[2])+"/"+pad(+dp2[1])+"/"+dp2[0]+" - "+BRL(pagsCli[i].valor);
        var formaPag=pagsCli[i].forma||pagsCli[i].obs||"";
        if(formaPag) msg+=" ("+formaPag+")";
        msg+="\n";
      }
    }
    // Itens marcados como pago individualmente, com a data da venda
    var itensPagos=VND.filter(function(v){return v.cid===cid&&v.pago;}).sort(function(a,b){return a.data<b.data?-1:1;});
    if(itensPagos.length>0){
      for(var i=0;i<itensPagos.length;i++){
        var v2=itensPagos[i];
        var dp3=v2.data.split("-");
        var lb2=v2.tipo==="Tradicional"?"Tradicional":v2.sabor;
        msg+="   "+pad(+dp3[2])+"/"+pad(+dp3[1])+"/"+dp3[0]+" - "+BRL(v2.preco)+" ("+lb2+")\n";
      }
    }
  }
  msg+="\u23f3 *Em aberto: "+BRL(dev)+"*\n";
  msg+="\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n";
  if(dev>0) msg+="Assim que efetuar o pagamento, por favor, envie o comprovante.\n";
  msg+="*Obrigada pela prefer\u00eancia!*\n";
  msg+="@brownieliciadoces";

  previewR(cid, msg);
}

function enviarRComLogo(){
  var c=cB(_previewCid);
  if(!c)return;
  var obs=(document.getElementById("pr-obs")||{}).value||"";
  var msg=_previewMsg;
  if(obs.trim()) msg+="\n\n"+obs.trim();
  var statusEl=document.getElementById("pr-share-msg");
  if(!navigator.share || !navigator.canShare){
    if(statusEl) statusEl.textContent="Compartilhamento com imagem não suportado neste navegador. Use o botão Enviar WhatsApp.";
    return;
  }
  try{
    var byteChars=atob(_logoB64);
    var byteNums=new Array(byteChars.length);
    for(var i=0;i<byteChars.length;i++) byteNums[i]=byteChars.charCodeAt(i);
    var byteArr=new Uint8Array(byteNums);
    var file=new File([byteArr],"brownielicia.png",{type:"image/png"});
    if(navigator.canShare({files:[file]})){
      navigator.share({files:[file],text:msg,title:"Brownielícia"}).catch(function(err){
        if(err && err.name!=="AbortError" && statusEl) statusEl.textContent="Não foi possível compartilhar. Use o botão Enviar WhatsApp.";
      });
    } else {
      if(statusEl) statusEl.textContent="Este navegador não permite compartilhar imagem + texto juntos. Use o botão Enviar WhatsApp.";
    }
  }catch(e){
    if(statusEl) statusEl.textContent="Não foi possível preparar a imagem. Use o botão Enviar WhatsApp.";
  }
}
function enviarR(){
  var c=cB(_previewCid);
  if(!c)return;
  var obs=(document.getElementById("pr-obs")||{}).value||"";
  var msg=_previewMsg;
  if(obs.trim()) msg+="\n\n"+obs.trim();
  var statusEl=document.getElementById("pr-copy-msg");

  // Este arquivo é aberto via file:// no Safari (colado direto na barra de
  // endereço), não por um servidor https://. Nesse contexto, o iOS bloqueia
  // por segurança qualquer tentativa de abrir links https:///whatsapp://
  // a partir da página (sempre dá "Não foi possível abrir este link",
  // independente do formato do link ou de como o JS chama window.open).
  // Por isso aqui só copiamos o texto; abrir o WhatsApp é manual.
  var copiouOk = copiarTextoSincrono(msg);
  if(statusEl){
    statusEl.textContent = copiouOk
      ? "Texto copiado! Agora troque para o WhatsApp e cole a mensagem na conversa do cliente."
      : "Não foi possível copiar automaticamente. Toque e mantenha pressionado o texto acima para copiar manualmente.";
  }
}

function copiarTextoSincrono(texto){
  // Usa o método de fallback (execCommand) diretamente, pois ele é síncrono
  // e mantém o gesto do usuário válido para o window.open() que vem a seguir.
  // navigator.clipboard.writeText() é assíncrono (retorna Promise) e gastaria
  // o gesto do usuário antes do window.open() rodar.
  try{
    var ta=document.createElement("textarea");
    ta.value=texto;
    ta.style.position="fixed";
    ta.style.opacity="0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    var ok=document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }catch(e){
    return false;
  }
}

var _store={};
function _set(k,v){try{localStorage.setItem(k,v);}catch(e){_store[k]=v;}}
function _get(k){try{return localStorage.getItem(k);}catch(e){return _store[k]||null;}}

var BACKUP_KEYS = ["bl_cli","bl_vnd","bl_pag","bl_nextId","bl_sabores","bl_estoque",
  "bl_precIng","bl_precReceitas","bl_precExtras","bl_precProduto","bl_precPrecos",
  "bl_precFixos","bl_precHistorico","bl_precHistIng","bl_tema","bl_despesas","bl_precPerda"];

function exportarBackup(){
  try{
    var dados={};
    for(var i=0;i<BACKUP_KEYS.length;i++){
      var k=BACKUP_KEYS[i];
      var v=_get(k);
      if(v!==null && v!==undefined) dados[k]=v;
    }
    var pacote={
      app:"Brownielicia",
      versao:"20260626014500",
      exportadoEm:new Date().toISOString(),
      dados:dados
    };
    var json=JSON.stringify(pacote,null,2);
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var dataStr=hoje().split("-").reverse().join("-"); // DD-MM-AAAA
    var a=document.createElement("a");
    a.href=url;
    a.download="brownielicia-backup-"+dataStr+".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    var statusEl=document.getElementById("backup-status");
    if(statusEl){ statusEl.style.color="var(--grn)"; statusEl.textContent="Backup exportado com sucesso!"; }
  }catch(e){
    var statusEl=document.getElementById("backup-status");
    if(statusEl){ statusEl.style.color="var(--red)"; statusEl.textContent="Erro ao exportar: "+e.message; }
  }
}

function importarBackup(inputEl){
  var file=inputEl.files && inputEl.files[0];
  if(!file) return;
  var statusEl=document.getElementById("backup-status");
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var pacote=JSON.parse(e.target.result);
      if(!pacote || !pacote.dados || pacote.app!=="Brownielicia"){
        if(statusEl){ statusEl.style.color="var(--red)"; statusEl.textContent="Arquivo inválido. Selecione um backup exportado pelo Brownielícia."; }
        return;
      }
      var dataInfo=pacote.exportadoEm?new Date(pacote.exportadoEm).toLocaleDateString("pt-BR"):"data desconhecida";
      confirmar("Importar este backup (exportado em "+dataInfo+") vai substituir TODOS os dados atuais do app (vendas, clientes, precificação). Esta ação não pode ser desfeita. Continuar?", function(){
        try{
          for(var k in pacote.dados){
            _set(k, pacote.dados[k]);
          }
          if(statusEl){ statusEl.style.color="var(--grn)"; statusEl.textContent="Backup importado! Recarregando o app..."; }
          setTimeout(function(){ location.reload(); }, 1200);
        }catch(err){
          if(statusEl){ statusEl.style.color="var(--red)"; statusEl.textContent="Erro ao importar: "+err.message; }
        }
      });
    }catch(err){
      if(statusEl){ statusEl.style.color="var(--red)"; statusEl.textContent="Não foi possível ler o arquivo. Verifique se é um backup válido."; }
    }
    inputEl.value="";
  };
  reader.onerror=function(){
    if(statusEl){ statusEl.style.color="var(--red)"; statusEl.textContent="Erro ao ler o arquivo."; }
  };
  reader.readAsText(file);
}

function carregar(){
  try{
    var c=_get("bl_cli");
    var v=_get("bl_vnd");
    var p=_get("bl_pag");
    var n=_get("bl_nextId");
    var s=_get("bl_sabores");
    if(c)CLI=JSON.parse(c);
    if(v)VND=JSON.parse(v);
    if(p)PAG=JSON.parse(p);
    if(n)nextId=+n;
    if(s){
      var parsed=JSON.parse(s);
      // Mescla sabores salvos com os padroes, sem duplicar
      for(var k in parsed){
        if(!SABORES[k])SABORES[k]=[];
        for(var i=0;i<parsed[k].length;i++){
          if(SABORES[k].indexOf(parsed[k][i])===-1) SABORES[k].push(parsed[k][i]);
        }
      }
    }
  }catch(e){}
}

  h+='<div class="chip-modal'+(tema.modo==="claro"?" on":"")+'" data-modo="claro" onclick="selModo(this)">Modo Dia</div>';

  h+='<div class="fg"><div class="lbl">Tom de Destaque (dourado/caramelo)</div><div style="display:flex;flex-wrap:wrap;gap:10px;">';

  }
  h+='</div></div>';

  h+='<div class="fg"><div class="lbl">Tom Principal (cacau/marrom)</div><div style="display:flex;flex-wrap:wrap;gap:10px;">';
  for(var i=0;i<paletaBr.length;i++){
    var c=paletaBr[i];
    var on=brAtual.toLowerCase()===c.toLowerCase();
    h+='<div data-c="'+c+'" onclick="selBr(this)" style="width:34px;height:34px;border-radius:50%;background:'+c+';cursor:pointer;border:3px solid '+(on?"#FFFFFF":"transparent")+';box-shadow:0 0 0 1px rgba(0,0,0,.15);"></div>';
  }

  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">';

function forcarAtualizacao(){
  confirmar("Isso vai recarregar o app para garantir que você está usando a versão mais recente. Seus dados não serão perdidos. Continuar?", function(){
    location.reload(true);
  });
}
function selModo(el){
  tema.modo=el.getAttribute("data-modo");
  salvarTema();
  mTema();
}
function selGold(el){
  var c=el.getAttribute("data-c");
  if(tema.modo==="claro"){ tema.goldClaro=c; tema.gold2Claro=c; }
  else { tema.goldEscuro=c; tema.gold2Escuro=c; }
  salvarTema();
  mTema();
}
function selBr(el){
  var c=el.getAttribute("data-c");
  if(tema.modo==="claro"){ tema.brClaro=c; tema.br2Claro=c; }
  else { tema.brEscuro=c; tema.br2Escuro=c; }
  salvarTema();
  mTema();
}
function restaurarTema(){
  tema=Object.assign({}, TEMA_PADRAO, {modo:tema.modo});
  salvarTema();
  mTema();
}
