function sInsumo(editId){
  var nome=document.getElementById("ins-nome").value.trim();
  var embalagem=document.getElementById("ins-emb").value.trim()||"pacote";
  var atual=parseInt(document.getElementById("ins-atual").value,10);
  var minima=parseInt(document.getElementById("ins-minima").value,10);

  if(!nome||isNaN(atual)||atual<0||isNaN(minima)||minima<0){
    alert("Preencha o nome e as quantidades corretamente.");
    return;
  }

  var pesoPacote=parseFloat(document.getElementById("ins-pesopacote").value);
  var pesoUnidade=document.getElementById("ins-pesounidade").value;
  var precoPacote=parseFloat(document.getElementById("ins-precopacote").value);
  var temCusto = pesoPacote>0 && !isNaN(precoPacote) && precoPacote>=0;

  var nutriCamposIns=["kcal","carb","acucar","acucarAdic","proteina","gordTotal","gordSat","gordTrans","fibra","sodio"];
  var nutriIns={}, temNutriIns=false;
  for(var i=0;i<nutriCamposIns.length;i++){
    var elIns=document.getElementById("ins-n-"+nutriCamposIns[i]);
    var vIns=elIns?parseFloat(elIns.value):NaN;
    if(!isNaN(vIns)){ nutriIns[nutriCamposIns[i]]=vIns; temNutriIns=true; }
    else nutriIns[nutriCamposIns[i]]=0;
  }

  var it;
  if(editId){
    it=insumoById(+editId);
    if(it){ it.nome=nome; it.embalagem=embalagem; it.qtdAtual=atual; it.qtdMinima=minima; }
  } else {
    it={id:nextInsumoId++, nome:nome, embalagem:embalagem, qtdAtual:atual, qtdMinima:minima};
    INSUMOS.push(it);
  }

  if(temCusto || temNutriIns){
    it.pesoPacote=temCusto?pesoPacote:(it.pesoPacote>0?it.pesoPacote:100);
    it.pesoUnidade=temCusto?pesoUnidade:(it.pesoUnidade||"g");
    it.precoPacote=temCusto?precoPacote:(it.precoPacote||0);
    syncInsumoParaPrecificacao(it, temNutriIns?nutriIns:null);
  }

  salvarInsumos();
  fM();
  pgI();
}

// cria ou atualiza o ingrediente correspondente na Precificacao a partir
// dos dados de custo (e, se informada, nutricao) do insumo, evitando cadastro duplicado
function syncInsumoParaPrecificacao(it, nutri){
  if(!(it.pesoPacote>0) || isNaN(it.precoPacote) || it.precoPacote<0) return;
  var ing = it.precIngId ? precIngById(it.precIngId) : null;
  if(ing){
    ing.nome=it.nome; ing.qtd=it.pesoPacote; ing.unidade=it.pesoUnidade; ing.valor=it.precoPacote;
    if(nutri) ing.nutri=nutri;
  } else {
    ing={id:Date.now(), nome:it.nome, qtd:it.pesoPacote, unidade:it.pesoUnidade, valor:it.precoPacote};
    if(nutri) ing.nutri=nutri;
    PREC_ING.push(ing);
    it.precIngId=ing.id;
  }
  precRegistrarHistIng(ing);
  salvarPrecificacao();
}

function delInsumo(id){
  confirmar("Excluir este insumo?", function(){
    INSUMOS=INSUMOS.filter(function(i){return i.id!==id;});
    salvarInsumos();
    fM();
    pgI();
  });
}

function compartilharListaCompras(){
  var comprar=INSUMOS.filter(insumoPrecisaComprar).sort(function(a,b){return a.nome.localeCompare(b.nome);});
  if(comprar.length===0){ alert("Nenhum insumo abaixo do mínimo agora."); return; }
  var msg="🛒 *Lista de Compras — Brownielícia*\n\n";
  for(var i=0;i<comprar.length;i++){
    var it=comprar[i];
    var falta=Math.round(it.qtdMinima-it.qtdAtual);
    msg+="• "+it.nome+" — "+falta+" "+insumoEmbLabel(it,falta!==1)+"\n";
  }
  msg+="\n@brownieliciadoces";
  copiarTextoSincrono(msg);
  var url="https://wa.me/?text="+encodeURIComponent(msg);
  window.open(url,"_blank");
}

function sPromo(editId){
  var nome=document.getElementById("pm-nome").value.trim();
  var tipoPromo=document.getElementById("pm-tipo").value;
  var tipoProduto=document.getElementById("pm-produto").value;
  if(!nome){ alert("Dê um nome para essa simulação."); return; }

  var obj={nome:nome, tipoPromo:tipoPromo, tipoProduto:tipoProduto};

  if(tipoPromo==="percentual"){
    var pct=parseFloat(document.getElementById("pm-percentual").value);
    if(isNaN(pct)||pct<0||pct>=100){ alert("Digite um percentual de desconto válido (0 a 99)."); return; }
    obj.percentual=pct;
  } else if(tipoPromo==="valorFixo"){
    var off=parseFloat(document.getElementById("pm-valoroff").value);
    if(isNaN(off)||off<0){ alert("Digite um valor de desconto válido."); return; }
    obj.valorOff=off;
  } else if(tipoPromo==="leve"){
    var compra=parseInt(document.getElementById("pm-compra").value,10);
    var leva=parseInt(document.getElementById("pm-leva").value,10);
    if(!compra||!leva||leva<compra){ alert('Confira as quantidades: "leva" precisa ser maior ou igual a "compre".'); return; }
    obj.compra=compra; obj.leva=leva;
  } else if(tipoPromo==="combo"){
    var qtd=parseInt(document.getElementById("pm-qtdcombo").value,10);
    var precoCombo=parseFloat(document.getElementById("pm-precocombo").value);
    if(!qtd||isNaN(precoCombo)||precoCombo<0){ alert("Confira a quantidade e o preço do kit."); return; }
    obj.qtdCombo=qtd; obj.precoCombo=precoCombo;
  }

  var qtdEstimadaVal=document.getElementById("pm-qtdestimada").value;
  obj.qtdEstimada = qtdEstimadaVal ? parseInt(qtdEstimadaVal,10) : "";

  var dataInicio=document.getElementById("pm-datainicio").value;
  var dataFim=document.getElementById("pm-datafim").value;
  if(dataInicio && dataFim && dataFim<dataInicio){
    alert('A data "Válido até" precisa ser igual ou posterior à data "Válido a partir de".');
    return;
  }
  obj.dataInicio=dataInicio||"";
  obj.dataFim=dataFim||"";

  if(editId){
    var pr=promoById(+editId);
    if(pr) Object.assign(pr, obj);
  } else {
    obj.id=nextPromoId++;
    obj.ativa=false;
    PROMOCOES.push(obj);
  }
  salvarPromocoes();
  fM();
  pgO();
}

//  PRECIFICACAO
// ══════════════════════════════════════════════
function precUnidLabel(u){
  var m={un:"un",g:"g",kg:"kg",ml:"ml",l:"L"};
  return m[u]||u;
}

function precCustoUnitarioIng(ing){
  if(!ing||!ing.qtd) return 0;
  return ing.valor/ing.qtd;
}

function precIngById(id){
  return PREC_ING.find(function(i){return i.id==id;});
}

// Custo de um item de receita (ingrediente + quantidade usada)
function precCustoItem(item){
  var ing=precIngById(item.ingId);
  if(!ing) return 0;
  return item.qtdUsada*precCustoUnitarioIng(ing);
}

// Custo total de uma receita (massa ou recheio) pela chave em PREC_RECEITAS
function precCustoReceitaTotal(chave){
  var r=PREC_RECEITAS[chave];
  if(!r) return 0;
  var total=0;
  for(var i=0;i<r.itens.length;i++) total+=precCustoItem(r.itens[i]);
  return total;
}

function precCustoMassaPorBrownie(){
  var total=precCustoReceitaTotal("massa");
  var producao=PREC_RECEITAS.massa.producao||1;
  return total/producao;
}

// recheio eh custo TOTAL do lote dividido pela producao daquele recheio (cada recheio pode ter sua propria producao,
// mas para simplificar usamos a mesma logica: custo total / qtd de brownies que aquele lote de recheio rende)
function precCustoRecheioPorBrownie(sabor){
  if(!sabor||!PREC_RECEITAS[sabor]) return 0;
  var total=precCustoReceitaTotal(sabor);
  var producao=PREC_RECEITAS[sabor].producao||1;
  return total/producao;
}

function precCustoExtrasPorBrownie(){
  var e=PREC_EXTRAS;
  return (+e.embalagem||0)+(+e.adesivo||0)+(+e.etiqueta||0)+(+e.sacola||0)+(+e.entrega||0)+(+e.outros||0);
}

function precCustoFixoTotalMes(){
  var f=PREC_FIXOS;
  return (+f.aluguel||0)+(+f.gas||0)+(+f.luz||0)+(+f.internet||0)+(+f.taxas||0)+(+f.outros||0);
}

// quantidade de brownies efetivamente vendidos no mes corrente (usa o mes do dispositivo)
function precQtdVendidaMesAtual(){
  var hj=hoje();
  var mesAtual=hj.slice(0,7); // "AAAA-MM"
  return VND.filter(function(v){return v.data.slice(0,7)===mesAtual;}).length;
}

// custo fixo mensal dividido pela producao real do mes; se nao houve venda ainda,
// usa a producao cadastrada da massa como estimativa para nao dividir por zero
function precCustoFixoPorBrownie(){
  var qtd=precQtdVendidaMesAtual();
  if(qtd===0) qtd=PREC_RECEITAS.massa.producao||1;
  return precCustoFixoTotalMes()/qtd;
}

// fator multiplicador para compensar perda/desperdicio na producao.
// Ex: 5% de perda -> fator 1.0526 (precisa produzir ~5.3% mais para entregar a quantidade desejada)
function precFatorPerda(){
  var p=(+PREC_PERDA||0)/100;
  if(p<=0) return 1;
  if(p>=0.95) p=0.95; // limite de seguranca para nao dividir por numero perto de zero
  return 1/(1-p);
}

function precCustoMassaPorBrownieComPerda(){
  return precCustoMassaPorBrownie()*precFatorPerda();
}
function precCustoRecheioPorBrownieComPerda(sabor){
  return precCustoRecheioPorBrownie(sabor)*precFatorPerda();
}

function precCustoFinalPorBrownie(sabor){
  return precCustoMassaPorBrownieComPerda()+precCustoRecheioPorBrownieComPerda(sabor)+precCustoExtrasPorBrownie()+precCustoFixoPorBrownie();
}

var NUTRI_CAMPOS = ["kcal","carb","acucar","acucarAdic","proteina","gordTotal","gordSat","gordTrans","fibra","sodio"];
// nutricao de UM item de receita, escalada pela quantidade usada.
// para ingredientes "un", ing.nutri é por unidade; para os demais (g/ml), é por 100.
function precNutriItem(item){
  var ing=precIngById(item.ingId);
  if(!ing || !ing.nutri) return null;
  var fator = ing.unidade==="un" ? item.qtdUsada : (item.qtdUsada/100);
  var n=ing.nutri, r={};
  for(var i=0;i<NUTRI_CAMPOS.length;i++) r[NUTRI_CAMPOS[i]]=(n[NUTRI_CAMPOS[i]]||0)*fator;
  return r;
}
function precNutriZerado(){
  var z={}; for(var i=0;i<NUTRI_CAMPOS.length;i++) z[NUTRI_CAMPOS[i]]=0; return z;
}
// soma a nutricao de todos os itens de uma receita (massa ou um sabor de recheio)
function precNutriReceitaTotal(chave){
  var r=PREC_RECEITAS[chave];
  var total=precNutriZerado();
  if(!r) return total;
  for(var i=0;i<r.itens.length;i++){
    var n=precNutriItem(r.itens[i]);
    if(n) for(var k=0;k<NUTRI_CAMPOS.length;k++) total[NUTRI_CAMPOS[k]]+=n[NUTRI_CAMPOS[k]];
  }
  return total;
}
// nutricao estimada de UM brownie (massa dividida pela producao da massa, mais o
// recheio escolhido dividido pela producao daquele recheio, se houver)
function precNutriPorBrownie(sabor){
  var producaoMassa=(PREC_RECEITAS.massa&&PREC_RECEITAS.massa.producao)||1;
  var totalMassa=precNutriReceitaTotal("massa");
  var porBrownie=precNutriZerado();
  for(var i=0;i<NUTRI_CAMPOS.length;i++) porBrownie[NUTRI_CAMPOS[i]]=totalMassa[NUTRI_CAMPOS[i]]/producaoMassa;

  if(sabor && PREC_RECEITAS[sabor]){
    var producaoRecheio=PREC_RECEITAS[sabor].producao||1;
    var totalRecheio=precNutriReceitaTotal(sabor);
    for(var i=0;i<NUTRI_CAMPOS.length;i++) porBrownie[NUTRI_CAMPOS[i]]+=totalRecheio[NUTRI_CAMPOS[i]]/producaoRecheio;
  }
  return porBrownie;
}
// avisos de "alto em" seguindo os limites da rotulagem nutricional frontal (ANVISA,
// para alimentos solidos): acucares ADICIONADOS >=15g/100g, gordura saturada
// >=6g/100g, sodio >=600mg/100g.
function precNutriAvisos(porBrownie){
  var peso=(+PREC_PRODUTO.pesoFinal)||60;
  var fator=100/peso;
  var por100={};
  for(var i=0;i<NUTRI_CAMPOS.length;i++) por100[NUTRI_CAMPOS[i]]=porBrownie[NUTRI_CAMPOS[i]]*fator;
  return {
    por100:por100,
    acucar: por100.acucarAdic>=15,
    gordSat: por100.gordSat>=6,
    sodio: por100.sodio>=600
  };
}


function precListaSabores(){
  // junta sabores dos dois grupos (Classico + Premium) que ja existem no app de vendas
  var lista=[];
  for(var k in SABORES){
    for(var i=0;i<SABORES[k].length;i++){
      if(lista.indexOf(SABORES[k][i])===-1) lista.push(SABORES[k][i]);
    }
  }
  return lista;
}
function precTipoDoSabor(sabor){
  for(var k in SABORES){
    if(SABORES[k].indexOf(sabor)>=0) return k;
  }
  return "Clássico";
}

// custo real de UM brownie vendido, dado seu tipo e sabor (usa preco de venda real registrado na venda)
function precCustoRealVenda(tipo, sabor){
  var custMassa=precCustoMassaPorBrownieComPerda();
  var custRecheio=tipo==="Tradicional"?0:precCustoRecheioPorBrownieComPerda(sabor);
  var custExtras=precCustoExtrasPorBrownie();
  var custFixo=precCustoFixoPorBrownie();
  return custMassa+custRecheio+custExtras+custFixo;
}

// cruza as vendas reais do mes (VND) com os custos calculados, por tipo/sabor
// retorna: {faturamento, custoTotal, lucroTotal, qtd, porSabor:[{sabor,tipo,qtd,faturamento,custoUnit,custoTotal,lucroUnit,lucroTotal}]}
function precLucroRealMes(){
  var hj=hoje();
  var mesAtual=hj.slice(0,7);
  var vndMes=VND.filter(function(v){return v.data.slice(0,7)===mesAtual;});

  var grupos={}; // chave "Tipo|Sabor" -> {tipo,sabor,qtd,faturamento}
  for(var i=0;i<vndMes.length;i++){
    var v=vndMes[i];
    var key=v.tipo+"|"+(v.sabor||"");
    if(!grupos[key]) grupos[key]={tipo:v.tipo,sabor:v.sabor||"",qtd:0,faturamento:0};
    grupos[key].qtd++;
    grupos[key].faturamento+=v.preco;
  }

  var porSabor=[];
  var faturamentoTotal=0, custoTotal=0;
  for(var key in grupos){
    var g=grupos[key];
    var custoUnit=precCustoRealVenda(g.tipo,g.sabor);
    var custoGrupo=custoUnit*g.qtd;
    var lucroGrupo=g.faturamento-custoGrupo;
    porSabor.push({
      tipo:g.tipo, sabor:g.sabor, qtd:g.qtd, faturamento:g.faturamento,
      custoUnit:custoUnit, custoTotal:custoGrupo, lucroUnit:g.faturamento/g.qtd-custoUnit, lucroTotal:lucroGrupo
    });
    faturamentoTotal+=g.faturamento;
    custoTotal+=custoGrupo;
  }
  porSabor.sort(function(a,b){return b.lucroTotal-a.lucroTotal;});

  return {
    faturamento:faturamentoTotal, custoTotal:custoTotal, lucroTotal:faturamentoTotal-custoTotal,
    qtd:vndMes.length, porSabor:porSabor, custoFixoMes:precCustoFixoTotalMes()
  };
}

function BRLp(v){
  if(isNaN(v)) v=0;
  return "R$ "+v.toFixed(2).replace(".",",");
}

//  EVOLUCAO DE CUSTOS (historico de precos de ingredientes)
// ══════════════════════════════════════════════

// custo unitario de UM ingrediente, na data informada (usa o snapshot mais
// recente cuja data seja <= dataISO; se nao houver nenhum snapshot anterior,
// usa o primeiro snapshot existente; se nao houver nenhum, usa o valor atual)
function precCustoUnitarioIngNaData(ingId,dataISO){
  var snaps=PREC_HIST_ING.filter(function(s){return s.ingId==ingId;}).sort(function(a,b){return a.data<b.data?-1:1;});
  if(snaps.length===0){
    var ing=precIngById(ingId);
    return ing?precCustoUnitarioIng(ing):0;
  }
  var valido=null;
  for(var i=0;i<snaps.length;i++){
    if(snaps[i].data<=dataISO) valido=snaps[i];
    else break;
  }
  if(!valido) valido=snaps[0]; // antes do primeiro snapshot, usa o mais antigo conhecido
  return valido.custoUnit;
}

// custo de uma receita inteira (massa ou recheio de um sabor) na data informada
function precCustoReceitaNaData(chave,dataISO){
  var r=PREC_RECEITAS[chave];
  if(!r) return 0;
  var total=0;
  for(var i=0;i<r.itens.length;i++){
    var item=r.itens[i];
    total+=item.qtdUsada*precCustoUnitarioIngNaData(item.ingId,dataISO);
  }
  return total;
}
function precCustoMassaPorBrownieNaData(dataISO){
  var total=precCustoReceitaNaData("massa",dataISO);
  var producao=PREC_RECEITAS.massa.producao||1;
  return total/producao;
}
function precCustoRecheioPorBrownieNaData(sabor,dataISO){
  if(!sabor||!PREC_RECEITAS[sabor]) return 0;
  var total=precCustoReceitaNaData(sabor,dataISO);
  var producao=PREC_RECEITAS[sabor].producao||1;
  return total/producao;
}
// custo final por brownie (massa + recheio, sem extras/fixos que nao variam por ingrediente)
// na data informada — usado para traçar a evolução de custo de cada sabor
function precCustoSaborNaData(sabor,dataISO){
  var custMassa=precCustoMassaPorBrownieNaData(dataISO);
  var custRecheio=sabor?precCustoRecheioPorBrownieNaData(sabor,dataISO):0;
  return custMassa+custRecheio;
}

// lista de datas (AAAA-MM-DD) em que QUALQUER ingrediente usado pela receita/sabor mudou de preco
function precDatasRelevantes(chave){
  var r=PREC_RECEITAS[chave];
  if(!r) return [];
  var ingIds={};
  for(var i=0;i<r.itens.length;i++) ingIds[r.itens[i].ingId]=1;
  if(chave!=="massa"){
    var rm=PREC_RECEITAS.massa;
    for(var i=0;i<rm.itens.length;i++) ingIds[rm.itens[i].ingId]=1;
  }
  var datas={};
  for(var i=0;i<PREC_HIST_ING.length;i++){
    if(ingIds[PREC_HIST_ING[i].ingId]) datas[PREC_HIST_ING[i].data]=1;
  }
  return Object.keys(datas).sort();
}

// serie {datas:[...], valores:[...]} do custo de um sabor (ou "massa") ao longo do tempo,
// incluindo sempre o ponto de hoje no final
function precSerieEvolucao(chave){
  var datas=precDatasRelevantes(chave);
  var hj=hoje();
  if(datas.indexOf(hj)===-1) datas.push(hj);
  var valores=datas.map(function(d){
    return chave==="massa"?precCustoMassaPorBrownieNaData(d):precCustoSaborNaData(chave,d);
  });
  return {datas:datas,valores:valores};
}

function sPrecIngrediente(editId){
  var nome=document.getElementById("pi-nome").value.trim();
  var qtd=parseFloat(document.getElementById("pi-qtd").value);
  var unidade=document.getElementById("pi-unidade").value;
  var valor=parseFloat(document.getElementById("pi-valor").value);

  if(!nome||!qtd||qtd<=0||isNaN(valor)||valor<0){
    alert("Preencha todos os campos corretamente.");
    return;
  }

  var nutriCampos=["kcal","carb","acucar","acucarAdic","proteina","gordTotal","gordSat","gordTrans","fibra","sodio"];
  var nutri={};
  var temNutri=false;
  for(var i=0;i<nutriCampos.length;i++){
    var el=document.getElementById("pi-n-"+nutriCampos[i]);
    var v=el?parseFloat(el.value):NaN;
    if(!isNaN(v)){ nutri[nutriCampos[i]]=v; temNutri=true; }
    else nutri[nutriCampos[i]]=0;
  }

  if(editId){
    var ing=precIngById(editId);
    if(ing){ ing.nome=nome; ing.qtd=qtd; ing.unidade=unidade; ing.valor=valor; if(temNutri) ing.nutri=nutri; }
  } else {
    var novo={id:Date.now(), nome:nome, qtd:qtd, unidade:unidade, valor:valor};
    if(temNutri) novo.nutri=nutri;
    PREC_ING.push(novo);
  }
  precRegistrarHistIng(editId?precIngById(editId):PREC_ING[PREC_ING.length-1]);
  salvarPrecificacao();
  fM();
  pgP();
}

//  LEITURA DE RÓTULO POR FOTO (OCR, beta)
//  Usa a biblioteca gratuita Tesseract.js (roda no próprio celular, sem custo e
//  sem enviar a foto pra nenhum servidor). Carregada só quando a pessoa usa a
//  função pela primeira vez, e precisa de internet nesse primeiro uso.
// ══════════════════════════════════════════════
function carregarTesseract(cb){
  if(window.Tesseract){ cb(); return; }
  var s=document.createElement("script");
  s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
  s.onload=cb;
  s.onerror=function(){
    var st=document.getElementById("pi-ocr-status");
    if(st){ st.textContent="Não foi possível carregar o leitor de rótulos. Verifique sua internet e tente de novo."; st.style.color="var(--red)"; }
  };
  document.head.appendChild(s);
}

function processarFotoRotulo(inputEl){
  var file=inputEl.files && inputEl.files[0];
  if(!file) return;
  var st=document.getElementById("pi-ocr-status");
  if(st){ st.textContent="Carregando leitor de rótulos (só na primeira vez)..."; st.style.color="var(--tm)"; }

  carregarTesseract(function(){
    if(!window.Tesseract){ return; }
    if(st){ st.textContent="Lendo o rótulo... isso pode levar um tempinho."; }
    Tesseract.recognize(file, "por", {
      logger: function(m){
        if(st && m.status==="recognizing text"){
          st.textContent="Lendo o rótulo... "+Math.round((m.progress||0)*100)+"%";
        }
      }
    }).then(function(result){
      var valores=extrairNutricaoDoTexto(result.data.text || "");
      var qtdAchados=preencherCamposNutricao(valores);
      if(st){
        if(qtdAchados>0){
          st.textContent="Encontrei "+qtdAchados+" valor(es). Confira com atenção antes de salvar — a leitura automática pode errar números.";
          st.style.color="var(--grn)";
        } else {
          st.textContent="Não consegui reconhecer os valores dessa foto. Tente uma imagem mais nítida e reta, ou preencha manualmente.";
          st.style.color="var(--red)";
        }
      }
    }).catch(function(){
      if(st){ st.textContent="Não consegui ler essa foto. Tente novamente com mais luz e a tabela bem enquadrada."; st.style.color="var(--red)"; }
    });
  });
  inputEl.value="";
}

// procura, linha por linha do texto reconhecido, palavras-chave de cada nutriente
// e pega o primeiro número que aparecer logo em seguida (a coluna "por 100g",
// que normalmente vem primeiro nas tabelas brasileiras, como na foto de exemplo)
function extrairNutricaoDoTexto(texto){
  var linhas=texto.split("\n");
  var campos={
    kcal:["valor energetico","energetico","kcal"],
    carb:["carboidratos"],
    acucarAdic:["acucares adicionados","acucar adicionado"],
    acucar:["acucares totais","acucar total","acucares"],
    proteina:["proteinas"],
    gordTotal:["gorduras totais","gordura total"],
    gordSat:["gorduras saturadas","gordura saturada"],
    gordTrans:["gorduras trans","gordura trans"],
    fibra:["fibra alimentar","fibras alimentares"],
    sodio:["sodio"]
  };
  var resultado={};
  var ordem=["kcal","carb","acucarAdic","acucar","proteina","gordTotal","gordSat","gordTrans","fibra","sodio"];
  for(var c=0;c<ordem.length;c++){
    var campo=ordem[c];
    var keywords=campos[campo];
    for(var i=0;i<linhas.length;i++){
      if(resultado[campo]!==undefined) break;
      var linhaNorm=normalizarBusca(linhas[i]);
      var achou=false;
      for(var k=0;k<keywords.length;k++){
        if(linhaNorm.indexOf(normalizarBusca(keywords[k]))>=0){ achou=true; break; }
      }
      if(!achou) continue;
      var num=extrairPrimeiroNumeroDaLinha(linhas[i]);
      if(num===null && linhas[i+1]!==undefined) num=extrairPrimeiroNumeroDaLinha(linhas[i+1]);
      if(num!==null) resultado[campo]=num;
    }
  }
  return resultado;
}
function extrairPrimeiroNumeroDaLinha(linha){
  var m=linha.match(/(\d+[.,]\d+|\d+)/g);
  if(!m||m.length===0) return null;
  var v=parseFloat(m[0].replace(",","."));
  return isNaN(v)?null:v;
}
function preencherCamposNutricao(valores){
  return preencherCamposNutricaoComPrefixo(valores, "pi-n-");
}
function preencherCamposNutricaoComPrefixo(valores, prefixo){
  var qtd=0;
  for(var campo in valores){
    var el=document.getElementById(prefixo+campo);
    if(el){ el.value=valores[campo]; qtd++; }
  }
  return qtd;
}

// registra um snapshot do ingrediente no historico de precos, na data de hoje.
// se ja existe um snapshot do MESMO ingrediente no MESMO dia, substitui em vez
// de duplicar (evita poluir o historico quando a pessoa corrige um erro de digitacao).
function precRegistrarHistIng(ing){
  if(!ing) return;
  var hj=hoje();
  var custoUnit=precCustoUnitarioIng(ing);
  var idx=PREC_HIST_ING.findIndex(function(h){return h.ingId==ing.id && h.data===hj;});
  var snap={ingId:ing.id, data:hj, nome:ing.nome, qtd:ing.qtd, unidade:ing.unidade, valor:ing.valor, custoUnit:custoUnit};
  if(idx>=0) PREC_HIST_ING[idx]=snap;
  else PREC_HIST_ING.push(snap);
}

function precDelIngrediente(el){
  var id=el.getAttribute("data-id");
  confirmar("Excluir este ingrediente? Ele será removido de qualquer receita ou recheio que o utilize.", function(){
    PREC_ING=PREC_ING.filter(function(i){return i.id!=id;});
    // remove tambem dos itens de receita que o referenciam
    for(var k in PREC_RECEITAS){
      PREC_RECEITAS[k].itens=PREC_RECEITAS[k].itens.filter(function(it){return it.ingId!=id;});
    }
    salvarPrecificacao();
    pgP();
  });
}

  if(r.pesoProntoG===undefined) r.pesoProntoG=(r.producao||1)*(r.gramasPorBrownie||40);

  h+='<div class="resumo-line total" style="margin-top:6px;"><span class="lbl2">Custo do Recheio por Brownie</span><span class="val2">'+BRLp(custoUnit)+'</span></div>';

}
function precSelSabor(v){
  precSaborAtual=v;
  pgP();
}
function precRecalcularProducaoRecheio(){
  var r=PREC_RECEITAS[precSaborAtual];
  if(!r) return;
  var peso=+r.pesoProntoG||0, gpb=+r.gramasPorBrownie||40;
  r.producao=peso>0&&gpb>0?Math.round(peso/gpb):1;
  if(r.producao<1) r.producao=1;
}
function precSetPesoRecheio(v){
  var n=parseFloat(v);
  if(!PREC_RECEITAS[precSaborAtual]) return;
  PREC_RECEITAS[precSaborAtual].pesoProntoG=(n&&n>0)?n:1;
  precRecalcularProducaoRecheio();
  salvarPrecificacao();
  pgP();
}
function precSetGramasPorBrownieRecheio(v){
  var n=parseFloat(v);
  if(!PREC_RECEITAS[precSaborAtual]) return;
  PREC_RECEITAS[precSaborAtual].gramasPorBrownie=(n&&n>0)?n:40;
  precRecalcularProducaoRecheio();
  salvarPrecificacao();
  pgP();
}

function precSimuladorTamanhoHTML(sabor,custExtrasUnit,custFixoUnit){
  var tamanhoBase=+PREC_PRODUTO.tamanhoCm||6;
  var novoCm=+precTamanhoSimulado||5;

  var h='<div class="card">';
  h+='<div style="font-weight:700;color:var(--td);margin-bottom:4px;">📐 Simular Outro Tamanho</div>';
  h+='<div style="font-size:11.5px;color:var(--tm);margin-bottom:10px;">Se você cortar a mesma massa em pedaços de outro tamanho, o rendimento muda (pedaços menores = mais brownies da mesma forma). O cálculo usa a razão de área entre os dois tamanhos.</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end;margin-bottom:12px;">';
  h+='<div class="fg" style="margin-bottom:0;"><div class="lbl">Tamanho atual (cm)</div><input class="inp" value="'+tamanhoBase+'" disabled style="opacity:.6;"></div>';
  h+='<div class="fg" style="margin-bottom:0;"><div class="lbl">Simular tamanho (cm)</div><input class="inp" type="number" min="1" step="0.5" id="prec-tam-sim" value="'+novoCm+'" onchange="precSetTamanhoSimulado(this.value)" oninput="precSetTamanhoSimulado(this.value)"></div>';
  h+='</div>';

  if(tamanhoBase<=0||novoCm<=0){
    h+='</div>';
    return h;
  }

  var fatorArea=(tamanhoBase/novoCm)*(tamanhoBase/novoCm);
  var producaoMassaBase=PREC_RECEITAS.massa.producao||1;
  var producaoMassaNovo=Math.round(producaoMassaBase*fatorArea);
  var custoLoteMassa=precCustoReceitaTotal("massa")*precFatorPerda();
  var custMassaNovo=custoLoteMassa/(producaoMassaNovo||1);

  var custRecheioNovo=0, producaoRecheioNovo=0;
  if(sabor && PREC_RECEITAS[sabor]){
    var producaoRecheioBase=PREC_RECEITAS[sabor].producao||1;
    producaoRecheioNovo=Math.round(producaoRecheioBase*fatorArea);
    var custoLoteRecheio=precCustoReceitaTotal(sabor)*precFatorPerda();
    custRecheioNovo=custoLoteRecheio/(producaoRecheioNovo||1);
  }

  var custTotalNovo=custMassaNovo+custRecheioNovo+custExtrasUnit+custFixoUnit;

  h+='<div class="resumo-line"><span class="lbl2">Rendimento da massa em '+novoCm+'cm</span><span class="val2">'+producaoMassaNovo+' brownies</span></div>';
  if(sabor) h+='<div class="resumo-line"><span class="lbl2">Rendimento do recheio em '+novoCm+'cm</span><span class="val2">'+producaoRecheioNovo+' brownies</span></div>';
  h+='<div class="resumo-line"><span class="lbl2">Custo da Massa ('+novoCm+'cm)</span><span class="val2">'+BRLp(custMassaNovo)+'</span></div>';
  if(sabor) h+='<div class="resumo-line"><span class="lbl2">Custo do Recheio ('+novoCm+'cm)</span><span class="val2">'+BRLp(custRecheioNovo)+'</span></div>';
  h+='<div class="resumo-line"><span class="lbl2">Extras + Fixos (igual)</span><span class="val2">'+BRLp(custExtrasUnit+custFixoUnit)+'</span></div>';
  h+='<div class="resumo-line total"><span class="lbl2">CUSTO POR BROWNIE ('+novoCm+'cm)</span><span class="val2">'+BRLp(custTotalNovo)+'</span></div>';
  h+='<div style="font-size:10.5px;color:var(--tll);margin-top:6px;">Extras (embalagem etc.) e custo fixo foram mantidos iguais por brownie — ajuste manualmente se a embalagem for diferente para esse tamanho.</div>';

      if(ant>0){

        var seta=pct>=0?"▲":"▼";
        varCor=pct>0?"var(--red)":(pct<0?"var(--grn)":"var(--tm)");
        varTxt=seta+" "+Math.abs(pct).toFixed(1)+"% em relação ao ponto anterior";
      }

      varTxt="Primeiro registro conhecido";

    h+='<span class="lbl2">'+fD(serie.datas[i])+(isHoje?" (hoje)":"")+'</span>';
    h+='<span class="val2" style="text-align:right;">'+BRLp(val)+'<div style="font-size:10px;color:'+varCor+';font-weight:600;margin-top:2px;">'+varTxt+'</div></span>';
    h+='</div>';
  }
  h+='</div>';

  return h;
}

// gera um grafico de linha simples em SVG, sem dependencias externas
function precSvgEvolucao(serie){
  var w=300, h=140, padL=44, padR=12, padT=14, padB=24;
  var innerW=w-padL-padR, innerH=h-padT-padB;
  var max=Math.max.apply(null,serie.valores), min=Math.min.apply(null,serie.valores);
  if(max===min){ max=max+1; min=Math.max(0,min-1); }
  var n=serie.valores.length;
  function px(i){ return padL+(n<=1?0:(i/(n-1))*innerW); }
  function py(v){ return padT+innerH-((v-min)/(max-min))*innerH; }

  var pontos=[];
  for(var i=0;i<n;i++) pontos.push(px(i)+","+py(serie.valores[i]));
  var linha=pontos.join(" ");

  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:140px;" preserveAspectRatio="none">';
  // linhas guia horizontais (min e max)
  svg+='<line x1="'+padL+'" y1="'+py(max)+'" x2="'+(w-padR)+'" y2="'+py(max)+'" stroke="rgba(61,33,26,.12)" stroke-width="1"/>';
  svg+='<line x1="'+padL+'" y1="'+py(min)+'" x2="'+(w-padR)+'" y2="'+py(min)+'" stroke="rgba(61,33,26,.12)" stroke-width="1"/>';
  svg+='<text x="2" y="'+(py(max)+4)+'" font-size="9" fill="#8A6B4E">'+BRLp(max)+'</text>';
  svg+='<text x="2" y="'+(py(min)+4)+'" font-size="9" fill="#8A6B4E">'+BRLp(min)+'</text>';
  // linha do grafico
  svg+='<polyline points="'+linha+'" fill="none" stroke="#B8862B" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  // pontos
  for(var i=0;i<n;i++){
    svg+='<circle cx="'+px(i)+'" cy="'+py(serie.valores[i])+'" r="3.5" fill="#B8862B"/>';
  }
  svg+='</svg>';

  // legenda de datas (primeira e ultima, pra nao poluir em telas pequenas)
  svg+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tm);margin-top:2px;">';
  svg+='<span>'+fD(serie.datas[0])+'</span><span>'+fD(serie.datas[n-1])+'</span>';
  svg+='</div>';
  return svg;
}

var FREQ_SUGESTOES = ["Semanal","Quinzenal","Mensal","Sob encomenda"];
function fornEntregas(fid){
  return FORNECEDOR_ENTREGAS.filter(function(e){return e.fornecedorId===fid;}).sort(function(a,b){return a.data<b.data?1:-1;});
}
function fornPendente(fid){
  return FORNECEDOR_ENTREGAS.filter(function(e){return e.fornecedorId===fid&&!e.pago;}).reduce(function(s,e){return s+(+e.valorTotal||0);},0);
}
function fornProximaEntrega(f){
  var dias=freqParaDias(f.frequencia);
  if(!dias) return null;
  var entregas=fornEntregas(f.id);
  if(entregas.length===0) return null;
  var ultima=entregas[0].data;
  var d=new Date(ultima+"T00:00:00");
  d.setDate(d.getDate()+dias);
  return hoje2(d);
}
function hoje2(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }

var filtroFornecedor = "";
function filtrarFornecedores(v){
  filtroFornecedor = v;

  var el = document.getElementById("for-search");

}
function fornPrecoTipo(f, tipo){
  if(f.precos && f.precos[tipo]!==undefined && f.precos[tipo]!==null && f.precos[tipo]!=="") return +f.precos[tipo];
  if(f.preco!==undefined && f.preco!==null && f.preco!=="") return +f.preco; // compatibilidade com cadastros antigos (preco unico)
  var t=TIPOS.find(function(x){return x.t===tipo;});
  return t?t.p:0;
}
function fornPrecoLabel(f){
  var precos=TIPOS.map(function(t){return fornPrecoTipo(f,t.t);});
  var min=Math.min.apply(null,precos), max=Math.max.apply(null,precos);
  return min===max ? BRL(min) : (BRL(min)+" – "+BRL(max));
}
function pgF(){
  var h='<div class="card">';
  h+='<div style="font-size:13px;color:var(--tm);margin-bottom:12px;">Organize os lugares pra quem você entrega brownies pra revenda — cada um com seu preço, frequência e o que está pendente.</div>';
  h+='<button class="btn btn-primary" onclick="mFornecedor()">+ Novo Ponto de Revenda</button>';
  h+='</div>';

  if(FORNECEDORES.length===0){
    h+='<div class="empty"><div class="empty-title">Nenhum ponto de revenda cadastrado</div><div class="empty-sub">Adicione os mercadinhos, cafeterias ou pontos de venda pra quem você entrega.</div></div>';
    document.getElementById("pgf").innerHTML='<div class="sect">Revenda</div>'+h;
    return;
  }

  if(FORNECEDORES.length>4){
    h+='<div class="fg" style="margin-bottom:12px;"><input class="inp" id="for-search" placeholder="Buscar..." value="'+filtroFornecedor+'" oninput="filtrarFornecedores(this.value)"></div>';
  }
  var termo=normalizarBusca(filtroFornecedor);
  var lista=FORNECEDORES.slice().sort(function(a,b){return a.nome.localeCompare(b.nome);});
  if(termo) lista=lista.filter(function(f){return normalizarBusca(f.nome).indexOf(termo)>=0;});

  if(termo && lista.length===0){
    h+='<div class="empty"><div class="empty-title">Nenhum ponto de revenda encontrado</div><div class="empty-sub">Tente buscar por outro nome.</div></div>';
    document.getElementById("pgf").innerHTML='<div class="sect">Revenda</div>'+h;
    return;

function sFornecedor(editId){
  var nome=document.getElementById("for-nome").value.trim();
  var precos={};
  for(var i=0;i<TIPOS.length;i++){
    var v=parseFloat(document.getElementById("for-preco-"+i).value);
    if(isNaN(v)||v<0){ alert("Digite um preço válido para "+TIPOS[i].t+"."); return; }
    precos[TIPOS[i].t]=v;
  }
  var tel=document.getElementById("for-tel").value.trim();
  var frequencia=document.getElementById("for-freq").value.trim();
  var obs=document.getElementById("for-obs").value.trim();

  if(!nome){ alert("Digite o nome do ponto de revenda."); return; }

  if(editId){
    var f=FORNECEDORES.find(function(x){return x.id===+editId;});
    if(f){ f.nome=nome; f.precos=precos; delete f.preco; f.tel=tel; f.frequencia=frequencia; f.obs=obs; }
  } else {
    FORNECEDORES.push({id:nextFornecedorId++, nome:nome, precos:precos, tel:tel, frequencia:frequencia, obs:obs});
  }
  salvarFornecedores();
  fM();
  pgF();
}
function delFornecedor(id){
  confirmar("Excluir este ponto de revenda? As entregas registradas para ele também serão apagadas.", function(){
    FORNECEDORES=FORNECEDORES.filter(function(f){return f.id!==id;});
    FORNECEDOR_ENTREGAS=FORNECEDOR_ENTREGAS.filter(function(e){return e.fornecedorId!==id;});
    salvarFornecedores();
    salvarFornecedorEntregas();
    fM();
    pgF();
  });
}

function sEntrega(el){
  var fid=+el.getAttribute("data-id");
  var eidAttr=el.getAttribute("data-eid");
  var editId=eidAttr?+eidAttr:null;
  var data=document.getElementById("ent-data").value||hoje();
  var tipo=document.getElementById("ent-tipo").value;
  var sabor=tipo==="Tradicional"?"":(document.getElementById("ent-sabor").value||"");
  var qtd=parseInt(document.getElementById("ent-qtd").value,10);
  var preco=parseFloat(document.getElementById("ent-preco").value);
  var pago=document.getElementById("ent-pago").checked;

  if(!qtd||qtd<1){ alert("Digite uma quantidade válida."); return; }
  if(isNaN(preco)||preco<0){ alert("Digite um preço válido."); return; }

  var itens=entregaBatch.slice();
  itens.push({data:data, tipo:tipo, sabor:sabor, qtd:qtd, preco:preco});

  // confere estoque de cada item do lote (considerando a entrega antiga, se for edicao)
  var entregaAntiga=editId?FORNECEDOR_ENTREGAS.find(function(x){return x.id===editId;}):null;
  for(var i=0;i<itens.length;i++){
    var it=itens[i];
    var disponivel=estoqueGet(it.tipo,it.sabor);
    if(entregaAntiga && entregaAntiga.tipo===it.tipo && entregaAntiga.sabor===it.sabor){
      disponivel+=entregaAntiga.qtd;
    }
    if(it.qtd>disponivel){
      confirmar("Você tem "+disponivel+" "+(it.sabor||it.tipo)+" no estoque, mas está registrando "+it.qtd+". O estoque pode ficar negativo. Quer continuar mesmo assim?", function(){
        salvarEntregaLote(fid, editId, itens, pago);
      });
      return;
    }
  }
  salvarEntregaLote(fid, editId, itens, pago);
}
function salvarEntregaLote(fid, editId, itens, pago){
  var entregaAntiga=editId?FORNECEDOR_ENTREGAS.find(function(x){return x.id===editId;}):null;
  if(entregaAntiga) estoqueAdd(entregaAntiga.tipo, entregaAntiga.sabor, entregaAntiga.qtd);

  for(var i=0;i<itens.length;i++){
    var it=itens[i];
    if(editId && i===0){
      var e=FORNECEDOR_ENTREGAS.find(function(x){return x.id===editId;});
      if(e){
        e.data=it.data; e.tipo=it.tipo; e.sabor=it.sabor; e.qtd=it.qtd; e.precoUnit=it.preco;
        e.valorTotal=+(it.qtd*it.preco).toFixed(2); e.pago=pago;
      }
    } else {
      FORNECEDOR_ENTREGAS.push({
        id:nextEntregaId++, fornecedorId:fid, data:it.data, tipo:it.tipo, sabor:it.sabor,
        qtd:it.qtd, precoUnit:it.preco, valorTotal:+(it.qtd*it.preco).toFixed(2), pago:pago
      });
    }
    estoqueAdd(it.tipo, it.sabor, -it.qtd);
  }
  var dataFinal=itens[0].data;
  entregaBatch=[];
  salvarFornecedorEntregas();
  salvarEstoque();
  fM();
  pgF();
  setTimeout(function(){ mCompartilharEntrega(fid, dataFinal); }, 250);
}
function mCompartilharEntrega(fid, data){
  var f=FORNECEDORES.find(function(x){return x.id===fid;});
  if(!f) return;
  var h='<div class="modal-title">Entrega salva! 🎉</div>';
  h+='<div style="font-size:13px;color:var(--modal-text-muted);margin-bottom:16px;">Quer avisar o '+f.nome+' pelo WhatsApp com o resumo da entrega?</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  h+='<button class="btn btn-secondary" onclick="fM()">Agora não</button>';
  h+='<button class="btn btn-primary" onclick="fM();compartilharEntregasData('+fid+',\''+data+'\');">📱 Compartilhar</button>';
  h+='</div>';
  aM(h);
}
function compartilharEntregasData(fid, data){
  var f=FORNECEDORES.find(function(x){return x.id===fid;});
  if(!f) return;
  var entregas=FORNECEDOR_ENTREGAS.filter(function(e){return e.fornecedorId===fid&&e.data===data;});
  if(entregas.length===0) return;

  var totalQtd=0, totalValor=0, precosDistintos={};
  for(var i=0;i<entregas.length;i++){
    totalQtd+=entregas[i].qtd;
    totalValor+=entregas[i].valorTotal;
    precosDistintos[entregas[i].precoUnit]=true;
  }
  var chavesPreco=Object.keys(precosDistintos);
  var precoUnico=chavesPreco.length===1?parseFloat(chavesPreco[0]):null;

  var quando = data===hoje() ? "hoje" : ("no dia "+fD(data));
  var msg="Olá! Entrega realizada "+quando+" com sucesso. 🍫\n\n";
  msg+="📦 "+totalQtd+" brownies"+(PREC_PRODUTO&&PREC_PRODUTO.tamanho?" ("+PREC_PRODUTO.tamanho+")":"")+"\n";
  if(precoUnico!==null) msg+="💰 "+BRL(precoUnico)+" por unidade\n";
  msg+="💵 Total"+(entregas.every(function(e){return e.pago;})?" pago":"")+": "+BRL(totalValor)+"\n\n";
  msg+="Sabores entregues:\n";
  for(var i=0;i<entregas.length;i++){
    var e=entregas[i];
    var label=e.sabor||e.tipo;
    var emoji=SABOR_EMOJI[label]||"🍫";
    msg+=emoji+" "+e.qtd+" "+label+"\n";
  }
  msg+="\nQualquer coisa só me chamar, obrigada ☺️";
  msg+="\n\n@brownieliciadoces";

  copiarTextoSincrono(msg);
  var url="https://wa.me/"+(f.tel?("55"+f.tel.replace(/\D/g,"")):"")+"?text="+encodeURIComponent(msg);
  window.open(url,"_blank");
}
function delEntrega(id){

    var e=FORNECEDOR_ENTREGAS.find(function(x){return x.id===id;});

      estoqueAdd(e.tipo, e.sabor, e.qtd);
      FORNECEDOR_ENTREGAS=FORNECEDOR_ENTREGAS.filter(function(x){return x.id!==id;});
      salvarFornecedorEntregas();
      salvarEstoque();

    fM();
    pgF();

}

    h+='<div style="font-size:11.5px;color:var(--modal-text-muted);">'+BRL(e.valorTotal)+(e.pago?" · pago":" · pendente")+'</div>';
    h+='</div>';
    h+='<button class="btn-sm" style="background:var(--modal-overlay);color:var(--modal-text);" data-eid="'+e.id+'" onclick="mEntregaEditar(this)">Editar</button>';

}

function mPag(cid){
  var c=cB(cid); if(!c)return;
  var dev=devidoCli(cid);
  var h='<div class="modal-title">Registrar Pagamento</div>';
  h+='<div style="background:#EDE9CE;border-radius:10px;padding:12px;margin-bottom:16px;">';
  h+='<div style="font-size:13px;font-weight:600;color:#6F4D38;margin-bottom:2px;">'+c.nome+'</div>';
  if(dev>0) h+='<div style="font-size:16px;font-weight:800;color:#7A4A00;">Em aberto: '+BRL(dev)+'</div>';
  else h+='<div style="font-size:14px;font-weight:600;color:#1A5C2E;">Sem pendências</div>';
  h+='</div>';
  h+='<div class="fg"><div class="lbl">Valor recebido (R$)</div><input class="inp" type="number" id="pg-val" placeholder="0,00" step="0.01" value="'+(dev>0?dev:"")+'"></div>';
  h+='<div class="fg"><div class="lbl">Data</div><input class="inp" type="date" id="pg-data" value="'+hoje()+'"></div>';
  h+='<div class="fg"><div class="lbl">Forma de pagamento</div><input class="inp" type="text" id="pg-forma" placeholder="Pix, Especie, Cartao..."></div>';
  h+='<div class="fg"><div class="lbl">Nota interna (opcional, não aparece no relatório)</div><input class="inp" type="text" id="pg-obs" placeholder="Ex: pagamento dos brownies antigos"></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  h+='<button class="btn btn-secondary" onclick="fM()">Cancelar</button>';
  h+='<button class="btn btn-primary" onclick="sPag('+cid+')">Registrar</button>';
  h+='</div>';
  aM(h);
}
function sPag(cid){
  var val=parseFloat((document.getElementById("pg-val")||{}).value||"0");
  var data=(document.getElementById("pg-data")||{}).value||hoje();
  var forma=(document.getElementById("pg-forma")||{}).value||"";
  var obs=(document.getElementById("pg-obs")||{}).value||"";
  if(!val||val<=0){alert("Digite o valor.");return;}
  var newId=Math.max.apply(null,PAG.map(function(p){return p.id;}).concat([0]))+1;
  PAG.push({id:newId,cid:cid,data:data,valor:val,forma:forma,obs:obs});
  fM();
  var dev=devidoCli(cid);
  var cred=creditoCli(cid);
  var msg="Pagamento de "+BRL(val)+" registrado!";
  if(dev>0) msg+="\nAinda em aberto: "+BRL(dev);
  if(cred>0) msg+="\nCredito: "+BRL(cred);
  alert(msg);
  salvar();render();
}

function envR(cid){
  var c=cB(cid); if(!c||!c.tel)return;
  var h='<div class="modal-title">Relatorio WhatsApp</div>';
  h+='<div style="font-size:13px;color:var(--modal-text-muted);margin-bottom:16px;">O que deseja incluir no relatorio de '+c.nome+'?</div>';
  h+='<button class="btn btn-primary" style="margin-bottom:10px;" data-cid="'+cid+'" data-modo="pendentes" onclick="gerarRelatorio(this)">Apenas Pendentes</button>';
  h+='<button class="btn btn-secondary" style="margin-bottom:10px;" data-cid="'+cid+'" data-modo="tudo" onclick="gerarRelatorio(this)">Pagos e Pendentes</button>';
  h+='<button class="btn btn-secondary" onclick="fM()">Cancelar</button>';
  aM(h);
}
function gerarRelatorio(el){
  var cid=+el.getAttribute("data-cid");
  var modo=el.getAttribute("data-modo");
  var c=cB(cid); if(!c||!c.tel)return;
  var DIAS3=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
  var dev=devidoCli(cid);

  var vs = modo==="pendentes"
    ? VND.filter(function(v){return v.cid===cid&&!v.pago;})
    : VND.filter(function(v){return v.cid===cid;});

  var msg="\ud83c\udf6b *BROWNIEL\u00cdCIA*\n";
  msg+="\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n";
  msg+="Ol\u00e1, *"+c.nome+"*!\n\n";

  if(vs.length===0){
    var msgVazio = modo==="pendentes" ? "N\u00e3o h\u00e1 pedidos em aberto no momento.\n" : "Nenhum pedido registrado ainda.\n";
    msg+=msgVazio;
    msg+="\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n";
    msg+="Qualquer d\u00favida, estou \u00e0 disposi\u00e7\u00e3o.\n@brownieliciadoces";
    previewR(cid, msg);
    return;
  }

  msg += modo==="pendentes" ? "*Pedidos em aberto:*\n\n" : "*Histórico de pedidos:*\n\n";

  var mesMap={};
  for(var i=0;i<vs.length;i++){
    var mm=vs[i].data.slice(0,7);
    if(!mesMap[mm])mesMap[mm]=[];
    mesMap[mm].push(vs[i]);
  }
  var meses=Object.keys(mesMap).sort();

  for(var mi=0;mi<meses.length;mi++){
    var ms=meses[mi],ym=ms.split("-");
    msg+="\ud83d\udcc5 *"+MESES[+ym[1]-1].toUpperCase()+" "+ym[0]+"*\n\n";
    var vm=mesMap[ms];
    var tMesPend=0, tMesPago=0;
    var dMap={};
    for(var i=0;i<vm.length;i++){
      if(!dMap[vm[i].data])dMap[vm[i].data]=[];
      dMap[vm[i].data].push(vm[i]);
      if(vm[i].pago) tMesPago+=vm[i].preco; else tMesPend+=vm[i].preco;
    }
    var dias=Object.keys(dMap).sort();
    for(var di=0;di<dias.length;di++){
      var dp=dias[di].split("-");
      var dobj=new Date(+dp[0],+dp[1]-1,+dp[2]);
      msg+=pad(+dp[2])+"/"+pad(+dp[1])+"/"+dp[0]+" - "+DIAS3[dobj.getDay()]+"\n";
      var ditens=dMap[dias[di]];
      for(var i=0;i<ditens.length;i++){
        var v=ditens[i];
        var lb=v.tipo==="Tradicional"?"Tradicional":v.tipo+" - "+v.sabor;
        msg+="  "+(i+1)+". "+lb+" "+BRL(v.preco)+"\n";
      }
      msg+="\n";
    }
    if(modo==="pendentes"){
      msg+="Pendente "+MESES3[+ym[1]-1]+": *"+BRL(tMesPend)+"*\n\n";
    } else {
      msg+="Total "+MESES3[+ym[1]-1]+": *"+BRL(tMesPend+tMesPago)+"*";
      if(tMesPend>0) msg+=" (Pendente: "+BRL(tMesPend)+")";
      msg+="\n\n";
    }
  }

  msg+="\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n";
  if(modo==="tudo"){
    var totGeral=totalComprasCli(cid);
    var totPagoGeral=totalPagoCli(cid);
    msg+="*TOTAL GERAL: "+BRL(totGeral)+"*\n";
    msg+="\u2705 *Pago: "+BRL(totPagoGeral)+"*\n";
    // Lista os pagamentos registrados (PAG) com data
    var pagsCli=PAG.filter(function(p){return p.cid===cid;}).sort(function(a,b){return a.data<b.data?-1:1;});
    if(pagsCli.length>0){
      for(var i=0;i<pagsCli.length;i++){
        var dp2=pagsCli[i].data.split("-");
        msg+="   "+pad(+dp2[2])+"/"+pad(+dp2[1])+"/"+dp2[0]+" - "+BRL(pagsCli[i].valor);
        var formaPag=pagsCli[i].forma||pagsCli[i].obs||"";
        if(formaPag) msg+=" ("+formaPag+")";
        msg+="\n";
      }
    }
    // Itens marcados como pago individualmente, com a data da venda
    var itensPagos=VND.filter(function(v){return v.cid===cid&&v.pago;}).sort(function(a,b){return a.data<b.data?-1:1;});
    if(itensPagos.length>0){
      for(var i=0;i<itensPagos.length;i++){
        var v2=itensPagos[i];
        var dp3=v2.data.split("-");
        var lb2=v2.tipo==="Tradicional"?"Tradicional":v2.sabor;
        msg+="   "+pad(+dp3[2])+"/"+pad(+dp3[1])+"/"+dp3[0]+" - "+BRL(v2.preco)+" ("+lb2+")\n";
      }
    }
  }
  msg+="\u23f3 *Em aberto: "+BRL(dev)+"*\n";
  msg+="\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n";
  if(dev>0) msg+="Assim que efetuar o pagamento, por favor, envie o comprovante.\n";
  msg+="*Obrigada pela prefer\u00eancia!*\n";
  msg+="@brownieliciadoces";

  previewR(cid, msg);
}

  aM(h);
}

function getLogoInfo(){
  var custom=_get("bl_logoCustom");
  if(custom){
    if(custom.indexOf("base64,")>=0){
      return {dataUrl:custom, base64:custom.split(",")[1], format:"PNG", mime:"image/png", ext:"png"};
    }
    // compatibilidade com uma versão anterior que guardava só o base64, sem prefixo (assumido PNG)
    return {dataUrl:"data:image/png;base64,"+custom, base64:custom, format:"PNG", mime:"image/png", ext:"png"};
  }
  return {dataUrl:"data:image/png;base64,"+_logoB64, base64:_logoB64, format:"PNG", mime:"image/png", ext:"png"};
}
function getLogoAtual(){ return getLogoInfo().base64; }
function trocarLogo(inputEl){
  var file=inputEl.files && inputEl.files[0];
  if(!file) return;
  if(!file.type || file.type.indexOf("image/")!==0){
    alert("Selecione um arquivo de imagem (PNG ou JPG).");
    inputEl.value="";
    return;
  }
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      try{
        var maxLado=640; // tamanho generoso, com boa qualidade no PDF, sem pesar no armazenamento
        var w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
        if(!w||!h) throw new Error("dimensoes invalidas");
        var escala=Math.min(1, maxLado/Math.max(w,h));
        var cw=Math.max(1,Math.round(w*escala)), ch=Math.max(1,Math.round(h*escala));
        var canvas=document.createElement("canvas");
        canvas.width=cw; canvas.height=ch;
        var ctx=canvas.getContext("2d");
        ctx.clearRect(0,0,cw,ch);
        ctx.drawImage(img,0,0,cw,ch);
        var dataUrl=canvas.toDataURL("image/png");
        _set("bl_logoCustom", dataUrl);
        pgT();
      }catch(err){
        alert("Não foi possível processar essa imagem. Tente outra foto.");
      }
    };
    img.onerror=function(){ alert("Não foi possível ler a imagem selecionada."); };
    img.src=e.target.result;
  };
  reader.onerror=function(){ alert("Não foi possível ler a imagem selecionada."); };
  reader.readAsDataURL(file);
  inputEl.value="";
}

function enviarRComLogo(){
  var c=cB(_previewCid);
  if(!c)return;
  var obs=(document.getElementById("pr-obs")||{}).value||"";
  var msg=_previewMsg;
  if(obs.trim()) msg+="\n\n"+obs.trim();
  var statusEl=document.getElementById("pr-share-msg");
  if(!navigator.share || !navigator.canShare){
    if(statusEl) statusEl.textContent="Compartilhamento com imagem não suportado neste navegador. Use o botão Enviar WhatsApp.";
    return;
  }
  try{
    var byteChars=atob(getLogoAtual());
    var byteNums=new Array(byteChars.length);
    for(var i=0;i<byteChars.length;i++) byteNums[i]=byteChars.charCodeAt(i);
    var byteArr=new Uint8Array(byteNums);
    var file=new File([byteArr],"brownielicia.png",{type:"image/png"});
    if(navigator.canShare({files:[file]})){
      navigator.share({files:[file],text:msg,title:"Brownielícia"}).catch(function(err){
        if(err && err.name!=="AbortError" && statusEl) statusEl.textContent="Não foi possível compartilhar. Use o botão Enviar WhatsApp.";
      });
    } else {
      if(statusEl) statusEl.textContent="Este navegador não permite compartilhar imagem + texto juntos. Use o botão Enviar WhatsApp.";
    }
  }catch(e){
    if(statusEl) statusEl.textContent="Não foi possível preparar a imagem. Use o botão Enviar WhatsApp.";
  }
}
function enviarR(){
  var c=cB(_previewCid);
  if(!c)return;
  var obs=(document.getElementById("pr-obs")||{}).value||"";
  var msg=_previewMsg;
  if(obs.trim()) msg+="\n\n"+obs.trim();
  var statusEl=document.getElementById("pr-copy-msg");

  // Este arquivo é aberto via file:// no Safari (colado direto na barra de
  // endereço), não por um servidor https://. Nesse contexto, o iOS bloqueia
  // por segurança qualquer tentativa de abrir links https:///whatsapp://
  // a partir da página (sempre dá "Não foi possível abrir este link",
  // independente do formato do link ou de como o JS chama window.open).
  // Por isso aqui só copiamos o texto; abrir o WhatsApp é manual.
  var copiouOk = copiarTextoSincrono(msg);
  if(statusEl){
    statusEl.textContent = copiouOk
      ? "Texto copiado! Agora troque para o WhatsApp e cole a mensagem na conversa do cliente."
      : "Não foi possível copiar automaticamente. Toque e mantenha pressionado o texto acima para copiar manualmente.";
  }
}

function copiarTextoSincrono(texto){
  // Usa o método de fallback (execCommand) diretamente, pois ele é síncrono
  // e mantém o gesto do usuário válido para o window.open() que vem a seguir.
  // navigator.clipboard.writeText() é assíncrono (retorna Promise) e gastaria
  // o gesto do usuário antes do window.open() rodar.
  try{
    var ta=document.createElement("textarea");
    ta.value=texto;
    ta.style.position="fixed";
    ta.style.opacity="0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    var ok=document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }catch(e){
    return false;
  }
}

var _store={};
function _set(k,v){try{localStorage.setItem(k,v);}catch(e){_store[k]=v;}}
function _get(k){try{return localStorage.getItem(k);}catch(e){return _store[k]||null;}}

// ══════════════════════════════════════════════
var BACKUP_KEYS = ["bl_cli","bl_vnd","bl_pag","bl_nextId","bl_sabores","bl_estoque",
  "bl_precIng","bl_precReceitas","bl_precExtras","bl_precProduto","bl_precTabua","bl_precPrecos",
  "bl_precFixos","bl_precHistorico","bl_precHistIng","bl_tema","bl_despesas","bl_precPerda","bl_logoCustom","bl_insumos","bl_nextInsumoId","bl_promocoes","bl_nextPromoId","bl_margemMinima","bl_promoHistorico","bl_nextHistoricoId","bl_fornecedores","bl_nextFornecedorId","bl_fornEntregas","bl_nextEntregaId"];

function exportarBackup(){
  try{
    var dados={};
    for(var i=0;i<BACKUP_KEYS.length;i++){
      var k=BACKUP_KEYS[i];
      var v=_get(k);
      if(v!==null && v!==undefined) dados[k]=v;
    }
    var pacote={
      app:"Brownielicia",
      versao:"20260626014500",
      exportadoEm:new Date().toISOString(),
      dados:dados
    };
    var json=JSON.stringify(pacote,null,2);
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var dataStr=hoje().split("-").reverse().join("-"); // DD-MM-AAAA
    var a=document.createElement("a");
    a.href=url;
    a.download="brownielicia-backup-"+dataStr+".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    try{ _set("bl_ultimoBackup", hoje()); }catch(e2){}
    var statusEl=document.getElementById("backup-status");
    if(statusEl){ statusEl.style.color="var(--grn)"; statusEl.textContent="Backup exportado com sucesso!"; }
  }catch(e){
    var statusEl=document.getElementById("backup-status");
    if(statusEl){ statusEl.style.color="var(--red)"; statusEl.textContent="Erro ao exportar: "+e.message; }
  }
}

function importarBackup(inputEl){
  var file=inputEl.files && inputEl.files[0];
  if(!file) return;
  var statusEl=document.getElementById("backup-status");
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var pacote=JSON.parse(e.target.result);
      if(!pacote || !pacote.dados || pacote.app!=="Brownielicia"){
        if(statusEl){ statusEl.style.color="var(--red)"; statusEl.textContent="Arquivo inválido. Selecione um backup exportado pelo Brownielícia."; }
        return;
      }
      var dataInfo=pacote.exportadoEm?new Date(pacote.exportadoEm).toLocaleDateString("pt-BR"):"data desconhecida";
      confirmar("Importar este backup (exportado em "+dataInfo+") vai substituir TODOS os dados atuais do app (vendas, clientes, precificação). Esta ação não pode ser desfeita. Continuar?", function(){
        try{
          for(var k in pacote.dados){
            _set(k, pacote.dados[k]);
          }
          try{ _set("bl_ultimoBackup", hoje()); }catch(e2){}
          if(statusEl){ statusEl.style.color="var(--grn)"; statusEl.textContent="Backup importado! Recarregando o app..."; }
          setTimeout(function(){ location.reload(); }, 1200);
        }catch(err){
          if(statusEl){ statusEl.style.color="var(--red)"; statusEl.textContent="Erro ao importar: "+err.message; }
        }
      });
    }catch(err){
      if(statusEl){ statusEl.style.color="var(--red)"; statusEl.textContent="Não foi possível ler o arquivo. Verifique se é um backup válido."; }
    }
    inputEl.value="";
  };
  reader.onerror=function(){
    if(statusEl){ statusEl.style.color="var(--red)"; statusEl.textContent="Erro ao ler o arquivo."; }
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════
//  BACKUP AUTOMÁTICO LOCAL
//  Guarda, sem nenhuma ação da usuária, uma cópia dos dados uma vez por dia,
//  neste próprio celular (localStorage). Isso protege contra erro/exclusão
//  acidental (ex: apagar uma venda ou cliente por engano) — mas NÃO substitui
//  o backup exportado, que é o que protege contra perda ou troca do celular.
// ══════════════════════════════════════════════
var AUTOSNAP_QTD = 3; // quantas cópias automáticas manter (mais recente primeiro)
function autoSnapshotChave(i){ return "bl_autosnap_"+i; }
function autoSnapshotGet(i){
  try{
    var raw=_get(autoSnapshotChave(i));
    return raw?JSON.parse(raw):null;
  }catch(e){ return null; }
}
function autoSnapshotListar(){
  var lista=[];
  for(var i=1;i<=AUTOSNAP_QTD;i++){
    var s=autoSnapshotGet(i);
    if(s) lista.push(s);
  }
  return lista;
}
function autoSnapshotSeNecessario(){
  try{
    var atual=autoSnapshotGet(1);
    if(atual && atual.data===hoje()) return; // já fez a cópia automática hoje

    // rotaciona: 2→3, 1→2, e o novo entra na posição 1
    for(var i=AUTOSNAP_QTD;i>1;i--){
      var anterior=_get(autoSnapshotChave(i-1));
      if(anterior!==null) _set(autoSnapshotChave(i), anterior);
    }

    var dados={};
    for(var k=0;k<BACKUP_KEYS.length;k++){
      var chave=BACKUP_KEYS[k];
      var v=_get(chave);
      if(v!==null && v!==undefined) dados[chave]=v;
    }
    var snap={data:hoje(), timestamp:new Date().toISOString(), dados:dados};
    _set(autoSnapshotChave(1), JSON.stringify(snap));
  }catch(e){ /* backup automatico nao deve travar o app */ }
}
function autoSnapshotRestaurar(i){
  var snap=autoSnapshotGet(i);
  if(!snap) return;
  var dataFmt=new Date(snap.timestamp).toLocaleString("pt-BR");
  confirmar("Restaurar a cópia automática de "+dataFmt+"? Isso vai substituir os dados atuais do app. Esta ação não pode ser desfeita.", function(){
    try{
      for(var k in snap.dados) _set(k, snap.dados[k]);
      var statusEl=document.getElementById("backup-status");
      if(statusEl){ statusEl.style.color="var(--grn)"; statusEl.textContent="Cópia restaurada! Recarregando o app..."; }
      setTimeout(function(){ location.reload(); }, 1200);
    }catch(err){
      alert("Erro ao restaurar: "+err.message);
    }
  });
}
function autoSnapshotHTML(){
  var lista=autoSnapshotListar();
  var h='<div style="font-weight:700;color:var(--modal-text);margin-bottom:4px;">Cópias Automáticas (neste celular)</div>';
  h+='<div style="font-size:12px;color:var(--modal-text-muted);margin-bottom:10px;">Uma vez por dia, o app guarda uma cópia dos seus dados aqui mesmo no celular — sem precisar fazer nada. Isso ajuda se você apagar algo por engano, mas não protege se trocar ou perder o celular; para isso, use o Backup exportado abaixo.</div>';
  if(lista.length===0){
    h+='<div style="font-size:12px;color:var(--modal-text-muted);margin-bottom:14px;">Ainda não há cópias automáticas — a primeira será criada hoje, ao abrir o app.</div>';
  } else {
    for(var i=0;i<lista.length;i++){
      var snap=lista[i];
      var idx=i+1;
      var dataFmt=new Date(snap.timestamp).toLocaleString("pt-BR");
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;'+(i<lista.length-1?"border-bottom:1px solid var(--modal-border);":"")+'">';
      h+='<div style="font-size:12px;color:var(--modal-text);">'+dataFmt+'</div>';
      h+='<button class="btn-sm" style="background:var(--modal-overlay);color:var(--modal-text);" onclick="autoSnapshotRestaurar('+idx+')">Restaurar</button>';
      h+='</div>';
    }
    h+='<div style="height:6px;"></div>';
  }
  return h;
}

    if(h) precHistorico=JSON.parse(h);
    if(hi) PREC_HIST_ING=JSON.parse(hi);
    if(!PREC_RECEITAS.massa) PREC_RECEITAS.massa={itens:[],producao:12};
  }catch(e){}

function carregar(){
  try{
    var c=_get("bl_cli");
    var v=_get("bl_vnd");
    var p=_get("bl_pag");
    var n=_get("bl_nextId");
    var s=_get("bl_sabores");
    if(c)CLI=JSON.parse(c);
    if(v)VND=JSON.parse(v);
    if(p)PAG=JSON.parse(p);
    if(n)nextId=+n;
    if(s){
      var parsed=JSON.parse(s);
      // Mescla sabores salvos com os padroes, sem duplicar
      for(var k in parsed){
        if(!SABORES[k])SABORES[k]=[];
        for(var i=0;i<parsed[k].length;i++){
          if(SABORES[k].indexOf(parsed[k][i])===-1) SABORES[k].push(parsed[k][i]);
        }
      }
    }
  }catch(e){}
}
