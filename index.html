<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Brownielicia">

<title>Brownielícia</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
/* As cores de :root e [data-theme="light"] são aplicadas via JS (ver TEMAS_BASE
   e a função aplicarTema no JavaScript principal, no fim do arquivo) — essa é
   a ÚNICA fonte das cores do app. Não redeclare cores aqui: isso evitou bugs
   de "mudei a cor mas não atualizou em algum lugar" que aconteciam quando os
   valores viviam em dois lugares (CSS e JS) e podiam ficar dessincronizados. */
[data-theme="light"] body{background:var(--bg-grad) !important;}
[data-theme="light"] #main{background:var(--bg-grad) !important;}
[data-theme="light"] .pg{background:transparent !important;}
[data-theme="light"] #ov{background:rgba(0,0,0,.45) !important;}
[data-theme="light"] .card{box-shadow:0 1px 3px rgba(61,31,10,.08);}
[data-theme="light"] .day-card{box-shadow:0 1px 3px rgba(61,31,10,.08);}
html,body{height:100%;overflow:hidden;}
body{
  font-family:"DM Sans",sans-serif;
  background:var(--bg-grad);
  max-width:430px;margin:0 auto;
  color:var(--tl);
  display:flex;flex-direction:column;
  position:relative;
}
#hd,#main,#tb{position:relative;z-index:1;}

/* ── HEADER ── */
#hd{
  background:var(--header-bg);
  border-bottom:1px solid var(--brd);
  padding:12px 16px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.hd-logo{display:flex;align-items:center;gap:10px;}
.hd-logo-mark{
  width:46px;height:46px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.hd-logo-mark img{width:100%;height:100%;object-fit:contain;}
.hd-title{font-family:"Baloo 2",sans-serif;font-size:17px;font-weight:700;color:var(--header-text);line-height:1;letter-spacing:-.2px;}
.hd-sub{font-size:9px;font-weight:600;color:var(--header-text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.hd-right{text-align:right;}
.hd-label{font-size:9px;font-weight:600;color:var(--header-text-muted);letter-spacing:1px;text-transform:uppercase;}
.hd-val{font-family:"Baloo 2",sans-serif;font-size:18px;font-weight:700;color:var(--gold2);line-height:1;}
.hd-pend{font-size:10px;font-weight:600;color:var(--amb);margin-top:1px;}

/* ── SCROLL AREA ── */
#main{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 0 calc(64px + env(safe-area-inset-bottom,0px));
}
.pg{display:none;padding:14px 14px 0;}
.pg.on{display:block;animation:fi .18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── TAB BAR ── */
#tb{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--header-bg);
  border-top:1px solid var(--brd);
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0px);
  flex-shrink:0;
}
.ti{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;cursor:pointer;position:relative;
}
.ti-ico{width:22px;height:22px;display:flex;align-items:center;justify-content:center;opacity:.4;transition:.15s;color:var(--header-text);}
.ti-ico svg{width:100%;height:100%;}
.ti.on .ti-ico{opacity:1;color:var(--gold2);}
.ti-lbl{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-top:3px;color:var(--header-text-muted);}
.ti.on .ti-lbl{color:var(--gold2);}
.ti-bar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--gold);border-radius:0 0 2px 2px;opacity:0;}
.ti.on .ti-bar{opacity:1;}

/* ── CARDS ── */
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;color:var(--td);}
.card-dark{background:var(--s2);border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid var(--brd);}
.sect{font-family:"Baloo 2",sans-serif;font-size:21px;font-weight:700;color:var(--cream);margin-bottom:14px;letter-spacing:-.2px;}
.divider{height:1px;background:rgba(61,33,26,.12);margin:10px 0;}
.divider-dark{height:1px;background:rgba(200,151,42,.08);margin:10px 0;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.badge-pago{background:var(--grn-bg);color:var(--grn);}
.badge-pend{background:var(--amb-bg);color:var(--amb);}
.badge-red{background:var(--red-bg);color:var(--red);}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:13px 16px;border:none;border-radius:10px;font-family:"DM Sans",sans-serif;font-weight:600;font-size:14px;cursor:pointer;text-align:center;transition:.12s;}
.btn:active{opacity:.8;transform:scale(.98);}
.btn-primary{background:var(--br);color:#F5F5DC;}
.btn-secondary{background:var(--modal-overlay);color:var(--modal-text);border:1px solid var(--modal-border);}
.btn-secondary-page{background:var(--input-bg);color:var(--tl);border:1px solid var(--brd);}
.btn-secondary-light{background:var(--btn-light-bg);color:var(--td);border:1px solid var(--btn-light-border);font-weight:700;}
.btn-green{background:var(--grn-bg);color:var(--grn);}
.btn-wa{background:#25D366;color:#fff;}
.btn-danger{background:var(--red-bg);color:var(--red);}
.btn-sm{padding:6px 12px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.btn-sm-pay{background:var(--grn-bg);color:var(--grn);}
.badge-pago-btn{background:var(--grn-bg);color:var(--grn);}
.btn-sm-del{background:var(--red-bg);color:var(--red);}
/* O painel de detalhes do dia é sempre claro (cáqui), então esses botões usam
   cores próprias, opacas, em vez das cores translúcidas pensadas pro tema escuro */
.day-card-body .btn-sm-pay,
.day-card-body .badge-pago-btn{background:#6B9179;color:#FFFFFF;}
.day-card-body .btn-sm-del{background:#A8635A;color:#FFFFFF;}

/* ── INPUTS ── */
.inp{width:100%;padding:11px 13px;border:1px solid var(--input-border);border-radius:9px;font-size:14px;color:var(--input-text);background:var(--input-bg);outline:none;font-family:"DM Sans",sans-serif;-webkit-appearance:none;transition:.12s;}
.inp:focus{border-color:var(--gold);}
.inp::placeholder{color:var(--input-placeholder);}
.lbl{display:block;font-size:10px;font-weight:600;color:var(--modal-text-muted);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase;}
.fg{margin-bottom:14px;}
/* dropdown nativo do navegador renderiza as <option> com fundo branco do
   sistema operacional, independente do tema da pagina; forcamos texto escuro
   em todas elas para garantir contraste nesse contexto especifico. */
select.inp option{color:#2A1606;background:#FFFFFF;}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:7px 13px;border-radius:99px;border:1px solid var(--brd);background:var(--chip-bg);color:var(--tll);font-size:13px;font-weight:500;cursor:pointer;transition:.12s;}
.chip-modal{padding:7px 13px;border-radius:99px;border:1px solid var(--modal-border);background:var(--modal-overlay-soft);color:var(--modal-text-muted);font-size:13px;font-weight:500;cursor:pointer;transition:.12s;}
.chip-modal.on{background:var(--gold);color:#241704;border-color:var(--gold);font-weight:700;}
.chip.on{background:var(--br);color:#F5F5DC;border-color:var(--br);font-weight:600;}

/* ── TYPE SELECTOR ── */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.type-card{border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;border:1px solid var(--brd);background:var(--input-bg);transition:.12s;}
.type-card.on{background:var(--br);border-color:var(--br);}
.type-card-name{font-size:13px;font-weight:600;color:var(--tl);margin-bottom:2px;}
.type-card.on .type-card-name{color:#F5F5DC;}
.type-card-price{font-size:11px;color:var(--tll);}
.type-card.on .type-card-price{color:rgba(244,236,216,.7);}

/* ── MODAL ── */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-end;justify-content:center;}
#ov.on{display:flex;}
#modal{background:var(--modal-bg);border-radius:20px 20px 0 0;padding:18px 16px calc(32px + env(safe-area-inset-bottom,0px));width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border-top:1px solid var(--brd);}
[data-theme="light"] #modal{background:#FBFAF0 !important;--modal-text:#2E1712 !important;--modal-text-muted:#6F4D38 !important;--modal-overlay:rgba(61,33,26,.07) !important;--modal-overlay-soft:rgba(61,33,26,.05) !important;--modal-border:rgba(61,33,26,.18) !important;}
[data-theme="dark"] #modal{background:#1F0F08 !important;}
.modal-handle{width:40px;height:3px;border-radius:2px;background:rgba(200,151,42,.3);margin:0 auto 18px;}
.modal-title{font-family:"Baloo 2",sans-serif;font-size:20px;font-weight:700;color:var(--modal-text);margin-bottom:18px;}

/* ── DAY CARDS ── */
.day-card{background:var(--card);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.day-card-hd{padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.day-card-hd.active{background:var(--br);}
.day-card-body{background:#EDE6D3;border-top:1px solid rgba(61,33,26,.12);}
.day-row{padding:10px 14px;border-bottom:1px solid rgba(61,33,26,.08);}
.day-row:last-child{border-bottom:none;}
.client-row{padding:10px 14px;border-bottom:1px solid rgba(61,33,26,.1);}
.client-row:last-child{border-bottom:none;}
.item-row{display:flex;flex-direction:column;gap:6px;padding:8px 0;}
.item-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.item-row-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-card{background:var(--card);border-radius:12px;padding:14px;}
.stat-card-lbl{font-size:10px;font-weight:600;color:var(--ts);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.stat-card-val{font-family:"Baloo 2",sans-serif;font-size:20px;font-weight:700;color:var(--td);}
.stat-card-sub{font-size:11px;color:var(--tm);margin-top:2px;}
.stat-card.grn .stat-card-val{color:var(--grn);}
.stat-card.amb .stat-card-val{color:var(--amb);}

/* ── PROGRESS BAR ── */
.pbar{height:6px;background:var(--track-bg);border-radius:3px;overflow:hidden;margin-top:6px;}
.pbar-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .4s;}

/* ── AVATAR ── */
.av{display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;font-family:"DM Sans",sans-serif;flex-shrink:0;color:#F5F5DC;}

/* ── SEPARATOR ── */
.sep{height:1px;background:var(--brd);margin:12px 0;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 24px;}
.empty-title{font-size:16px;font-weight:600;color:var(--tl);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--tll);margin-bottom:20px;}

/* ── BATCH ITEM ── */
.batch-item{background:var(--input-bg);border:1px solid var(--brd);border-radius:10px;padding:12px 13px;margin-bottom:8px;}
.batch-item-title{font-size:13px;font-weight:600;color:var(--tl);margin-bottom:4px;}
.batch-item-sub{font-size:12px;color:var(--tll);}

/* ── CHART ── */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;padding:0 4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:3px 3px 0 0;background:var(--gold);min-height:3px;transition:height .3s;}
.bar-lbl{font-size:9px;font-weight:600;color:var(--tm);letter-spacing:.3px;}

/* ── SCROLL LIST ── */
.scroll-x{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.scroll-x::-webkit-scrollbar{display:none;}

/* ── PRECIFICACAO: SUBTABS ── */
.subtabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;margin-bottom:4px;}
.subtabs::-webkit-scrollbar{display:none;}
.subtab{flex-shrink:0;padding:8px 14px;border-radius:99px;background:var(--chip-bg);border:1px solid var(--brd);color:var(--tll);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.12s;}
.subtab.on{background:var(--br);color:#F5F5DC;border-color:var(--br);}
.ing-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.ing-row-info{flex:1;min-width:0;}
.ing-row-name{font-size:14px;font-weight:600;color:var(--td);}
.ing-row-sub{font-size:11px;color:var(--tm);margin-top:2px;}
.resumo-line{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid rgba(61,33,26,.1);}
.resumo-line:last-child{border-bottom:none;}
.resumo-line .lbl2{font-size:12px;color:var(--tm);}
.resumo-line .val2{font-size:15px;font-weight:700;color:var(--td);}
.resumo-line.total .val2{font-size:20px;color:var(--gold2);}
.lucro-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.lucro-card{background:var(--grn-bg);border-radius:10px;padding:10px 12px;}
.lucro-card .lbl{color:var(--grn);opacity:.8;margin-bottom:3px;}
.lucro-card .val{font-family:"Baloo 2",sans-serif;font-size:16px;font-weight:700;color:var(--grn);}
.lucro-card.neg{background:var(--red-bg);}
.lucro-card.neg .lbl,.lucro-card.neg .val{color:var(--red);}

/* ── MENU "MAIS" (SIDE DRAWER) ── */
#sd-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;}
#sd-ov.on{display:block;}
#sd{
  position:fixed;top:0;left:0;height:100%;width:78%;max-width:300px;
  background:var(--modal-bg);
  transform:translateX(-100%);transition:transform .22s ease;
  z-index:301;display:flex;flex-direction:column;
  box-shadow:2px 0 24px rgba(0,0,0,.25);
}
#sd.on{transform:translateX(0);}
#sd-hd{
  padding:calc(18px + env(safe-area-inset-top,0px)) 18px 16px;
  border-bottom:1px solid var(--modal-border);
  flex-shrink:0;
}
#sd-hd .sd-title{font-family:"Baloo 2",sans-serif;font-size:18px;font-weight:700;color:var(--modal-text);}
#sd-hd .sd-sub{font-size:10px;color:var(--modal-text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
#sd-list{flex:1;overflow-y:auto;padding:10px;}
.sd-item{
  display:flex;align-items:center;gap:14px;
  padding:13px 12px;border-radius:12px;cursor:pointer;
  color:var(--modal-text);transition:.12s;
}
.sd-item.on{background:var(--modal-overlay);}
.sd-item-ico{width:22px;height:22px;flex-shrink:0;color:var(--modal-text-muted);display:flex;align-items:center;justify-content:center;}
.sd-item.on .sd-item-ico{color:var(--gold2);}
.sd-item-ico svg{width:100%;height:100%;}
.sd-item-lbl{font-size:14px;font-weight:600;}
.sd-item.on .sd-item-lbl{color:var(--gold2);}
.sd-item-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;border-radius:10px;padding:2px 7px;min-width:16px;text-align:center;line-height:1.4;}
.sd-item-badge.grn{background:var(--grn);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

function relRange(tipo){
  var hj=hoje();
  var f=relFiltro[tipo];
  if(f==="hoje") return {de:hj,ate:hj,lbl:"Hoje"};
  if(f==="semana") return {de:inicioSemana(),ate:hj,lbl:"Esta Semana"};
  if(f==="mes") return {de:inicioMes(),ate:hj,lbl:"Este Mês"};
  if(f==="custom"){
    var c=relCustom[tipo];
    return {de:c.de||hj,ate:c.ate||hj,lbl:fD(c.de||hj)+" a "+fD(c.ate||hj)};
  }
  return {de:"0000-00-00",ate:"9999-99-99",lbl:"Tudo"};
}

function aplicarRelFiltroCustom(tipo){
  var de=(document.getElementById("rf-de")||{}).value||hoje();
  var ate=(document.getElementById("rf-ate")||{}).value||hoje();
  if(de>ate){var t=de;de=ate;ate=t;}

  fM();
  pgT();
}

function relConteudoVendas(rng){
  var vs=VND.filter(function(v){return v.data>=rng.de&&v.data<=rng.ate;}).sort(function(a,b){return a.data<b.data?-1:1;});
  var linhas=[];
  var total=0, qtd=vs.length;
  var porDia={};
  for(var i=0;i<vs.length;i++){
    if(!porDia[vs[i].data]) porDia[vs[i].data]=[];
    porDia[vs[i].data].push(vs[i]);
    total+=vs[i].preco;
  }
  var dias=Object.keys(porDia).sort();
  for(var d=0;d<dias.length;d++){
    linhas.push({tipo:"dia",txt:fD(dias[d])});
    var itens=porDia[dias[d]];
    var totDia=0;
    for(var i=0;i<itens.length;i++){
      var v=itens[i];
      var cli=cB(v.cid);
      var lb=(v.tipo==="Tradicional"?"Tradicional":v.tipo+" - "+v.sabor)+(cli?" — "+cli.nome:"");
      linhas.push({tipo:"item",txt:lb,val:v.preco});
      totDia+=v.preco;
    }
    linhas.push({tipo:"subtotal",txt:"Total do dia",val:totDia});
  }
  // mix por tipo
  var mix={};
  for(var i=0;i<vs.length;i++){ mix[vs[i].tipo]=(mix[vs[i].tipo]||0)+1; }
  return {linhas:linhas,total:total,qtd:qtd,mix:mix,rng:rng};
}

function relConteudoFinanceiro(rng){
  var vs=VND.filter(function(v){return v.data>=rng.de&&v.data<=rng.ate;});
  var pags=PAG.filter(function(p){return p.data>=rng.de&&p.data<=rng.ate;});
  var totVendido=0, recebido=0, pendente=0;
  for(var i=0;i<vs.length;i++){ totVendido+=vs[i].preco; if(vs[i].pago) recebido+=vs[i].preco; else pendente+=vs[i].preco; }
  for(var i=0;i<pags.length;i++) recebido+=pags[i].valor;

  // pendencias por cliente (considerando o total em aberto de cada cliente, nao so do periodo)
  var porCliente={};
  for(var i=0;i<vs.length;i++){
    if(vs[i].pago) continue;
    var k=vs[i].cid;
    porCliente[k]=(porCliente[k]||0)+vs[i].preco;
  }
  var clientesArr=Object.keys(porCliente).map(function(k){
    var c=cB(+k);
    return {nome:c?c.nome:"Cliente",val:porCliente[k]};
  }).sort(function(a,b){return b.val-a.val;});

  return {totVendido:totVendido,recebido:recebido,pendente:pendente,clientesArr:clientesArr,rng:rng};
}

function relConteudoEstoque(){
  var lista=listaTodosSabores();
  var porTipo={"Tradicional":[],"Clássico":[],"Premium":[]};
  var total=0;
  for(var i=0;i<lista.length;i++){
    var qtd=estoqueGet(lista[i].tipo,lista[i].sabor);
    total+=qtd;
    porTipo[lista[i].tipo].push({sabor:lista[i].sabor,qtd:qtd});
  }
  var baixos=[];
  for(var t in porTipo){
    for(var i=0;i<porTipo[t].length;i++){
      if(porTipo[t][i].qtd>0 && porTipo[t][i].qtd<=2) baixos.push({tipo:t,sabor:porTipo[t][i].sabor,qtd:porTipo[t][i].qtd});
    }
  }
  return {porTipo:porTipo,total:total,baixos:baixos};
}

function relConteudoPromocoes(rng){
  var lista=PROMO_HISTORICO.filter(function(h){
    return h.inicio<=rng.ate && (!h.fim || h.fim>=rng.de);
  }).sort(function(a,b){return a.inicio<b.inicio?-1:1;});

  var linhas=lista.map(function(h){
    var s=promoHistoricoStats(h);
    return {h:h, qtd:s.qtd, desconto:s.desconto, receita:s.receita};
  });

  var totalQtd=0, totalDesconto=0, totalReceita=0;
  for(var i=0;i<linhas.length;i++){ totalQtd+=linhas[i].qtd; totalDesconto+=linhas[i].desconto; totalReceita+=linhas[i].receita; }

  var insumos = promoInsumosConsumidos(lista.map(function(h){return h.id;}));

  return {linhas:linhas, totalQtd:totalQtd, totalDesconto:totalDesconto, totalReceita:totalReceita, insumos:insumos, rng:rng};
}

function relConteudoFornecedores(rng){
  var entregasPeriodo=FORNECEDOR_ENTREGAS.filter(function(e){return e.data>=rng.de&&e.data<=rng.ate;});
  var porFornecedor=FORNECEDORES.map(function(f){
    var es=entregasPeriodo.filter(function(e){return e.fornecedorId===f.id;});
    var qtd=es.reduce(function(s,e){return s+(+e.qtd||0);},0);
    var total=es.reduce(function(s,e){return s+(+e.valorTotal||0);},0);
    var recebido=es.filter(function(e){return e.pago;}).reduce(function(s,e){return s+(+e.valorTotal||0);},0);
    var pendenteAtual=fornPendente(f.id); // pendencia total (nao so do periodo), como no Financeiro de clientes
    return {nome:f.nome, qtd:qtd, total:total, recebido:recebido, pendente:pendenteAtual, entregas:es.length};
  }).filter(function(l){return l.entregas>0 || l.pendente>0;})
    .sort(function(a,b){return b.total-a.total;});

  var totalQtd=0, totalEntregue=0, totalRecebido=0, totalPendente=0;
  for(var i=0;i<porFornecedor.length;i++){
    totalQtd+=porFornecedor[i].qtd;
    totalEntregue+=porFornecedor[i].total;
    totalRecebido+=porFornecedor[i].recebido;
    totalPendente+=porFornecedor[i].pendente;
  }
  return {linhas:porFornecedor, totalQtd:totalQtd, totalEntregue:totalEntregue, totalRecebido:totalRecebido, totalPendente:totalPendente, rng:rng};
}

function relConteudoGeral(rng){
  var vndF=VND.filter(function(v){return v.data>=rng.de&&v.data<=rng.ate;});
  var pagF=PAG.filter(function(p){return p.data>=rng.de&&p.data<=rng.ate;});
  var entF=FORNECEDOR_ENTREGAS.filter(function(e){return e.data>=rng.de&&e.data<=rng.ate;});
  var despF=DESPESAS.filter(function(d){return d.data>=rng.de&&d.data<=rng.ate;});

  var totDireto=0, recDireto=0, penDireto=0, qtdDireto=vndF.length;
  for(var i=0;i<vndF.length;i++){ totDireto+=vndF[i].preco; if(vndF[i].pago)recDireto+=vndF[i].preco; else penDireto+=vndF[i].preco; }
  for(var i=0;i<pagF.length;i++) recDireto+=pagF[i].valor;

  var totForn=0, recForn=0, penForn=0, qtdForn=0;
  for(var i=0;i<entF.length;i++){
    totForn+=(+entF[i].valorTotal||0); qtdForn+=(+entF[i].qtd||0);
    if(entF[i].pago) recForn+=(+entF[i].valorTotal||0); else penForn+=(+entF[i].valorTotal||0);
  }

  var totalDespesas=0;
  for(var i=0;i<despF.length;i++) totalDespesas+=(+despF[i].valor||0);

  var totalVendido=totDireto+totForn, totalRecebido=recDireto+recForn, totalPendente=penDireto+penForn;
  var lucroLiquido=totalRecebido-totalDespesas;

  return {
    totDireto:totDireto, recDireto:recDireto, penDireto:penDireto, qtdDireto:qtdDireto,
    totForn:totForn, recForn:recForn, penForn:penForn, qtdForn:qtdForn,
    totalVendido:totalVendido, totalRecebido:totalRecebido, totalPendente:totalPendente,
    totalDespesas:totalDespesas, lucroLiquido:lucroLiquido, rng:rng
  };
}

    msg+="✅ Recebido: "+BRL(d.recebido)+"\n";
    msg+="⏳ Pendente: "+BRL(d.pendente)+"\n";

      msg+="\n*Pendências por cliente:*\n";
      for(var i=0;i<d.clientesArr.length;i++) msg+="   • "+d.clientesArr[i].nome+" — "+BRL(d.clientesArr[i].val)+"\n";
    }
  }
  else if(tipo==="estoque"){

      msg+="*"+ordem[t]+"*\n";
      for(var i=0;i<itens.length;i++){
        var lb=itens[i].sabor?itens[i].sabor:ordem[t];
        msg+="   • "+lb+": "+itens[i].qtd+"\n";

      msg+="\n";
    }
    msg+="━━━━━━━━━━━━━━━━━━━━\n";
    msg+="*Total em estoque: "+d.total+" brownies*\n";
    if(d.baixos.length>0){
      msg+="\n⚠️ *Estoque baixo:*\n";
      for(var i=0;i<d.baixos.length;i++){
        var lb=d.baixos[i].sabor?d.baixos[i].sabor:d.baixos[i].tipo;
        msg+="   • "+lb+" — "+d.baixos[i].qtd+" restante(s)\n";

    for(var i=0;i<d.lista.length;i++){
      var x=d.lista[i];
      msg+=fD(x.data)+" — "+x.descricao+" ("+(x.categoria||"Outros")+") — "+BRL(x.valor)+"\n";
    }
    if(d.catArr.length>0){
      msg+="\n*Por categoria:*\n";
      for(var i=0;i<d.catArr.length;i++) msg+="   • "+d.catArr[i].k+" — "+BRL(d.catArr[i].v)+"\n";
    }
    msg+="\n━━━━━━━━━━━━━━━━━━━━\n";
    msg+="*Total em despesas: "+BRL(d.total)+"*\n";
  }
  else if(tipo==="promocoes"){
    var d=relConteudoPromocoes(rng);
    if(d.linhas.length===0){ msg+="Nenhuma promoção aplicada no período.\n"; }
    for(var i=0;i<d.linhas.length;i++){
      var l=d.linhas[i];
      msg+="*"+l.h.nome+"*\n";
      msg+="   "+l.h.resumo+" · "+l.h.tipoProduto+"\n";
      msg+="   "+fD(l.h.inicio)+" até "+(l.h.fim?fD(l.h.fim):"agora")+"\n";
      msg+="   Vendidos: "+l.qtd+" · Desconto dado: "+BRL(l.desconto)+"\n";
      msg+="\n";
    }
    msg+="━━━━━━━━━━━━━━━━━━━━\n";
    msg+="*Total vendido em promoção: "+BRL(d.totalReceita)+"*\n";
    msg+="*Total de desconto dado: "+BRL(d.totalDesconto)+"*\n";
    msg+="*Unidades vendidas em promoção: "+d.totalQtd+"*\n";
    if(d.insumos.length>0){
      msg+="\n*Insumos consumidos (estimativa):*\n";
      for(var i=0;i<d.insumos.length;i++){
        var ins=d.insumos[i];
        var txt=insumoFmtQtdDecimal(ins.qtd)+" "+precUnidLabel(ins.unidade);
        if(ins.pacotes!==undefined){
          var emb=(ins.embalagem||"pacote");
          if(ins.pacotes>=1.05 && !/s$/i.test(emb)) emb+="s";
          txt+=" (≈ "+insumoFmtQtdDecimal(ins.pacotes)+" "+emb+")";
        }
        msg+="   • "+ins.nome+" — "+txt+"\n";
      }
    }
  }
  else if(tipo==="fornecedores"){
    var d=relConteudoFornecedores(rng);
    if(d.linhas.length===0){ msg+="Nenhuma entrega a pontos de revenda no período.\n"; }
    for(var i=0;i<d.linhas.length;i++){
      var l=d.linhas[i];
      msg+="*"+l.nome+"*\n";
      msg+="   Entregue no período: "+l.qtd+" un. — "+BRL(l.total)+"\n";
      msg+="   Recebido: "+BRL(l.recebido)+" · Pendente: "+BRL(l.pendente)+"\n";
      msg+="\n";
    }
    msg+="━━━━━━━━━━━━━━━━━━━━\n";
    msg+="*Total entregue: "+BRL(d.totalEntregue)+"*\n";
    msg+="*Total recebido: "+BRL(d.totalRecebido)+"*\n";
    msg+="*Total pendente: "+BRL(d.totalPendente)+"*\n";
    msg+="*Unidades entregues: "+d.totalQtd+"*\n";
  }

  msg+="\n@brownieliciadoces";
  return msg;
}

function relWhatsApp(tipo){
  var msg=relTextoWhatsApp(tipo);
  copiarTextoSincrono(msg);
  var url="https://wa.me/?text="+encodeURIComponent(msg);
  window.open(url,"_blank");
}

// ── PDF ──
function relPDF(tipo){
  if(typeof window.jspdf==="undefined"){
    alert("Não foi possível carregar o gerador de PDF. Verifique sua conexão com a internet e tente novamente.");
    return;
  }
  var rng=relRange(tipo);
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({unit:"mm",format:"a4"});
  var margemX=15, pageW=210, pageH=297;
  var faixaAltura=34;

  var corMarrom=[61,31,10];
  var corMarromClaro=[107,58,15];
  var corGold=[184,121,30];
  var corCreme=[250,242,228];
  var corCremeForte=[240,225,196];
  var corTexto=[42,32,24];
  var corSuave=[140,123,103];
  var corVerde=[24,104,54];
  var corVerdeBg=[221,240,228];
  var corLaranja=[150,93,12];
  var corLaranjaBg=[250,233,205];

  var subtit=tipo==="estoque"?("Posição em "+fD(hoje())):rng.lbl;
  var logoInfo=getLogoInfo();
  var y=faixaAltura+10;

  function desenharLogo(boxX,boxY,boxSize){
    try{
      var pad=2.3;
      var maxW=boxSize-pad*2, maxH=boxSize-pad*2;
      var props=doc.getImageProperties(logoInfo.dataUrl);
      var ratio=Math.min(maxW/props.width, maxH/props.height);
      var w=props.width*ratio, h=props.height*ratio;
      doc.addImage(logoInfo.dataUrl, logoInfo.format, boxX+(boxSize-w)/2, boxY+(boxSize-h)/2, w, h);
    }catch(e){ /* se a logo não puder ser desenhada, o relatório segue sem ela */ }
  }

  function desenharFundo(){
    try{ doc.addImage(_fundoRelB64,"PNG",0,0,pageW,pageH); }catch(e){ /* se o fundo não carregar, o relatório segue normalmente */ }
  }

  function desenharFaixaPrincipal(){
    desenharFundo();
    doc.setFillColor(corMarrom[0],corMarrom[1],corMarrom[2]);
    doc.rect(0,0,pageW,faixaAltura,'F');
    doc.setFillColor(corGold[0],corGold[1],corGold[2]);
    doc.rect(0,faixaAltura,pageW,1,'F');

    var boxSize=21, boxX=margemX, boxY=(faixaAltura-boxSize)/2;
    doc.setFillColor(255,255,255);
    doc.roundedRect(boxX,boxY,boxSize,boxSize,3,3,'F');
    desenharLogo(boxX,boxY,boxSize);

    var textX=boxX+boxSize+8;
    doc.setFont("helvetica","bold");
    doc.setFontSize(19);
    doc.setTextColor(255,255,255);
    doc.text("Brownielícia",textX,15.5);
    doc.setFont("helvetica","normal");
    doc.setFontSize(10.5);
    doc.setTextColor(corCreme[0],corCreme[1],corCreme[2]);
    doc.text("Relatório de "+relTitulo(tipo),textX,22);
    doc.setFontSize(9.5);
    doc.setTextColor(217,196,168);
    doc.text(subtit,textX,27.5);
  }

  function desenharFaixaContinuacao(){
    desenharFundo();
    doc.setFillColor(corMarrom[0],corMarrom[1],corMarrom[2]);
    doc.rect(0,0,pageW,13,'F');
    doc.setFont("helvetica","bold");
    doc.setFontSize(10.5);
    doc.setTextColor(255,255,255);
    doc.text("Brownielícia",margemX,8.7);
    doc.setFont("helvetica","normal");
    doc.setFontSize(9);
    doc.setTextColor(corCreme[0],corCreme[1],corCreme[2]);
    doc.text("Relatório de "+relTitulo(tipo),pageW-margemX,8.7,{align:"right"});
  }

  function checarPagina(alturaNecessaria){
    if(y+alturaNecessaria>pageH-20){
      doc.addPage();
      desenharFaixaContinuacao();
      y=24;
    }
  }
  function tituloSecao(txt){
    checarPagina(11);
    doc.setFillColor(corCremeForte[0],corCremeForte[1],corCremeForte[2]);
    doc.roundedRect(margemX-2,y-4.7,pageW-2*margemX+4,7.6,1.6,1.6,'F');
    doc.setFont("helvetica","bold");
    doc.setFontSize(11);
    doc.setTextColor(corMarrom[0],corMarrom[1],corMarrom[2]);
    doc.text(txt,margemX,y);
    y+=8.5;
  }
  function texto(txt,opts){
    opts=opts||{};
    var lh=opts.lh||6;
    checarPagina(lh+1);
    if(opts.zebra){
      doc.setFillColor(249,244,235);
      doc.rect(margemX-2,y-4.6,pageW-2*margemX+4,lh,'F');
    }
    doc.setFont("helvetica",opts.bold?"bold":"normal");
    doc.setFontSize(opts.size||10.5);
    var c=opts.color||corTexto;
    doc.setTextColor(c[0],c[1],c[2]);
    var x=margemX+(opts.indent||0);
    if(opts.right!==undefined){
      doc.text(String(opts.right),pageW-margemX,y,{align:"right"});
    }
    doc.text(txt,x,y);
    y+=lh;
  }
  function destaque(label,valor,opts){
    opts=opts||{};
    checarPagina(15);
    var alt=12;
    var bg=opts.bg||corCremeForte;
    var cor=opts.color||corMarrom;
    doc.setFillColor(bg[0],bg[1],bg[2]);
    doc.roundedRect(margemX-2,y-7.5,pageW-2*margemX+4,alt,2,2,'F');
    doc.setFont("helvetica","bold");
    doc.setFontSize(11.5);
    doc.setTextColor(cor[0],cor[1],cor[2]);
    doc.text(label,margemX+2,y-0.5);
    doc.setFontSize(13.5);
    doc.text(String(valor),pageW-margemX-2,y-0.5,{align:"right"});
    y+=alt+4;
  }

  desenharFaixaPrincipal();

  if(tipo==="geral"){
    var d=relConteudoGeral(rng);
    tituloSecao("Vendas Diretas (Clientes)");
    texto("Total vendido",{right:BRL(d.totDireto)});
    texto("Quantidade",{right:d.qtdDireto+" brownies"});
    texto("Recebido",{indent:4,color:corVerde,right:BRL(d.recDireto),zebra:true});
    if(d.penDireto>0) texto("Pendente",{indent:4,color:corLaranja,right:BRL(d.penDireto)});
    y+=3;
    tituloSecao("Entregue à Revenda");
    texto("Total entregue",{right:BRL(d.totForn)});
    texto("Quantidade",{right:d.qtdForn+" brownies"});
    texto("Recebido",{indent:4,color:corVerde,right:BRL(d.recForn),zebra:true});
    if(d.penForn>0) texto("Pendente",{indent:4,color:corLaranja,right:BRL(d.penForn)});
    y+=3;
    destaque("Faturamento Total",BRL(d.totalVendido));
    texto("Total recebido",{right:BRL(d.totalRecebido)});
    texto("Total pendente",{right:BRL(d.totalPendente)});
    texto("Despesas no período",{right:BRL(d.totalDespesas)});
    y+=2;
    destaque("Lucro Líquido",BRL(d.lucroLiquido),{bg:d.lucroLiquido<0?corLaranjaBg:corVerdeBg,color:d.lucroLiquido<0?corLaranja:corVerde});
  }
  else if(tipo==="vendas"){
    var d=relConteudoVendas(rng);
    tituloSecao("Itens vendidos");
    if(d.qtd===0){ texto("Nenhuma venda no período.",{color:corSuave}); }
    var zb=false;
    for(var i=0;i<d.linhas.length;i++){
      var l=d.linhas[i];
      if(l.tipo==="dia"){ y+=1.5; checarPagina(9); texto(l.txt,{bold:true,size:10.5,color:corMarromClaro}); zb=false; }
      else if(l.tipo==="item"){ texto(l.txt,{indent:4,right:BRL(l.val),zebra:zb}); zb=!zb; }
      else { texto(l.txt,{indent:4,size:9.5,color:corSuave,right:BRL(l.val)}); y+=2; zb=false; }
    }
    y+=2;
    destaque("Total vendido",BRL(d.total));
    texto("Quantidade de brownies vendidos",{right:String(d.qtd)});
    var mk=Object.keys(d.mix);
    if(mk.length>0){
      y+=2;
      tituloSecao("Mix de produtos");
      for(var i=0;i<mk.length;i++) texto(mk[i],{indent:4,right:String(d.mix[mk[i]]),zebra:(i%2===0)});
    }
  }
  else if(tipo==="financeiro"){
    var d=relConteudoFinanceiro(rng);
    tituloSecao("Resumo financeiro");
    texto("Total vendido no período",{right:BRL(d.totVendido)});
    y+=2;
    destaque("Recebido",BRL(d.recebido),{bg:corVerdeBg,color:corVerde});
    destaque("Pendente",BRL(d.pendente),{bg:corLaranjaBg,color:corLaranja});
    if(d.clientesArr.length>0){
      y+=1;
      tituloSecao("Pendências por cliente");
      for(var i=0;i<d.clientesArr.length;i++) texto(d.clientesArr[i].nome,{indent:4,right:BRL(d.clientesArr[i].val),zebra:(i%2===0)});
    }
  }
  else if(tipo==="estoque"){
    var d=relConteudoEstoque();
    var ordem=["Tradicional","Clássico","Premium"];
    for(var t=0;t<ordem.length;t++){
      var itens=d.porTipo[ordem[t]];
      if(itens.length===0) continue;
      tituloSecao(ordem[t]);
      for(var i=0;i<itens.length;i++){
        var lb=itens[i].sabor?itens[i].sabor:ordem[t];
        texto(lb,{indent:4,right:String(itens[i].qtd),zebra:(i%2===0)});
      }
      y+=1;
    }
    destaque("Total em estoque",d.total+" brownies");
    if(d.baixos.length>0){
      y+=1;
      tituloSecao("Estoque baixo");
      for(var i=0;i<d.baixos.length;i++){
        var lbBaixo=d.baixos[i].sabor?d.baixos[i].sabor:d.baixos[i].tipo;
        texto(lbBaixo,{indent:4,color:corLaranja,right:d.baixos[i].qtd+" restante(s)",zebra:(i%2===0)});
      }
    }
  }
  else if(tipo==="despesas"){
    var d=relConteudoDespesas(rng);
    tituloSecao("Despesas do período");
    if(d.lista.length===0){ texto("Nenhuma despesa no período.",{color:corSuave}); }
    for(var i=0;i<d.lista.length;i++){
      var x=d.lista[i];
      texto(fD(x.data)+" — "+x.descricao,{size:9.5,right:BRL(x.valor),zebra:(i%2===0),lh:5.5});
      texto(x.categoria||"Outros",{indent:4,size:8.3,color:corSuave,lh:5.5});
    }
    if(d.catArr.length>0){
      y+=1;
      tituloSecao("Por categoria");
      for(var i=0;i<d.catArr.length;i++) texto(d.catArr[i].k,{indent:4,right:BRL(d.catArr[i].v),zebra:(i%2===0)});
    }
    y+=1;
    destaque("Total em despesas",BRL(d.total));
  }
  else if(tipo==="promocoes"){
    var d=relConteudoPromocoes(rng);
    tituloSecao("Promoções no período");
    if(d.linhas.length===0){ texto("Nenhuma promoção aplicada no período.",{color:corSuave}); }
    for(var i=0;i<d.linhas.length;i++){
      var l=d.linhas[i];
      checarPagina(20);
      texto(l.h.nome,{bold:true,size:11,color:corMarromClaro});
      texto(l.h.resumo+" · "+l.h.tipoProduto,{size:9,color:corSuave,lh:5.5});
      texto(fD(l.h.inicio)+" até "+(l.h.fim?fD(l.h.fim):"agora"),{size:9,color:corSuave,lh:5.5});
      texto("Vendidos: "+l.qtd+" un.",{indent:4,right:BRL(l.receita)});
      texto("Desconto dado",{indent:4,color:corLaranja,right:BRL(l.desconto),zebra:true});
      y+=2;
    }
    y+=1;
    destaque("Total vendido em promoção",BRL(d.totalReceita));
    texto("Total de desconto dado",{right:BRL(d.totalDesconto)});
    texto("Unidades vendidas em promoção",{right:String(d.totalQtd)});

    if(d.insumos.length>0){
      y+=3;
      tituloSecao("Insumos consumidos (estimativa)");
      for(var i=0;i<d.insumos.length;i++){
        var ins=d.insumos[i];
        var txt=insumoFmtQtdDecimal(ins.qtd)+" "+precUnidLabel(ins.unidade);
        if(ins.pacotes!==undefined){
          var emb=(ins.embalagem||"pacote");
          if(ins.pacotes>=1.05 && !/s$/i.test(emb)) emb+="s";
          txt+=" (≈ "+insumoFmtQtdDecimal(ins.pacotes)+" "+emb+")";
        }
        texto(ins.nome,{indent:4,size:9.5,right:txt,zebra:(i%2===0)});
      }
    }
  }
  else if(tipo==="fornecedores"){
    var d=relConteudoFornecedores(rng);
    tituloSecao("Revenda no período");
    if(d.linhas.length===0){ texto("Nenhuma entrega a pontos de revenda no período.",{color:corSuave}); }
    for(var i=0;i<d.linhas.length;i++){
      var l=d.linhas[i];
      checarPagina(18);
      texto(l.nome,{bold:true,size:11,color:corMarromClaro});
      texto("Entregue: "+l.qtd+" un.",{indent:4,right:BRL(l.total)});
      texto("Recebido",{indent:4,color:corVerde,right:BRL(l.recebido),zebra:true});
      if(l.pendente>0) texto("Pendente",{indent:4,color:corLaranja,right:BRL(l.pendente)});
      y+=2;
    }
    y+=1;
    destaque("Total entregue",BRL(d.totalEntregue));
    texto("Total recebido",{right:BRL(d.totalRecebido)});
    texto("Total pendente",{right:BRL(d.totalPendente)});
    texto("Unidades entregues",{right:String(d.totalQtd)});
  }

  // Rodapé com numeração de páginas, em todas as páginas do PDF
  var totalPaginas=doc.internal.getNumberOfPages();
  for(var p=1;p<=totalPaginas;p++){
    doc.setPage(p);
    doc.setDrawColor(corGold[0],corGold[1],corGold[2]);
    doc.setLineWidth(0.3);
    doc.line(margemX,pageH-15,pageW-margemX,pageH-15);
    doc.setFont("helvetica","italic");
    doc.setFontSize(8.3);
    doc.setTextColor(corSuave[0],corSuave[1],corSuave[2]);
    doc.text("@brownieliciadoces",margemX,pageH-10);
    doc.text("Gerado em "+fD(hoje()),pageW/2,pageH-10,{align:"center"});
    doc.text("Página "+p+" de "+totalPaginas,pageW-margemX,pageH-10,{align:"right"});
  }

  var nomeArquivo="brownielicia_"+tipo+"_"+hoje()+".pdf";

  // No Safari em modo PWA "standalone" (instalado na tela de início),
  // doc.save() tenta simular um clique num link de download, e isso
  // costuma falhar silenciosamente (não existe "onde" o arquivo cair).
  // Por isso, sempre que o navegador permitir, usamos o compartilhamento
  // nativo (Share Sheet do iOS/Android) com o PDF como arquivo — o mesmo
  // mecanismo já usado para enviar o extrato com logo. Isso deixa a
  // própria pessoa escolher "Salvar em Arquivos", enviar por WhatsApp, etc.
  var blob=doc.output("blob");
  if(navigator.share && navigator.canShare){
    try{
      var file=new File([blob],nomeArquivo,{type:"application/pdf"});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:"Brownielícia — "+relTitulo(tipo)}).catch(function(err){
          if(err && err.name!=="AbortError") doc.save(nomeArquivo);
        });
        return;
      }
    }catch(e){ /* cai no fallback abaixo */ }
  }
  doc.save(nomeArquivo);
}

function mDespesa(el){
  var editId=el?el.getAttribute("data-id"):null;
  var d=editId?DESPESAS.find(function(x){return x.id==editId;}):null;
  var h='<div class="modal-title">'+(d?"Editar":"Nova")+' Despesa</div>';
  h+='<div class="fg"><div class="lbl">Descrição</div><input class="inp" id="gd-desc" placeholder="Ex: Forno novo, cartão de visita..." value="'+(d?d.descricao:"")+'"></div>';
  h+='<div class="fg"><div class="lbl">Categoria</div><select class="inp" id="gd-cat">';
  for(var i=0;i<DESP_CATEGORIAS.length;i++){
    h+='<option value="'+DESP_CATEGORIAS[i]+'"'+(d&&d.categoria===DESP_CATEGORIAS[i]?" selected":"")+'>'+DESP_CATEGORIAS[i]+'</option>';
  }
  h+='</select></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
  h+='<div class="fg"><div class="lbl">Valor (R$)</div><input class="inp" type="number" id="gd-valor" min="0" step="0.01" value="'+(d?d.valor:"")+'"></div>';
  h+='<div class="fg"><div class="lbl">Data</div><input class="inp" type="date" id="gd-data" value="'+(d?d.data:hoje())+'"></div>';
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;">';
  h+='<button class="btn btn-secondary" onclick="fM()">Cancelar</button>';
  h+='<button class="btn btn-primary" onclick="sDespesa(\''+(editId||"")+'\')">Salvar</button>';
  h+='</div>';
  if(d){
    h+='<button class="btn btn-secondary" style="margin-top:8px;color:var(--red);" onclick="delDespesa(\''+editId+'\')">Excluir Despesa</button>';
  }
  aM(h);
}

function sDespesa(editId){
  var descricao=document.getElementById("gd-desc").value.trim();
  var categoria=document.getElementById("gd-cat").value;
  var valor=parseFloat(document.getElementById("gd-valor").value);
  var data=document.getElementById("gd-data").value;

  if(!descricao||isNaN(valor)||valor<=0||!data){
    alert("Preencha descrição, valor e data corretamente.");
    return;
  }

  if(editId){
    var d=DESPESAS.find(function(x){return x.id==editId;});
    if(d){ d.descricao=descricao; d.categoria=categoria; d.valor=valor; d.data=data; }
  } else {
    DESPESAS.push({id:Date.now(), descricao:descricao, categoria:categoria, valor:valor, data:data});
  }
  salvarDespesas();
  fM();
  pgG();
}

function delDespesa(id){
  confirmar("Excluir esta despesa?", function(){
    DESPESAS=DESPESAS.filter(function(d){return d.id!=id;});
    salvarDespesas();
    fM();
    pgG();
  });
}

var ESTOQUE = [];
function estoqueKey(tipo,sabor){ return tipo+"|"+(sabor||""); }
function estoqueLabel(key){
  var p=key.split("|");
  return p[1] ? p[0]+" — "+p[1] : p[0];
}
function estoqueGet(tipo,sabor){
  var key=estoqueKey(tipo,sabor);
  var item=ESTOQUE.find(function(e){return e.key===key;});
  return item?item.qtd:0;
}
function estoqueSet(tipo,sabor,qtd){
  var key=estoqueKey(tipo,sabor);
  var item=ESTOQUE.find(function(e){return e.key===key;});
  if(item) item.qtd=qtd;
  else ESTOQUE.push({key:key,qtd:qtd});
}
function estoqueAdd(tipo,sabor,delta){
  var key=estoqueKey(tipo,sabor);
  var item=ESTOQUE.find(function(e){return e.key===key;});
  if(item) item.qtd+=delta;
  else ESTOQUE.push({key:key,qtd:delta});
}

// Cada item: {id, nome, tipoPromo, tipoProduto, percentual, valorOff, compra, leva,
//             qtdCombo, precoCombo, qtdEstimada, dataInicio, dataFim, ativa}
var PROMOCOES = [];
var nextPromoId = 1;
var PROMO_TIPOS_PRODUTO = ["Tradicional","Clássico","Premium","Todos"];
var PROMO_MARGEM_MIN = 30; // margem de lucro mínima (%) que a usuária quer preservar

// Histórico de "sessões" de promoção (cada vez que uma promoção é ativada até
// ser desativada/expirar). Usado para o relatório de Promoções e para saber
// quanto uma promoção específica vendeu enquanto esteve no ar.
// Cada item: {id, promoId, nome, tipoProduto, resumo, inicio, fim, qtdVendida, descontoTotal, receitaTotal}
var PROMO_HISTORICO = [];
var nextHistoricoId = 1;

function promoAbrirSessao(pr){
  var h={id:nextHistoricoId++, promoId:pr.id, nome:pr.nome, tipoProduto:pr.tipoProduto,
         resumo:promoCalcular(pr).resumo, inicio:hoje(), fim:null,
         qtdVendida:0, descontoTotal:0, receitaTotal:0};
  PROMO_HISTORICO.push(h);
  pr._sessaoAtual=h.id;
}
function promoFecharSessao(pr){
  if(!pr._sessaoAtual) return;
  var h=PROMO_HISTORICO.find(function(x){return x.id===pr._sessaoAtual;});
  if(h && !h.fim){
    h.fim=hoje();
    var stats=promoHistoricoStatsCalcular(h.id);
    h.qtdVendida=stats.qtd; h.descontoTotal=stats.desconto; h.receitaTotal=stats.receita;
  }
  pr._sessaoAtual=null;
}
// calcula as vendas reais ligadas a uma sessao de promocao, a partir do VND
function promoHistoricoStatsCalcular(sessaoId){
  var vs=VND.filter(function(v){return v.promoSessaoId===sessaoId;});
  var qtd=vs.length, desconto=0, receita=0;
  for(var i=0;i<vs.length;i++){
    receita+=(+vs[i].preco||0);
    if(vs[i].precoNormal!==undefined) desconto+=Math.max(0,(+vs[i].precoNormal||0)-(+vs[i].preco||0));
  }
  return {qtd:qtd, desconto:desconto, receita:receita};
}
// numeros de uma entrada do historico: se ja fechada usa os numeros congelados,
// se ainda em andamento (sem "fim"), calcula em tempo real
function promoHistoricoStats(h){
  if(h.fim) return {qtd:h.qtdVendida, desconto:h.descontoTotal, receita:h.receitaTotal};
  return promoHistoricoStatsCalcular(h.id);
}

// Estima o consumo de insumos (ingredientes) durante uma ou mais sessões de
// promoção, cruzando as vendas feitas na promoção com as receitas de recheio
// cadastradas em Precificação. Retorna uma lista por ingrediente, já com o
// equivalente em pacotes quando o ingrediente estiver vinculado a um Insumo.
function promoInsumosConsumidos(sessaoIds){
  var vs=VND.filter(function(v){return v.promoSessaoId && sessaoIds.indexOf(v.promoSessaoId)>=0;});
  if(vs.length===0) return [];

  var porSabor={};
  for(var i=0;i<vs.length;i++){
    var chave = vs[i].tipo==="Tradicional" ? null : vs[i].sabor;
    if(!chave) continue; // Tradicional nao tem receita de recheio cadastrada
    porSabor[chave]=(porSabor[chave]||0)+1;
  }

  var consumoPorIng={}; // ingId -> gramas/ml/unidades consumidos
  for(var sabor in porSabor){
    var receita=PREC_RECEITAS[sabor];
    if(!receita || !receita.itens || !receita.producao) continue;
    var qtdVendida=porSabor[sabor];
    for(var j=0;j<receita.itens.length;j++){
      var item=receita.itens[j];
      var porBrownie=item.qtdUsada/receita.producao;
      consumoPorIng[item.ingId]=(consumoPorIng[item.ingId]||0)+porBrownie*qtdVendida;
    }
  }

  var lista=[];
  for(var ingId in consumoPorIng){
    var ing=precIngById(+ingId);
    if(!ing) continue;
    var qtd=consumoPorIng[ingId];
    var linha={nome:ing.nome, qtd:qtd, unidade:ing.unidade};
    var insumo=INSUMOS.find(function(i){return i.precIngId===+ingId;});
    if(insumo && insumo.pesoPacote>0){
      linha.pacotes=qtd/insumo.pesoPacote;
      linha.embalagem=insumo.embalagem;
    }
    lista.push(linha);
  }
  lista.sort(function(a,b){return b.qtd-a.qtd;});
  return lista;
}

var PROMO_SUGESTOES = [
  {nome:"10% off no Clássico",   tipoPromo:"percentual", tipoProduto:"Clássico",     percentual:10},
  {nome:"Leve 3 Pague 2 — Tradicional", tipoPromo:"leve", tipoProduto:"Tradicional", compra:2, leva:3},
  {nome:"Kit 4 Premium por R$50", tipoPromo:"combo",      tipoProduto:"Premium",      qtdCombo:4, precoCombo:50},

];

function promoPrecoBase(tipoProduto){
  var salvo=PREC_PRECOS[tipoProduto];
  if(salvo!==undefined && salvo!==null && salvo!=="") return +salvo;
  var info=TIPOS.find(function(t){return t.t===tipoProduto;});
  return info?info.p:0;
}
function promoCustoMedioPorTipo(tipoProduto){
  if(tipoProduto==="Tradicional") return precCustoRealVenda("Tradicional","");
  var sabores=SABORES[tipoProduto]||[];
  if(sabores.length===0) return precCustoRealVenda(tipoProduto,"");
  var soma=0;
  for(var i=0;i<sabores.length;i++) soma+=precCustoRealVenda(tipoProduto,sabores[i]);
  return soma/sabores.length;
}
function promoStatus(pr){
  if(pr.dataFim && pr.dataFim<hoje()) return "expirada";
  if(pr.dataInicio && pr.dataInicio>hoje()) return "agendada";
  if(pr.ativa) return "ativa";
  return "inativa";
}
function promoDesativarExpiradas(){
  var mudou=false;
  for(var i=0;i<PROMOCOES.length;i++){
    if(PROMOCOES[i].ativa && promoStatus(PROMOCOES[i])==="expirada"){
      PROMOCOES[i].ativa=false;
      promoFecharSessao(PROMOCOES[i]);
      mudou=true;
    }
  }
  if(mudou) salvarPromocoes();
}
// calcula os numeros de uma promocao para UM tipo de produto especifico
function promoCalcularTipo(pr,tipoProduto){
  var precoBase=promoPrecoBase(tipoProduto);
  var custo=promoCustoMedioPorTipo(tipoProduto);
  var precoEfetivo=precoBase, resumo="";

  if(pr.tipoPromo==="percentual"){
    var pct=+pr.percentual||0;
    precoEfetivo=precoBase*(1-pct/100);
    resumo=pct+"% de desconto";
  } else if(pr.tipoPromo==="valorFixo"){
    var off=+pr.valorOff||0;
    precoEfetivo=precoBase-off;
    resumo=BRL(off)+" de desconto por unidade";
  } else if(pr.tipoPromo==="leve"){
    var compra=Math.max(1,+pr.compra||1), leva=Math.max(compra,+pr.leva||compra);
    precoEfetivo=(compra*precoBase)/leva;
    resumo="Compre "+compra+" leve "+leva;
  } else if(pr.tipoPromo==="combo"){
    var qtd=Math.max(1,+pr.qtdCombo||1), precoCombo=+pr.precoCombo||0;
    precoEfetivo=precoCombo/qtd;
    resumo="Kit "+qtd+" un. por "+BRL(precoCombo);
  }

  if(precoEfetivo<0) precoEfetivo=0;
  var lucroUnit=precoEfetivo-custo;
  var margemAtual=precoBase>0?((precoBase-custo)/precoBase*100):0;
  var margemNova=precoEfetivo>0?(lucroUnit/precoEfetivo*100):-100;

  // preço mínimo pra manter a margem mínima desejada, e quanto ainda dá pra abaixar
  var precoMinimo = custo>0 ? custo/(1-PROMO_MARGEM_MIN/100) : 0;
  var podeAbaixarAte = precoEfetivo-precoMinimo;

  return {
    tipoProduto:tipoProduto, precoBase:precoBase, custo:custo, precoEfetivo:precoEfetivo,
    lucroUnit:lucroUnit, margemAtual:margemAtual, margemNova:margemNova,
    resumo:resumo, prejuizo:lucroUnit<0,
    precoMinimo:precoMinimo, podeAbaixarAte:podeAbaixarAte,
    abaixoMargemMin: margemNova<PROMO_MARGEM_MIN
  };
}
// calcula os numeros de uma promocao: se tipoProduto for "Todos", retorna
// um resultado por tipo (array "porTipo") alem de uma media consolidada
function promoCalcular(pr){
  var tipos = pr.tipoProduto==="Todos" ? ["Tradicional","Clássico","Premium"] : [pr.tipoProduto];
  var porTipo = tipos.map(function(t){ return promoCalcularTipo(pr,t); });

  var n=porTipo.length;
  var soma=function(campo){ return porTipo.reduce(function(a,c){return a+c[campo];},0); };
  var precoBase=soma("precoBase")/n, custo=soma("custo")/n, precoEfetivo=soma("precoEfetivo")/n;
  var lucroUnit=precoEfetivo-custo;
  var margemAtual=precoBase>0?((precoBase-custo)/precoBase*100):0;
  var margemNova=precoEfetivo>0?(lucroUnit/precoEfetivo*100):-100;
  var prejuizo=porTipo.some(function(c){return c.prejuizo;});
  var precoMinimo=soma("precoMinimo")/n;
  var podeAbaixarAte=precoEfetivo-precoMinimo;
  var abaixoMargemMin=porTipo.some(function(c){return c.abaixoMargemMin;});

  var r={
    precoBase:precoBase, custo:custo, precoEfetivo:precoEfetivo,
    lucroUnit:lucroUnit, margemAtual:margemAtual, margemNova:margemNova,
    resumo:porTipo[0].resumo, prejuizo:prejuizo, porTipo:porTipo, multiplo: n>1,
    precoMinimo:precoMinimo, podeAbaixarAte:podeAbaixarAte, abaixoMargemMin:abaixoMargemMin
  };

  var qtd=+pr.qtdEstimada||0;
  if(qtd>0){
    r.receitaPromo=precoEfetivo*qtd;
    r.lucroPromo=lucroUnit*qtd;
    r.receitaNormal=precoBase*qtd;
    r.lucroNormal=(precoBase-custo)*qtd;
    r.diferencaLucro=r.lucroPromo-r.lucroNormal;
  }
  return r;
}

// retorna a promocao ativa que se aplica a um tipo de produto (ou "Todos"), se houver
function promoAtivaParaTipo(tipo){
  return PROMOCOES.find(function(p){
    return p.ativa && (p.tipoProduto===tipo || p.tipoProduto==="Todos");
  }) || null;
}
// preco que deve ser cobrado agora por um tipo, considerando promocao ativa.
// retorna {preco, precoNormal, promo} — promo é null se nao houver promocao aplicavel
function precoEfetivoAtual(tipo){
  var precoNormal=promoPrecoBase(tipo);
  var promo=promoAtivaParaTipo(tipo);
  if(!promo) return {preco:precoNormal, precoNormal:precoNormal, promo:null};
  var c=promoCalcularTipo(promo,tipo);
  return {preco:c.precoEfetivo, precoNormal:precoNormal, promo:promo};
}

function promoTextoWhatsApp(pr){
  var c=promoCalcular(pr);
  var prod=pr.tipoProduto==="Todos"?"toda a linha de brownies":("brownies "+pr.tipoProduto);
  var linha="";
  if(pr.tipoPromo==="percentual") linha="🔥 *"+(+pr.percentual||0)+"% de desconto* em "+prod+"!";
  else if(pr.tipoPromo==="valorFixo") linha="🔥 *"+BRL(+pr.valorOff||0)+" de desconto* em "+prod+"!";
  else if(pr.tipoPromo==="leve") linha="🎁 *Compre "+pr.compra+" leve "+pr.leva+"* — "+prod+"!";
  else if(pr.tipoPromo==="combo") linha="📦 *Kit "+pr.qtdCombo+" un.* de "+prod+" por "+BRL(+pr.precoCombo||0)+"!";
  var msg="🎉 *Promoção Brownielícia!* 🎉\n\n"+linha;
  if(pr.nome) msg="🎉 *"+pr.nome+"* 🎉\n\n"+linha;
  if(!c.multiplo){
    msg+="\n\nDe "+BRL(c.precoBase)+" por "+BRL(c.precoEfetivo)+" a unidade.";
  }
  if(pr.dataInicio || pr.dataFim){
    if(pr.dataInicio && pr.dataFim) msg+="\n\n📅 Válido de "+fD(pr.dataInicio)+" até "+fD(pr.dataFim)+".";
    else if(pr.dataFim) msg+="\n\n📅 Válido até "+fD(pr.dataFim)+".";
    else if(pr.dataInicio) msg+="\n\n📅 A partir de "+fD(pr.dataInicio)+".";
  }
  msg+="\n\n@brownieliciadoces";
  return msg;
}

function BRL(v){ return "R$ "+v.toFixed(2).replace(".",","); }
function hoje(){
  var d=new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function pad(n){ return n<10?"0"+n:n; }
var BACKUP_LEMBRETE_DIAS = 7; // avisa se passar disso sem fazer backup
function diasDesdeUltimoBackup(){
  var ult=_get("bl_ultimoBackup");
  if(!ult) return null; // nunca fez backup
  var d1=new Date(ult+"T00:00:00"), d2=new Date(hoje()+"T00:00:00");
  return Math.round((d2-d1)/(1000*60*60*24));
}

function fD(s){
  var p=s.split("-");
  var d=new Date(+p[0],+p[1]-1,+p[2]);
  return DIAS[d.getDay()]+", "+pad(+p[2])+"/"+pad(+p[1]);
}
function cN(id){ var c=CLI.find(function(x){return x.id===id;}); return c?c.nome:"?"; }
function cB(id){ return CLI.find(function(x){return x.id===id;})||null; }

//  FINANCEIRO
// ══════════════════════════════════════════════
function totalComprasCli(cid){
  return VND.filter(function(v){return v.cid===cid;}).reduce(function(s,v){return s+v.preco;},0);
}
function totalPagoCli(cid){
  var pags = PAG.filter(function(p){return p.cid===cid;}).reduce(function(s,p){return s+p.valor;},0);
  var hora = VND.filter(function(v){return v.cid===cid&&v.pago;}).reduce(function(s,v){return s+v.preco;},0);
  return pags + hora;
}
function devidoCli(cid){
  var d = totalComprasCli(cid) - totalPagoCli(cid);
  return d > 0 ? d : 0;
}
function creditoCli(cid){
  var d = totalPagoCli(cid) - totalComprasCli(cid);
  return d > 0 ? d : 0;
}

    PAG=PAG.filter(function(p){return p.cid!==id;});

}

var _confirmCallback=null;
function confirmar(mensagem, callback){
  _confirmCallback=callback;
  var h='<div class="modal-title">Confirmar</div>';
  h+='<div style="font-size:14px;color:var(--modal-text);margin-bottom:20px;line-height:1.5;">'+mensagem+'</div>';

}
function _execConfirm(){

  fM();

}

var hdFiltro="mes";
var hdMesEsc="", hdAnoEsc="";
function hdRange(){
  var hj=hoje();
  if(hdFiltro==="hoje") return {de:hj,ate:hj,lbl:"Hoje"};
  if(hdFiltro==="mes"){
    var d=new Date();
    var de=d.getFullYear()+"-"+pad(d.getMonth()+1)+"-01";
    return {de:de,ate:hj,lbl:MESES[d.getMonth()]};
  }
  if(hdFiltro==="mesesc"){
    var y=hdAnoEsc||new Date().getFullYear();
    var m=hdMesEsc||(new Date().getMonth()+1);
    var de=y+"-"+pad(m)+"-01";
    var ultimoDia=new Date(y,m,0).getDate();
    var ate=y+"-"+pad(m)+"-"+pad(ultimoDia);
    return {de:de,ate:ate,lbl:MESES[m-1]+" "+y};
  }
  return {de:"0000-00-00",ate:"9999-99-99",lbl:"Total"};
}
function renderHD(){
  var rng=hdRange();
  var vndF=VND.filter(function(v){return v.data>=rng.de&&v.data<=rng.ate;});
  var pagF=PAG.filter(function(p){return p.data>=rng.de&&p.data<=rng.ate;});
  var rec=0, pen=0;
  for(var i=0;i<vndF.length;i++){
    if(vndF[i].pago) rec+=vndF[i].preco;
    else pen+=vndF[i].preco;
  }
  for(var i=0;i<pagF.length;i++) rec+=pagF[i].valor;
  var hl=document.getElementById("h-lbl");
  if(hl) hl.textContent=rng.lbl;
  var hr=document.getElementById("h-r");
  if(hr) hr.textContent=BRL(rec);
  var hp=document.getElementById("h-p");
  if(hp){
    if(pen>0){ hp.style.display="block"; hp.textContent=BRL(pen)+" pendente"; }
    else hp.style.display="none";
  }
}
function mHD(){
  var h='<div class="modal-title">O Que Mostrar</div>';
  h+='<div class="fg"><div class="chips">';
  var opts=[{k:"hoje",l:"Hoje"},{k:"mes",l:"Mês Atual"},{k:"mesesc",l:"Escolher Mês"},{k:"tudo",l:"Total Geral"}];
  for(var i=0;i<opts.length;i++){
    h+='<div class="chip-modal'+(hdFiltro===opts[i].k?" on":"")+'" data-f="'+opts[i].k+'" onclick="selHdFiltro(this)">'+opts[i].l+'</div>';
  }
  h+='</div></div>';
  if(hdFiltro==="mesesc"){
    var anoAtual=new Date().getFullYear();
    h+='<div class="fg"><div class="lbl">Mes</div><div class="chips" id="hd-meses">';
    for(var m=1;m<=12;m++){
      h+='<div class="chip-modal'+((+hdMesEsc===m)?" on":"")+'" data-m="'+m+'" onclick="selHdMes(this)">'+MESES[m-1].slice(0,3)+'</div>';
    }
    h+='</div></div>';
    h+='<div class="fg"><div class="lbl">Ano</div><input class="inp" type="number" id="hd-ano" value="'+(hdAnoEsc||anoAtual)+'"></div>';
  }
  h+='<button class="btn btn-primary" onclick="fecharHD()">Aplicar</button>';
  aM(h);
}
function selHdFiltro(el){
  hdFiltro=el.getAttribute("data-f");
  mHD();
}
function selHdMes(el){
  hdMesEsc=+el.getAttribute("data-m");
  mHD();
}
function fecharHD(){
  var anoEl=document.getElementById("hd-ano");
  if(anoEl&&anoEl.value) hdAnoEsc=+anoEl.value;

}

var filtroVenda = "";
function filtrarVendas(v){
  filtroVenda = v;
  pgD();
  var el = document.getElementById("vnd-search");
  if(el){ el.focus(); var len=el.value.length; el.setSelectionRange(len,len); }
}
function pgD(){
  var map={};
  for(var i=0;i<VND.length;i++){
    if(!map[VND[i].data])map[VND[i].data]=[];
    map[VND[i].data].push(VND[i]);
  }
  var dias=Object.keys(map).sort().reverse();
  if(diaA===null && dias.length>0) diaA=dias[0];
  var h=bannerBackupHTML()+bannerPromoAtivaHTML()+bannerEstoqueBaixoHTML()+bannerFornecedorHTML();

  if(dias.length===0){
    h+='<div class="empty"><div class="empty-title">Nenhuma venda registrada</div>';
    h+='<div class="empty-sub">Toque em Nova Venda para comecar</div>';
    h+='<button class="btn btn-primary" style="max-width:200px;margin:0 auto;" data-p="a" onclick="navP(this)">Nova Venda</button></div>';
    document.getElementById("pgd").innerHTML='<div class="sect">Vendas por Dia</div>'+h;
    return;
  }

  h+='<div class="fg" style="margin-bottom:12px;"><input class="inp" id="vnd-search" placeholder="Buscar por cliente..." value="'+filtroVenda+'" oninput="filtrarVendas(this.value)"></div>';

  var termo = normalizarBusca(filtroVenda);
  if(termo){
    dias = dias.filter(function(data){
      return map[data].some(function(v){ return normalizarBusca(cN(v.cid)).indexOf(termo)>=0; });
    });
  }
  if(termo && dias.length===0){
    h+='<div class="empty"><div class="empty-title">Nenhuma venda encontrada</div><div class="empty-sub">Tente buscar por outro nome de cliente.</div></div>';
    document.getElementById("pgd").innerHTML='<div class="sect">Vendas por Dia</div>'+h;
    return;
  }

  for(var gi=0;gi<dias.length;gi++){
    var data=dias[gi], itens=map[data];
    var tot=0, pen=0;
    for(var i=0;i<itens.length;i++){tot+=itens[i].preco; if(!itens[i].pago)pen+=itens[i].preco;}
    var isA=diaA===data;
    var clisNomes={};
    for(var i=0;i<itens.length;i++) clisNomes[cN(itens[i].cid)]=1;
    var nomes=Object.keys(clisNomes).join(", ");

    h+='<div class="day-card">';
    h+='<div class="day-card-hd'+(isA?" active":"")+'" data-d="'+data+'" onclick="var d=this.getAttribute(\'data-d\');diaA=diaA===d?null:d;pgD();">';
    h+='<div>';
    h+='<div style="font-size:15px;font-weight:700;color:'+(isA?"#F5F5DC":"var(--td)")+';">'+fD(data)+'</div>';
    h+='<div style="font-size:12px;color:'+(isA?"rgba(244,236,216,.6)":"var(--tm)")+';margin-top:2px;">'+itens.length+' brownie'+(itens.length>1?"s":"")+(nomes?" — "+nomes:"")+'</div>';
    h+='</div>';
    h+='<div style="text-align:right;">';
    h+='<div style="font-size:16px;font-weight:800;color:'+(isA?"#F5F5DC":"var(--td)")+';">'+BRL(tot)+'</div>';
    if(pen>0) h+='<span class="badge badge-pend" style="margin-top:3px;">'+BRL(pen)+'</span>';
    else h+='<span class="badge badge-pago" style="margin-top:3px;">Pago</span>';
    h+='</div></div>';

    if(isA){
      // Group by client
      var byC={};
      for(var i=0;i<itens.length;i++){
        if(!byC[itens[i].cid]) byC[itens[i].cid]=[];
        byC[itens[i].cid].push(itens[i]);
      }
      h+='<div class="day-card-body">';
      for(var cid in byC){
        var ls=byC[cid], cli=cB(+cid);
        h+='<div class="client-row">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
        h+='<div style="display:flex;align-items:center;gap:8px;">';
        h+='<div class="av" style="width:30px;height:30px;font-size:13px;background:var(--br);font-weight:700;">'+cN(+cid)[0]+'</div>';
        h+='<span style="font-size:14px;font-weight:700;color:#2E1712;">'+cN(+cid)+'</span>';
        h+='</div>';
        h+='<button class="btn-sm btn-sm-pay" data-cid="'+cid+'" data-d="'+data+'" onclick="event.stopPropagation();pagarTodosEl(this)">Pagar todos</button>';
        h+='</div>';
        for(var i=0;i<ls.length;i++){
          var v=ls[i];
          var lb=v.tipo==="Tradicional"?"Tradicional — sem recheio":v.sabor;
          h+='<div class="item-row">';
          h+='<div class="item-row-top">';
          h+='<div>';
          h+='<div style="font-size:13px;font-weight:500;color:#3D211A;">'+lb+'</div>';
          if(v.obs) h+='<div style="font-size:11px;color:#6F4D38;font-style:italic;margin-top:2px;">'+v.obs+'</div>';
          h+='</div>';
          h+='<span style="font-size:14px;font-weight:700;color:#2E1712;flex-shrink:0;">'+BRL(v.preco)+'</span>';
          h+='</div>';
          h+='<div class="item-row-actions">';
          if(v.pago) h+='<button class="btn-sm badge-pago-btn" onclick="event.stopPropagation();confirmarDespagar('+v.id+')">✓ Pago</button>';
          else h+='<button class="btn-sm btn-sm-pay" onclick="event.stopPropagation();pagar('+v.id+')">Pagar</button>';
          h+='<button class="btn-sm" style="background:rgba(61,33,26,.1);color:#3D211A;" data-vid="'+v.id+'" onclick="event.stopPropagation();mEV(this)">Editar</button>';
          h+='<button class="btn-sm btn-sm-del" onclick="event.stopPropagation();excluir('+v.id+')">✕</button>';
          h+='</div></div>';
        }
        h+='</div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }
  document.getElementById("pgd").innerHTML='<div class="sect">Vendas por Dia</div>'+h;
}

var filtroCliente = "";

  pgC();
  var el = document.getElementById("cli-search");
  if(el){ el.focus(); var len=el.value.length; el.setSelectionRange(len,len); }
}
function normalizarBusca(s){
  return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function pgC(){
  var h="";
  h+='<div class="fg" style="margin-bottom:12px;"><input class="inp" id="cli-search" placeholder="Buscar cliente..." value="'+filtroCliente+'" oninput="filtrarClientes(this.value)"></div>';

    h+='<div class="empty"><div class="empty-title">Nenhum cliente encontrado</div><div class="empty-sub">Tente buscar por outro nome.</div></div>';
  }

  for(var i=0;i<listaCli.length;i++){
    var c=listaCli[i];
    var dev=devidoCli(c.id);
    var cred=creditoCli(c.id);
    var tot=totalComprasCli(c.id);
    var ativo=cliA===c.id;

    h+='<div class="card" style="cursor:pointer;margin-bottom:8px;'+(ativo?"outline:2px solid var(--gold);":"")+'" data-id="'+c.id+'" onclick="var d=+this.getAttribute(\'data-id\');cliA=cliA===d?null:d;pgC();">';
    h+='<div style="display:flex;align-items:center;gap:12px;">';
    h+='<div class="av" style="width:44px;height:44px;font-size:18px;background:var(--br);flex-shrink:0;">'+c.nome[0]+'</div>';
    h+='<div style="flex:1;min-width:0;">';
    h+='<div style="font-size:16px;font-weight:700;color:var(--td);">'+c.nome+'</div>';
    h+='<div style="font-size:12px;color:var(--tm);">'+(c.tel||"Sem telefone")+'</div>';
    h+='</div>';
    h+='<div style="text-align:right;flex-shrink:0;">';
    if(dev>0){
      h+='<div style="font-size:16px;font-weight:800;color:var(--amb);">'+BRL(dev)+'</div>';
      h+='<span class="badge badge-pend">Em aberto</span>';
    } else if(cred>0){
      h+='<div style="font-size:16px;font-weight:800;color:var(--grn);">'+BRL(cred)+'</div>';
      h+='<span class="badge badge-pago">Credito</span>';
    } else {
      h+='<div style="font-size:16px;font-weight:800;color:var(--grn);">'+BRL(tot)+'</div>';
      h+='<span class="badge badge-pago">Em dia</span>';
    }
    h+='</div></div>';

    if(ativo){
      h+='<div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(61,33,26,.15);">';
      // Resumo financeiro
      h+='<div style="background:#EDE9CE;border-radius:10px;padding:12px;margin-bottom:12px;">';

function diasAtras(n){
  var d=new Date();
  d.setDate(d.getDate()-n);
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function inicioSemana(){
  var d=new Date();
  var diff=d.getDate()-d.getDay();
  d.setDate(diff);
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function inicioMes(){
  var d=new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-01";
}
var filtroR="mes";
var filtroDe="", filtroAte="";
function setFiltroR(f){
  filtroR=f;
  if(f==="custom"){
    abrirFiltroCustom();
    return;
  }
  pgR();
}
function abrirFiltroCustom(){
  var h='<div class="modal-title">Período Personalizado</div>';
  h+='<div class="fg"><div class="lbl">De</div><input class="inp" type="date" id="fr-de" value="'+(filtroDe||hoje())+'"></div>';
  h+='<div class="fg"><div class="lbl">Até</div><input class="inp" type="date" id="fr-ate" value="'+(filtroAte||hoje())+'"></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  h+='<button class="btn btn-secondary" onclick="fM()">Cancelar</button>';
  h+='<button class="btn btn-primary" onclick="aplicarFiltroCustom()">Aplicar</button>';
  h+='</div>';
  aM(h);
}
function aplicarFiltroCustom(){
  filtroDe=(document.getElementById("fr-de")||{}).value||hoje();
  filtroAte=(document.getElementById("fr-ate")||{}).value||hoje();
  if(filtroDe>filtroAte){var t=filtroDe;filtroDe=filtroAte;filtroAte=t;}
  filtroR="custom";
  fM();
  pgR();
}
// retorna {de,ate} do mes anterior, limitando ao mesmo dia do mes atual
// (compara "1 a 27 de julho" com "1 a 27 de junho", nao o mes inteiro, para ser justo)
function rangeMesAnterior(){
  var d=new Date();
  var diaAtual=d.getDate();
  var mesAnt=new Date(d.getFullYear(),d.getMonth()-1,1);
  var ultimoDiaMesAnt=new Date(mesAnt.getFullYear(),mesAnt.getMonth()+1,0).getDate();
  var diaFinal=Math.min(diaAtual,ultimoDiaMesAnt);
  var de=mesAnt.getFullYear()+"-"+pad(mesAnt.getMonth()+1)+"-01";
  var ate=mesAnt.getFullYear()+"-"+pad(mesAnt.getMonth()+1)+"-"+pad(diaFinal);
  return {de:de,ate:ate};
}

function resumoComparacaoMes(totAtual,qtdAtual){
  var rngAnt=rangeMesAnterior();
  var vndAnt=VND.filter(function(v){return v.data>=rngAnt.de&&v.data<=rngAnt.ate;});
  var totAnt=0;
  for(var i=0;i<vndAnt.length;i++) totAnt+=vndAnt[i].preco;
  var qtdAnt=vndAnt.length;

  var d=new Date();
  var mesAntNome=MESES[(d.getMonth()-1+12)%12];

  if(totAnt===0 && qtdAnt===0){
    return '';
  }

  var varTot=totAnt>0?((totAtual-totAnt)/totAnt*100):(totAtual>0?100:0);
  var varQtd=qtdAnt>0?((qtdAtual-qtdAnt)/qtdAnt*100):(qtdAtual>0?100:0);
  var subiu=totAtual>=totAnt;
  var corClass=subiu?"":" neg";
  var seta=subiu?"▲":"▼";

  var h='<div class="card" style="margin-bottom:10px;">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--td);margin-bottom:4px;">Comparado a '+mesAntNome+'</div>';
  h+='<div style="font-size:11px;color:var(--tm);margin-bottom:12px;">Mesmo período do mês anterior (dia 1 ao dia '+(+rngAnt.ate.slice(-2))+')</div>';
  h+='<div class="lucro-grid">';
  h+='<div class="lucro-card'+corClass+'"><div class="lbl">Faturamento</div><div class="val">'+seta+' '+Math.abs(varTot).toFixed(0)+'%</div></div>';
  h+='<div class="lucro-card'+corClass+'"><div class="lbl">Brownies Vendidos</div><div class="val">'+seta+' '+Math.abs(varQtd).toFixed(0)+'%</div></div>';
  h+='</div>';
  h+='<div class="resumo-line" style="margin-top:8px;"><span class="lbl2">'+mesAntNome+' (mesmo período)</span><span class="val2">'+BRL(totAnt)+' &middot; '+qtdAnt+' brownies</span></div>';
  h+='</div>';
  return h;
}

function rangeFiltro(){
  var hj=hoje();
  if(filtroR==="hoje") return {de:hj,ate:hj,lbl:"Hoje"};
  if(filtroR==="semana") return {de:inicioSemana(),ate:hj,lbl:"Esta Semana"};
  if(filtroR==="mes") return {de:inicioMes(),ate:hj,lbl:"Este Mes"};
  if(filtroR==="custom") return {de:filtroDe,ate:filtroAte,lbl:fD(filtroDe)+" a "+fD(filtroAte)};
  return {de:"0000-00-00",ate:"9999-99-99",lbl:"Tudo"};
}

function pgR(){
  var rng=rangeFiltro();
  var vndF=VND.filter(function(v){return v.data>=rng.de&&v.data<=rng.ate;});
  var pagF=PAG.filter(function(p){return p.data>=rng.de&&p.data<=rng.ate;});
  var entF=(typeof FORNECEDOR_ENTREGAS!=="undefined"?FORNECEDOR_ENTREGAS:[]).filter(function(e){return e.data>=rng.de&&e.data<=rng.ate;});

  var totDireto=0, recDireto=0, penDireto=0;
  for(var i=0;i<vndF.length;i++){ totDireto+=vndF[i].preco; if(vndF[i].pago)recDireto+=vndF[i].preco; else penDireto+=vndF[i].preco; }
  for(var i=0;i<pagF.length;i++) recDireto+=pagF[i].valor;

  var totForn=0, recForn=0, penForn=0;
  for(var i=0;i<entF.length;i++){ totForn+=(+entF[i].valorTotal||0); if(entF[i].pago)recForn+=(+entF[i].valorTotal||0); else penForn+=(+entF[i].valorTotal||0); }

  var tot=totDireto+totForn, rec=recDireto+recForn, pen=penDireto+penForn;

  // Filtro de período
  var filtros=[{k:"hoje",l:"Hoje"},{k:"semana",l:"Semana"},{k:"mes",l:"Mes"},{k:"tudo",l:"Tudo"},{k:"custom",l:"Escolher"}];
  var h='<div class="scroll-x" style="margin-bottom:14px;">';
  for(var i=0;i<filtros.length;i++){
    var f=filtros[i];
    var on=filtroR===f.k;
    h+='<div class="chip'+(on?" on":"")+'" style="flex-shrink:0;" data-f="'+f.k+'" onclick="setFiltroR(this.getAttribute(\'data-f\'))">'+f.l+'</div>';
  }
  h+='</div>';
  if(filtroR==="custom"){
    h+='<div style="font-size:12px;font-weight:600;color:var(--tm);margin-bottom:14px;margin-top:-6px;">'+rng.lbl+'</div>';
  }

  var qtdForn=0; for(var i=0;i<entF.length;i++) qtdForn+=(+entF[i].qtd||0);
  var qtdTotal=vndF.length+qtdForn;

  h+='<div class="stat-grid">';
  h+='<div class="stat-card"><div class="stat-card-lbl">Total Vendido</div><div class="stat-card-val">'+BRL(tot)+'</div><div class="stat-card-sub">'+qtdTotal+' brownie'+(qtdTotal===1?'':'s')+'</div></div>';
  h+='<div class="stat-card grn"><div class="stat-card-lbl">Recebido</div><div class="stat-card-val">'+BRL(rec)+'</div></div>';
  h+='<div class="stat-card amb"><div class="stat-card-lbl">Pendente</div><div class="stat-card-val">'+BRL(pen)+'</div></div>';
  var clientesNoPeriodo={};for(var i=0;i<vndF.length;i++)clientesNoPeriodo[vndF[i].cid]=1;
  h+='<div class="stat-card"><div class="stat-card-lbl">Clientes</div><div class="stat-card-val">'+Object.keys(clientesNoPeriodo).length+'</div></div>';
  h+='</div>';

  if(totForn>0){
    h+='<div class="card" style="margin-bottom:10px;">';
    h+='<div style="font-size:14px;font-weight:700;color:var(--td);margin-bottom:10px;">Vendas Diretas × Revenda</div>';
    h+='<div class="resumo-line"><span class="lbl2">Vendas diretas (clientes)</span><span class="val2">'+BRL(totDireto)+'</span></div>';
    h+='<div class="resumo-line"><span class="lbl2">Entregue à revenda</span><span class="val2">'+BRL(totForn)+'</span></div>';
    h+='</div>';
  }

  if(filtroR==="mes"){
    h+=resumoComparacaoMes(tot,vndF.length);
  }

  // Mix de produtos
  var tr=0,cl=0,pr=0;
  for(var i=0;i<vndF.length;i++){
    if(vndF[i].tipo==="Tradicional")tr++;
    else if(vndF[i].tipo==="Clássico")cl++;
    else pr++;
  }
  var tot2=vndF.length||1;
  h+='<div class="card" style="margin-bottom:10px;">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--td);margin-bottom:12px;">Mix de Produtos</div>';
  var mix=[{l:"Tradicional — R$ 6,00",v:tr,c:"var(--prod1)"},{l:"Clássico — R$ 7,00",v:cl,c:"var(--gold)"},{l:"Premium — R$ 8,00",v:pr,c:"var(--prod3)"}];
  for(var i=0;i<mix.length;i++){
    if(mix[i].v===0) continue;
    h+='<div style="margin-bottom:10px;">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
    h+='<span style="font-size:13px;font-weight:500;color:var(--ts);">'+mix[i].l+'</span>';
    h+='<span style="font-size:13px;font-weight:700;color:var(--td);">'+mix[i].v+' ('+Math.round(mix[i].v/tot2*100)+'%)</span>';
    h+='</div>';
    h+='<div class="pbar"><div class="pbar-fill" style="width:'+Math.round(mix[i].v/tot2*100)+'%;background:'+mix[i].c+';"></div></div>';
    h+='</div>';
  }
  h+='</div>';

  // Top sabores
  var sab={};
  for(var i=0;i<vndF.length;i++){
    var k=vndF[i].tipo==="Tradicional"?"Tradicional":vndF[i].sabor;
    if(!sab[k])sab[k]={n:0,r:0};
    sab[k].n++;sab[k].r+=vndF[i].preco;
  }
  var arr=Object.keys(sab).map(function(k){return{k:k,n:sab[k].n,r:sab[k].r};});
  arr.sort(function(a,b){return b.n-a.n;});
  h+='<div class="card" style="margin-bottom:10px;">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--td);margin-bottom:12px;">Ranking de Sabores</div>';
  for(var i=0;i<Math.min(5,arr.length);i++){

    h+='<div style="flex:1;">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;">';
    h+='<span style="font-size:13px;font-weight:600;color:var(--td);">'+arr[i].k+'</span>';
    h+='<span style="font-size:12px;font-weight:700;color:var(--ts);">'+arr[i].n+'x — '+BRL(arr[i].r)+'</span>';
    h+='</div>';
    h+='<div class="pbar"><div class="pbar-fill" style="width:'+Math.round(arr[i].n/arr[0].n*100)+'%;"></div></div>';
    h+='</div></div>';
  }
  h+='</div>';

  // Top clientes
  h+='<div class="card" style="margin-bottom:10px;">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--td);margin-bottom:12px;">Top Clientes</div>';
  var cliArr=CLI.map(function(c){
    var vs=vndF.filter(function(v){return v.cid===c.id;});
    return{c:c,tot:vs.reduce(function(s,v){return s+v.preco;},0),n:vs.length};
  }).filter(function(x){return x.n>0;}).sort(function(a,b){return b.tot-a.tot;});
  var ms2=cliArr[0]?cliArr[0].tot:1;
  for(var i=0;i<cliArr.length;i++){
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">';
    h+='<div class="av" style="width:32px;height:32px;font-size:14px;background:var(--br);font-weight:700;flex-shrink:0;">'+cliArr[i].c.nome[0]+'</div>';
    h+='<div style="flex:1;">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;">';
    h+='<span style="font-size:13px;font-weight:600;color:var(--td);">'+cliArr[i].c.nome+'</span>';
    h+='<span style="font-size:12px;font-weight:700;color:var(--ts);">'+BRL(cliArr[i].tot)+'</span>';
    h+='</div>';
    h+='<div class="pbar"><div class="pbar-fill" style="width:'+Math.round(cliArr[i].tot/ms2*100)+'%;"></div></div>';
    h+='</div></div>';
  }
  h+='</div>';

  if(entF.length>0){
    h+='<div class="card" style="margin-bottom:10px;">';
    h+='<div style="font-size:14px;font-weight:700;color:var(--td);margin-bottom:12px;">Top Revenda</div>';
    var forArr=FORNECEDORES.map(function(f){
      var es=entF.filter(function(e){return e.fornecedorId===f.id;});
      return{f:f,tot:es.reduce(function(s,e){return s+(+e.valorTotal||0);},0),n:es.reduce(function(s,e){return s+(+e.qtd||0);},0)};
    }).filter(function(x){return x.n>0;}).sort(function(a,b){return b.tot-a.tot;});
    var ms3=forArr[0]?forArr[0].tot:1;
    for(var i=0;i<forArr.length;i++){
      h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">';
      h+='<div class="av" style="width:32px;height:32px;font-size:14px;background:var(--gold);font-weight:700;flex-shrink:0;">'+forArr[i].f.nome[0]+'</div>';
      h+='<div style="flex:1;">';
      h+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;">';
      h+='<span style="font-size:13px;font-weight:600;color:var(--td);">'+forArr[i].f.nome+'</span>';
      h+='<span style="font-size:12px;font-weight:700;color:var(--ts);">'+forArr[i].n+'x — '+BRL(forArr[i].tot)+'</span>';
      h+='</div>';
      h+='<div class="pbar"><div class="pbar-fill" style="width:'+Math.round(forArr[i].tot/ms3*100)+'%;background:var(--gold);"></div></div>';
      h+='</div></div>';
    }
    h+='</div>';
  }

  document.getElementById("pgr").innerHTML='<div class="sect">Resumo</div>'+h;
}

var ESTOQUE_LIMIAR_BAIXO = 2; // qtd igual ou abaixo disso conta como "baixo"
function estoqueItensBaixos(){
  var lista=listaTodosSabores(), baixos=[], esgotados=[];
  for(var i=0;i<lista.length;i++){
    var qtd=estoqueGet(lista[i].tipo,lista[i].sabor);
    var label=lista[i].sabor||lista[i].tipo;
    if(qtd===0) esgotados.push({tipo:lista[i].tipo,sabor:lista[i].sabor,label:label,qtd:qtd});
    else if(qtd<=ESTOQUE_LIMIAR_BAIXO) baixos.push({tipo:lista[i].tipo,sabor:lista[i].sabor,label:label,qtd:qtd});
  }
  return {baixos:baixos, esgotados:esgotados, total:baixos.length+esgotados.length};
}
function vendidosHoje(tipo,sabor){
  var hj=hoje();
  return VND.filter(function(v){return v.data===hj&&v.tipo===tipo&&(v.sabor||"")===(sabor||"");}).length;
}
function vendidosTotal(tipo,sabor){

// Sugestao de producao: junta reposicao de estoque baixo (ate uma meta de
// seguranca) com o que os fornecedores/pontos de revenda provavelmente vao
// precisar nos proximos 7 dias (com base na ultima entrega feita a cada um)
var PRODUCAO_META_ESTOQUE = 5;
var PRODUCAO_JANELA_DIAS = 7;
function producaoSugerida(){
  var sugestao={};
  function add(tipo,sabor,qtd){
    var k=tipo+"|"+(sabor||"");
    sugestao[k]=(sugestao[k]||0)+qtd;
  }

  var lista=listaTodosSabores();
  for(var i=0;i<lista.length;i++){
    var atual=estoqueGet(lista[i].tipo,lista[i].sabor);
    if(atual<PRODUCAO_META_ESTOQUE) add(lista[i].tipo,lista[i].sabor,PRODUCAO_META_ESTOQUE-atual);
  }

  if(typeof FORNECEDORES!=="undefined"){
    var limite=new Date(hoje()+"T00:00:00");
    limite.setDate(limite.getDate()+PRODUCAO_JANELA_DIAS);
    for(var i=0;i<FORNECEDORES.length;i++){
      var f=FORNECEDORES[i];
      var proxima=fornProximaEntrega(f);
      if(!proxima) continue;
      var dProx=new Date(proxima+"T00:00:00");
      if(dProx>limite) continue;
      var entregas=fornEntregas(f.id);
      if(entregas.length===0) continue;
      var ultimaData=entregas[0].data;
      var doDia=entregas.filter(function(e){return e.data===ultimaData;});
      for(var j=0;j<doDia.length;j++) add(doDia[j].tipo,doDia[j].sabor,doDia[j].qtd);
    }
  }

  var resultado=[];
  for(var k in sugestao){
    var p=k.split("|");
    resultado.push({tipo:p[0], sabor:p[1], qtd:sugestao[k]});
  }
  resultado.sort(function(a,b){return b.qtd-a.qtd;});
  return resultado;
}

      h+='<button class="btn-sm" style="background:var(--grn-bg);color:var(--grn);width:28px;height:28px;border-radius:50%;font-size:16px;font-weight:700;padding:0;" data-tipo="'+it.tipo+'" data-sabor="'+it.sabor+'" onclick="estoqueAjustar(this,1)">+</button>';

  var tipo=el.getAttribute("data-tipo");
